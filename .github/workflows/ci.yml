# MacCrab app CI — build + swift test + rule compilation.
#
# Re-adds the application CI that was deleted during the v1.12.6 opsec
# sweep (the `ci-local.sh` "replaces GitHub Actions" note marks the gap).
# This is the GitHub-hosted half of the pipeline: it proves the source
# compiles, the test suite is green, and the rules compile clean on a
# fresh machine. The SIGNED release build stays on the trusted Mac
# (Developer ID + notary creds never reach a hosted runner) — see
# .github/workflows/reproducible-build.yml for the self-hosted half.
#
# Toolchain pin (PASS-K reconciliation): release builds are pinned to
# Xcode 26.x until the macOS 27 design-QA gate passes (the 27 SDK
# ignores UIDesignRequiresCompatibility and carries the TN3211 @State /
# Swift Charts hazards). CI selects Xcode 26.x explicitly so a hosted
# runner's default Xcode bump can't silently move CI off the release
# toolchain. PASS-L source-compat guards run in the advisory `audit`
# job so an Xcode-27-hazard regression surfaces in PRs even while the
# build itself stays on 26.x.
#
# Every action is SHA-pinned (S5-T4): a moving tag is a supply-chain
# hole — a compromised action tag would run with repo-write secrets.
# Refresh a pin deliberately (resolve the new release tag → commit SHA,
# keep the `# vX.Y.Z` trailing comment for human review).
#
# Job criticality:
#   build-and-test  REQUIRED  — must pass to merge.
#   rules           REQUIRED  — must pass to merge.
#   broker-fuzz     REQUIRED  — ASan/UBSan fuzz of the SCM_RIGHTS fd broker
#                               (Sources/CTierBBroker/broker.c), the sandbox-
#                               escape primitive. A sanitizer fault or a stray-
#                               closed descriptor means the containment boundary
#                               re-opened — must block merge.
#   audit-deterministic REQUIRED — the cheap, hermetic, source-only subset of
#                               the architectural audit (MACCRAB_AUDIT_SCOPE=
#                               deterministic): the wire-the-orphans / single-
#                               sink / bounded-state invariants + the PASS 13
#                               env-block secret-leak scan. Pure grep over
#                               committed source, so it's deterministic on a
#                               fresh runner and gates every PR. The release-
#                               time passes (K/L/M) are skipped here.
#   audit           ADVISORY  — informational; does not block. Runs the FULL
#                               architectural audit incl. the release-time
#                               gates a hosted PR runner can't satisfy (PASS-K
#                               toolchain pin, PASS-L Xcode-27 guards, PASS-M
#                               universal-binary arch). The deterministic subset
#                               is promoted to the REQUIRED audit-deterministic
#                               job above; this job keeps surfacing the rest.
#   corpus          ADVISORY  — runs the Tier-B containment corpus so a
#                               regression in the broker/SBPL/trampoline that
#                               re-opens the boundary turns a check red instead
#                               of passing unseen. Advisory because a hosted
#                               runner's VM is NOT the launch-proof environment —
#                               the REQUIRED containment gate is the operator's
#                               on-device `make test-corpus` on macOS 26, recorded
#                               in the release checklist.
#   rule-channel    ADVISORY  — drives the signed OTA rule-update channel end-to-
#                               end (maccrabctl rules …) against a local mock
#                               endpoint + generated key, asserting every bad
#                               manifest is refused fail-closed. Advisory because
#                               it depends on host data-dir state a hosted runner
#                               may not reproduce; the guarantees are re-proven on
#                               device in the release checklist.
name: CI

on:
  push:
    branches: [main, "v*"]
  pull_request:
    branches: [main, "v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin to the release toolchain (PASS-K). The minor is intentionally
  # loose (`26`) so a hosted-runner Xcode 26.x patch bump still matches;
  # the MAJOR is what the design-QA gate fixes.
  PINNED_XCODE_MAJOR: "26"

jobs:
  # ── REQUIRED ────────────────────────────────────────────────────────
  build-and-test:
    name: Build + test (required)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode ${{ env.PINNED_XCODE_MAJOR }}.x (PASS-K pin)
        run: |
          set -euo pipefail
          # Pick the highest-installed Xcode whose MAJOR matches the pin.
          # Fail loud if the runner image has dropped Xcode 26 entirely —
          # that means CI has drifted off the release toolchain and the
          # pin must be re-evaluated (do NOT silently build on 27).
          want="${PINNED_XCODE_MAJOR}"
          best=""
          for app in /Applications/Xcode_${want}*.app /Applications/Xcode.app; do
            [ -d "$app" ] || continue
            ver=$("$app/Contents/Developer/usr/bin/xcodebuild" -version 2>/dev/null | sed -n 's/^Xcode \([0-9][0-9]*\).*/\1/p')
            if [ "$ver" = "$want" ]; then best="$app"; break; fi
          done
          if [ -z "$best" ]; then
            echo "::error::No Xcode ${want}.x found on this runner — CI is pinned to the release toolchain (PASS-K). Available:" >&2
            ls -d /Applications/Xcode*.app 2>/dev/null >&2 || true
            exit 1
          fi
          sudo xcode-select -s "$best/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Resolve dependencies (pinned)
        run: swift package resolve

      - name: Build (debug)
        run: swift build

      - name: Build tests
        run: swift build --build-tests

      # The hosted runner's default python3 is Homebrew's, which is
      # externally-managed (PEP 668): `pip install --user` aborts with
      # "externally-managed-environment". setup-python provides a clean
      # interpreter (and puts it first on PATH, so the test helper's
      # `python3` shell-out resolves to it too) — same pattern the
      # `rules` job already relies on below.
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      # Rule-driven tests call RuleTestHelpers.ensureRulesCompiled(), which shells
      # out to the Python compiler (PyYAML) into /tmp/maccrab_v3 — with stderr
      # silenced and errors swallowed. On a fresh runner without PyYAML that
      # compile fails silently, /tmp/maccrab_v3 is never created, and dozens of
      # tests fail with directoryNotFound("/tmp/maccrab_v3"). Install PyYAML and
      # pre-compile the rules here so the dir exists before `swift test`.
      - name: Install PyYAML + compile rules for tests
        run: |
          python3 -m pip install --user pyyaml
          python3 Compiler/compile_rules.py --input-dir Rules/ --output-dir /tmp/maccrab_v3

      - name: Run tests
        run: swift test

  # ── REQUIRED ────────────────────────────────────────────────────────
  rules:
    name: Rules compile + lint (required)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python3 -m pip install --user pyyaml

      - name: Compile rules (0 skips required)
        run: |
          set -euo pipefail
          out=$(python3 Compiler/compile_rules.py --input-dir Rules/ --output-dir /tmp/ci_compiled_rules 2>&1)
          echo "$out"
          # prerelease-check.sh enforces the same invariant: 0 rules skipped.
          echo "$out" | grep -qE 'Rules skipped:[[:space:]]+0\b' \
            || { echo "::error::compile_rules reported skipped rules"; exit 1; }

      - name: Rule lint (filter coverage)
        run: ./scripts/rule-lint.sh

  # ── REQUIRED ────────────────────────────────────────────────────────
  broker-fuzz:
    name: Broker fd fuzz — ASan/UBSan (required)
    runs-on: macos-15
    timeout-minutes: 20
    # REQUIRED: the SCM_RIGHTS fd broker (Sources/CTierBBroker/broker.c) is the
    # sandbox-escape primitive — a store plugin talks to it to receive its one
    # brokered read fd. test-broker-fuzz.sh floods maccrab_tierb_recv_fd with
    # thousands of malformed / multi-fd control messages under AddressSanitizer +
    # UndefinedBehaviorSanitizer (the exact path of the v1.20.2 CWE-191 underflow
    # fix). A sanitizer fault or a stray-closed descriptor = a re-opened boundary,
    # so this blocks merge (no continue-on-error).
    #
    # Path relevance: this primarily guards PRs touching Sources/CTierBBroker/**,
    # but it is wired to run on every push/PR (a regression can also arrive via
    # the broker's callers or build flags) — the fuzz is cheap enough to always run.
    #
    # No swift build: the harness is a standalone clang compile of broker.c, so no
    # Xcode-select pin is needed here — clang and the ASan/UBSan runtimes ship with
    # the runner's Xcode/CLT toolchain.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Fuzz the SCM_RIGHTS fd broker (ASan + UBSan)
        run: ./scripts/test-broker-fuzz.sh

  # ── REQUIRED ────────────────────────────────────────────────────────
  audit-deterministic:
    name: Architectural audit — deterministic passes (required)
    runs-on: macos-15
    timeout-minutes: 15
    # REQUIRED: the cheap, hermetic, source-only subset of the architectural
    # audit — the wire-the-orphans / single-sink / bounded-actor-state
    # invariants plus PASS 13 (env-block secret-leak scan). These are pure
    # grep/awk/sed over committed source, so they're fully deterministic on a
    # fresh runner and MUST gate every PR. MACCRAB_AUDIT_SCOPE=deterministic
    # skips the release-time passes K/L/M (toolchain pin, Xcode-27 source-compat
    # guards, universal-binary arch) that a hosted PR runner can't satisfy — the
    # full `audit` job below keeps running those, advisory. No Xcode select and
    # no build step: the deterministic passes never touch the toolchain or build
    # products, so this job stays fast and can't false-fail on the runner's
    # default Xcode.
    #
    # No continue-on-error: an error-level finding (a new unclassified Settings
    # @AppStorage orphan, an unauthorised alertStore.insert, an env-block secret
    # leak) blocks merge.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Deterministic architectural audit (source invariants + secret-leak scan)
        run: MACCRAB_AUDIT_SCOPE=deterministic ./scripts/pre-release-audit.sh

  # ── ADVISORY ────────────────────────────────────────────────────────
  audit:
    name: Architectural audit (advisory)
    runs-on: macos-15
    timeout-minutes: 30
    # Advisory: informational only. The audit includes release-time
    # gates (e.g. PASS-L Xcode-27 source-compat guards) that are not
    # per-PR blockers. continue-on-error surfaces findings in the PR
    # checks UI without failing the run.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The audit's PASS-K verifies the toolchain matches the release pin.
      # Without this step it sees the runner's default Xcode and flags a
      # mismatch on every run — select Xcode 26.x here too (same logic as
      # build-and-test) so the file's "CI selects Xcode 26.x explicitly"
      # invariant holds across all jobs.
      - name: Select Xcode ${{ env.PINNED_XCODE_MAJOR }}.x (PASS-K pin)
        run: |
          set -euo pipefail
          want="${PINNED_XCODE_MAJOR}"
          best=""
          for app in /Applications/Xcode_${want}*.app /Applications/Xcode.app; do
            [ -d "$app" ] || continue
            ver=$("$app/Contents/Developer/usr/bin/xcodebuild" -version 2>/dev/null | sed -n 's/^Xcode \([0-9][0-9]*\).*/\1/p')
            if [ "$ver" = "$want" ]; then best="$app"; break; fi
          done
          if [ -z "$best" ]; then
            echo "::error::No Xcode ${want}.x found on this runner — CI is pinned to the release toolchain (PASS-K). Available:" >&2
            ls -d /Applications/Xcode*.app 2>/dev/null >&2 || true
            exit 1
          fi
          sudo xcode-select -s "$best/Contents/Developer"
          xcodebuild -version

      - name: Pre-release architectural audit
        run: ./scripts/pre-release-audit.sh

  # ── ADVISORY ────────────────────────────────────────────────────────
  corpus:
    name: Tier-B containment corpus (advisory)
    runs-on: macos-15
    timeout-minutes: 30
    # Advisory: a hosted runner's VM is not the launch-proof environment for
    # sandbox_init containment (the SBPL base for a full Swift plugin is still
    # tuned on device — see docs/RAVE_MVP_B_RELEASE.md §2a). But running the
    # corpus here still turns a host-INDEPENDENT regression — broker resolve
    # logic, SBPL shape, fd-3 wiring, trampoline argv — from "passes CI green"
    # (audit #2) into a visible red check. The REQUIRED containment gate stays
    # the operator's on-device `make test-corpus`, recorded in the release
    # checklist.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Select Xcode ${{ env.PINNED_XCODE_MAJOR }}.x (PASS-K pin)
        run: |
          set -euo pipefail
          want="${PINNED_XCODE_MAJOR}"
          best=""
          for app in /Applications/Xcode_${want}*.app /Applications/Xcode.app; do
            [ -d "$app" ] || continue
            ver=$("$app/Contents/Developer/usr/bin/xcodebuild" -version 2>/dev/null | sed -n 's/^Xcode \([0-9][0-9]*\).*/\1/p')
            if [ "$ver" = "$want" ]; then best="$app"; break; fi
          done
          if [ -z "$best" ]; then
            echo "::error::No Xcode ${want}.x found on this runner — CI is pinned to the release toolchain (PASS-K)." >&2
            exit 1
          fi
          sudo xcode-select -s "$best/Contents/Developer"
          xcodebuild -version

      - name: Resolve dependencies (pinned)
        run: swift package resolve

      # MACCRAB_CORPUS makes the gated ContainmentCorpusTests run AND (in DEBUG)
      # lets SandboxedTierBRunner accept the locally-built dev trampoline; MACCRAB_
      # BIN_DIR points the test at the freshly built trampoline + C fixtures. The
      # corpus asserts ZERO leak.* artifacts (undeclared read/network/fork/metadata/
      # mach all OS-denied) and one brokered read.
      - name: Run containment corpus
        run: |
          set -euo pipefail
          swift build
          MACCRAB_CORPUS=1 MACCRAB_BIN_DIR="$(swift build --show-bin-path)" \
            swift test --filter ContainmentCorpus

  # ── ADVISORY ────────────────────────────────────────────────────────
  rule-channel:
    name: Signed rule-update channel e2e (advisory)
    runs-on: macos-15
    timeout-minutes: 30
    # Advisory (continue-on-error), same rationale shape as the corpus job: this
    # drives the REAL RuleChannelFetcher end-to-end through the happy path and
    # every dangerous failure mode (rollback, corrupt sig, wrong key, tampered
    # body, malformed JSON, path-traversal rule id, version floor) against a LOCAL
    # mock endpoint with a generated key, asserting each bad manifest is refused
    # fail-closed with the prior corpus + anti-rollback serial intact. It isolates
    # to the writable USER data dir by making its events.db the "newest"; a fresh
    # hosted runner may not reproduce that host state, so a red check here is
    # informational, not a merge blocker. The fail-closed guarantees are re-proven
    # on device in the release checklist.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # A swift build is required (the harness needs a DEBUG maccrabctl and uses
      # swiftc for the signer), so select Xcode 26.x here too — same logic as
      # build-and-test — to keep CI on the release toolchain (PASS-K).
      - name: Select Xcode ${{ env.PINNED_XCODE_MAJOR }}.x (PASS-K pin)
        run: |
          set -euo pipefail
          want="${PINNED_XCODE_MAJOR}"
          best=""
          for app in /Applications/Xcode_${want}*.app /Applications/Xcode.app; do
            [ -d "$app" ] || continue
            ver=$("$app/Contents/Developer/usr/bin/xcodebuild" -version 2>/dev/null | sed -n 's/^Xcode \([0-9][0-9]*\).*/\1/p')
            if [ "$ver" = "$want" ]; then best="$app"; break; fi
          done
          if [ -z "$best" ]; then
            echo "::error::No Xcode ${want}.x found on this runner — CI is pinned to the release toolchain (PASS-K)." >&2
            exit 1
          fi
          sudo xcode-select -s "$best/Contents/Developer"
          xcodebuild -version

      # The harness uses python3 for the mock http.server + manifest JSON (no
      # PyYAML needed); setup-python guarantees a clean interpreter first on PATH.
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Resolve dependencies (pinned)
        run: swift package resolve

      # The harness needs a DEBUG maccrabctl (DEBUG honours the test key path) —
      # it aborts with exit 2 if .build/debug/maccrabctl is missing.
      - name: Build maccrabctl (debug)
        run: swift build --product maccrabctl

      # The harness isolates to the writable USER data dir by making its events.db
      # the "newest"; that dir must exist for the redirect check to pass on a fresh
      # runner (no root /Library detector is installed here).
      - name: Ensure user data dir exists
        run: mkdir -p "$HOME/Library/Application Support/MacCrab"

      - name: Rule-update channel adversarial e2e
        run: ./scripts/test-rule-channel-e2e.sh
