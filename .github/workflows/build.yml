name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Defense-in-depth: scope this workflow to read-only.
# Fork PRs use the base-repo workflow definition by default, so any
# malicious PR cannot escalate beyond what we grant here. The job
# only needs to read the source tree.
permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (debug)
        run: swift build 2>&1 || true
        # Note: Full build may require EndpointSecurity framework headers
        # not available on all CI runners. Package resolution and rule
        # compilation are the primary CI checks.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Compile rules
        run: |
          mkdir -p /tmp/compiled_rules
          python3 Compiler/compile_rules.py --input-dir Rules/ --output-dir /tmp/compiled_rules

      - name: Count rules
        run: |
          echo "### 🦀 MacCrab Detection Rules" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(find Rules -name '*.yml' | wc -l | tr -d ' ')
          COMPILED=$(find /tmp/compiled_rules -name '*.json' | wc -l | tr -d ' ')
          echo "- Total YAML rules: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- Compiled JSON: $COMPILED" >> $GITHUB_STEP_SUMMARY
