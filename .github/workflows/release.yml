name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
      HAS_SIGNING_CERT: ${{ secrets.DEVELOPER_ID_CERT != '' }}
      HAS_NOTARIZE_CREDS: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.NOTARIZE_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Import Developer ID certificate
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          DEVELOPER_ID_CERT: ${{ secrets.DEVELOPER_ID_CERT }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          # Create a temporary keychain for CI
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$DEVELOPER_ID_CERT" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Extract the Developer ID identity name
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "DEVELOPER_ID=$IDENTITY" >> "$GITHUB_ENV"
          echo "Imported Developer ID certificate: $IDENTITY"

      - name: Build DMG release package
        env:
          DEVELOPER_ID: ${{ env.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          VERSION="${VERSION#v}" ./scripts/build-release.sh

      - name: Sign and notarize DMG
        if: env.HAS_SIGNING_CERT == 'true'
        env:
          DEVELOPER_ID: ${{ env.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          DMG_PATH=$(ls .build/MacCrab-v*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG_PATH" ]; then
            chmod +x scripts/notarize.sh
            ./scripts/notarize.sh "$DMG_PATH"
          else
            echo "No DMG found to sign"
          fi

      - name: Cleanup signing keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

      - name: Build release binaries for tarball
        run: swift build -c release 2>&1 || echo "Binary build requires ES entitlement - packaging rules only"

      - name: Compile rules for tarball
        run: |
          mkdir -p compiled_rules
          python3 Compiler/compile_rules.py --input-dir Rules/ --output-dir compiled_rules/

      # PKG build removed in v1.6.11 — productbuild's distribution-XML
      # pkg-ref name didn't match the component pkg filename, producing
      # a 1.9KB stub archive that opened in Installer.app but contained
      # no payload. DMG + Homebrew are the supported install paths.

      - name: Package
        run: |
          mkdir -p dist/maccrab
          cp .build/release/maccrabd dist/maccrab/ 2>/dev/null || true
          cp .build/release/maccrabctl dist/maccrab/ 2>/dev/null || true
          cp -r compiled_rules dist/maccrab/
          cp -r Rules dist/maccrab/
          cp -r Compiler dist/maccrab/
          cp README.md LICENSE CONTRIBUTING.md dist/maccrab/
          cd dist && tar czf maccrab-${{ github.ref_name }}-macos-arm64.tar.gz maccrab/

      - name: Update Homebrew cask version and SHA256
        run: |
          DMG_PATH=$(ls .build/MacCrab-v*.dmg 2>/dev/null | head -1)
          CLEAN_VERSION="${VERSION#v}"
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found — Homebrew update step needs the built artifact" >&2
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')
          echo "DMG SHA256: $SHA"
          # v1.10.2 fix (audit BLOCKER): bump BOTH cask files. Pre-fix the
          # workflow only updated homebrew/maccrab.rb; Casks/maccrab.rb is
          # the canonical file Homebrew reads via the tap, and the two had
          # drifted by 40+ lines. Same shape as the v1.6.5→v1.6.13 9-stale-
          # release issue that release.sh fixed locally — CI hadn't caught up.
          for FORMULA in Casks/maccrab.rb homebrew/maccrab.rb; do
            sed -i '' "s/version \".*\"/version \"$CLEAN_VERSION\"/" "$FORMULA"
            sed -i '' "s/sha256 .*/sha256 \"$SHA\"/" "$FORMULA"
            echo "Updated $FORMULA to v$CLEAN_VERSION (sha256: $SHA)"
          done

      - name: Commit Homebrew cask update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet Casks/maccrab.rb homebrew/maccrab.rb; then
            echo "No cask changes to commit"
          else
            git add Casks/maccrab.rb homebrew/maccrab.rb
            git commit -m "chore: update Homebrew cask to ${VERSION#v}"
            # v1.10.2: removed the silent `|| echo "..."` swallow so a push
            # failure surfaces as a workflow failure rather than going to
            # logs only.
            git push origin HEAD:main
          fi

      - name: Create Release
        # Pinned to full commit SHA (v2.6.2). Mutable major-version
        # refs like @v2 can be repointed by the action author; the
        # SHA cannot. Bump in lockstep with the v2.x changelog.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/maccrab-*.tar.gz
            .build/MacCrab-v*.dmg
          generate_release_notes: true
