name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Build release binary
        run: swift build -c release

      - name: Compile rules
        run: |
          pip3 install pyyaml
          mkdir -p compiled_rules
          python3 Compiler/compile_rules.py --input-dir Rules/ --output-dir compiled_rules/

      - name: Package
        run: |
          mkdir -p dist/hawkeye
          cp .build/release/hawkeyed dist/hawkeye/
          cp .build/release/hawkctl dist/hawkeye/
          cp -r compiled_rules dist/hawkeye/
          cp -r Rules dist/hawkeye/
          cp README.md LICENSE dist/hawkeye/
          cd dist && tar czf hawkeye-${{ github.ref_name }}-macos-arm64.tar.gz hawkeye/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/hawkeye-*.tar.gz
          generate_release_notes: true
