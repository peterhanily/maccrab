# MacCrab reproducible build + SLSA provenance (self-hosted).
#
# The self-hosted half of the release pipeline. It runs the `unsigned-build`
# stage of scripts/build-release.sh ONLY — compile both arches, lipo
# universal binaries, compile rules, stamp the rule manifest — then emits
# a build-provenance attestation over those artifacts.
#
# WHY SELF-HOSTED, WHY UNSIGNED-ONLY
#   The Developer ID Application certificate and the Apple notary
#   credentials live in the trusted build Mac's login Keychain and never
#   leave it (RELEASE_PROCESS.md "Inventory of secrets"). A hosted runner
#   would have to receive those secrets — unacceptable blast radius for a
#   security tool whose signing key is catastrophic-if-leaked. So:
#     - signing + notarization stay LOCAL (operator runs the `sign` and
#       `publish` stages on the Mac, or the whole `release.sh` flow);
#     - this workflow proves the UNSIGNED build is reproducible and
#       attaches provenance the operator can cross-check against the
#       artifacts they then sign.
#
# SLSA LEVEL (S5-T2)
#   Target: SLSA Build L2 — provenance exists, is authenticated, and is
#   generated by a build service distinct from the artifact author.
#   `actions/attest-build-provenance` produces a signed in-toto SLSA v1
#   provenance statement (Sigstore-backed, recorded in the public
#   transparency log) bound to the artifact digests.
#   CAVEAT: on a SELF-HOSTED runner the build platform is operator-managed,
#   so the "hosted/isolated build service" property of L3 is NOT claimed.
#   The runner must be hardened per docs/CI-ARCHITECTURE.md (ephemeral
#   workdir, no inbound network to secrets, dedicated to MacCrab CI). The
#   provenance subject is the unsigned artifact; the operator records the
#   final signed-DMG sha256 in release.json (build-release.sh publish).
#
# REPRODUCIBILITY
#   release.sh exports a DETERMINISTIC BUILD_NUMBER (<version>.<commit-count>)
#   so re-running the same commit yields the same CFBundleVersion tuple.
#   This workflow does the same (see the Build step) so two runs of one
#   commit produce matching artifact digests modulo timestamps the compiler
#   does not embed. Divergence is a signal worth investigating.
#
# Every action is SHA-pinned (S5-T4). Refresh deliberately.
#
# Job criticality:
#   unsigned-build  ADVISORY  — does not gate merges; it is the release
#                               provenance producer. Failure means the
#                               provenance step needs attention before a
#                               release is cut, not that a PR is bad.
name: Reproducible Build (SLSA provenance)

on:
  # Provenance is meaningful for release-candidate tags and on demand.
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp (defaults to latest git tag)"
        required: false
        type: string

# attestations: write is required by actions/attest-build-provenance to
# sign + record the SLSA statement. id-token: write lets it mint the
# Sigstore OIDC identity. Nothing here needs contents:write.
permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: repro-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unsigned-build:
    name: Unsigned build + provenance (advisory)
    # Self-hosted: the trusted build Mac carries the pinned Xcode 26.x
    # toolchain. Labels must match the registered runner; `macos` +
    # `maccrab-release` keep it off any general-purpose self-hosted pool.
    runs-on: [self-hosted, macOS, maccrab-release]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # git describe needs tags for the default VERSION

      - name: Verify release toolchain pin (PASS-K)
        run: |
          set -euo pipefail
          line=$(xcodebuild -version | head -1)
          major=$(echo "$line" | sed -n 's/^Xcode \([0-9][0-9]*\).*/\1/p')
          if [ "$major" != "26" ]; then
            echo "::error::Self-hosted runner toolchain is '$line' but releases are pinned to Xcode 26.x (PASS-K)." >&2
            exit 1
          fi
          echo "Toolchain: $line"

      - name: Resolve dependencies (pinned)
        run: swift package resolve

      - name: Build (unsigned-build stage only)
        id: build
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Deterministic CFBundleVersion (matches release.sh) so a re-run
          # of this commit reuses the same tuple.
          export BUILD_NUMBER="${VERSION:-$(git describe --tags --abbrev=0 | sed 's/^v//')}.$(git rev-list --count HEAD)"
          # Run ONLY the unsigned-build stage. No signing identity, no
          # notary creds, no Apple round-trip happen in this stage.
          scripts/build-release.sh unsigned-build
          stage=".build/maccrab-stage"
          echo "stage_dir=$stage" >> "$GITHUB_OUTPUT"
          # Collect a stable artifact set + a digest manifest the
          # provenance binds to.
          ( cd "$stage" && find bin compiled_rules -type f -print0 \
              | xargs -0 shasum -a 256 ) > "$stage/UNSIGNED-DIGESTS.txt"
          echo "Built artifacts:"
          cat "$stage/UNSIGNED-DIGESTS.txt"

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maccrab-unsigned-${{ github.sha }}
          path: |
            ${{ steps.build.outputs.stage_dir }}/bin/**
            ${{ steps.build.outputs.stage_dir }}/compiled_rules/**
            ${{ steps.build.outputs.stage_dir }}/UNSIGNED-DIGESTS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Attest build provenance (SLSA v1 / Build L2)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          # Bind the provenance to every compiled binary the operator
          # will go on to sign locally. The compiled-rules manifest.json
          # already carries per-file SHA-256, so attest the binaries.
          subject-path: |
            ${{ steps.build.outputs.stage_dir }}/bin/maccrabctl
            ${{ steps.build.outputs.stage_dir }}/bin/maccrab-mcp
            ${{ steps.build.outputs.stage_dir }}/bin/MacCrabApp
            ${{ steps.build.outputs.stage_dir }}/bin/MacCrabAgent
