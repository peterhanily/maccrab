title: Hidden (Dot-Prefixed) Binary Execution
id: d1a2b3c4-0008-4000-a000-000000000008
status: experimental
description: >
    Detects execution of a binary whose file name begins with a `.`
    (hidden in Finder and most `ls` invocations). Malware commonly
    uses this to evade casual filesystem inspection. Excludes
    Apple-signed binaries and well-known dev-tool hidden-directory
    layouts (`~/.cargo/`, `~/.rustup/`, `~/.nvm/`, `~/.deno/`,
    `~/.bun/`, `~/.local/`, `~/.dotnet/`, `~/.cache/`). NOTE: title
    previously claimed network correlation but the rule is single-
    event; network co-occurrence is left to the sequence-tier rules.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1564/001/
tags:
    - attack.defense_evasion
    - attack.execution
    - attack.t1564.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        # Matches `/some/path/.binaryname` — the basename starts with `.`.
        Image|re: '/\.[^/.][^/]*$'
    filter_apple:
        PlatformBinary: 'true'
    filter_common_hidden_dirs:
        Image|contains:
            - '/.Trash/'
            - '/Contents/'
            - '/.cargo/'
            - '/.rustup/'
            - '/.nvm/'
            - '/.deno/'
            - '/.bun/'
            - '/.local/'
            - '/.dotnet/'
            - '/.cache/'
            - '/.pyenv/'
            - '/.rbenv/'
            - '/.asdf/'
            - '/.sdkman/'
            - '/.npm/'
            - '/.pnpm/'
            - '/.yarn/'
            - '/.gem/'
            - '/.go/'
            - '/.tox/'
            - '/.venv/'
            - '/.virtualenvs/'
            - '/.vscode/'
            - '/.cursor/'
    condition: selection and not filter_apple and not filter_common_hidden_dirs
falsepositives:
    - Dot-prefixed helper binaries from third-party apps that ship outside `/Contents/` (rare; review)
level: low
