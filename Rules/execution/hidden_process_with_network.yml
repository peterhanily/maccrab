title: Hidden Process Name with Network Activity
id: d1a2b3c4-0008-4000-a000-000000000008
status: experimental
description: Detects execution of binaries with hidden names (starting with a dot) that may indicate malware attempting to avoid casual observation.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1564/001/
tags:
    - attack.defense_evasion
    - attack.execution
    - attack.t1564.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|re: '/\.[^/]+$'
    filter_apple:
        SignerType: 'apple'
    filter_common:
        Image|contains:
            - '/.Trash/'
            - '/Contents/'
    condition: selection and not filter_apple and not filter_common
falsepositives:
    - Hidden helper binaries from legitimate applications
level: medium
