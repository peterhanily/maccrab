title: Python or Ruby Spawned by Office Application
id: d1a2b3c4-0004-4000-a000-000000000004
status: experimental
description: Detects scripting interpreters spawned by Microsoft Office or other productivity applications, indicating potential macro-based exploitation.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1059/
tags:
    - attack.execution
    - attack.t1059
logsource:
    category: process_creation
    product: macos
detection:
    selection_parent:
        ParentImage|contains:
            - 'Microsoft Word'
            - 'Microsoft Excel'
            - 'Microsoft PowerPoint'
            - 'Microsoft Outlook'
            - 'Pages'
            - 'Numbers'
            - 'Keynote'
    selection_child:
        Image|endswith:
            - '/python'
            - '/python3'
            - '/ruby'
            - '/perl'
            - '/node'
    condition: selection_parent and selection_child
falsepositives:
    - Legitimate Office add-ins using scripting
level: high
