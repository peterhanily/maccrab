title: Shell Spawned by Browser Process
id: d1a2b3c4-0001-4000-a000-000000000001
status: stable
description: Detects a shell interpreter spawned as a child of a browser process, which may indicate exploitation or malicious download execution.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1059/004/
tags:
    - attack.execution
    - attack.t1059.004
logsource:
    category: process_creation
    product: macos
detection:
    selection_parent:
        ParentImage|endswith:
            - '/Safari'
            - '/Google Chrome'
            - '/Google Chrome Helper'
            - '/Firefox'
            - '/Microsoft Edge'
            - '/Arc'
            - '/Brave Browser'
            - '/Opera'
    selection_child:
        Image|endswith:
            - '/sh'
            - '/bash'
            - '/zsh'
            - '/dash'
            - '/fish'
            - '/csh'
            - '/tcsh'
    condition: selection_parent and selection_child
falsepositives:
    - Browser extensions that legitimately invoke shell scripts
    - Web development tools
    - DevTools terminals (Chrome / Edge developer-extension shell)
# v1.8.0: demoted high → medium. Field FP rate was unsustainably high
# on dev machines (devtools terminals fire this dozens of times per
# session). Real exploitation chains still surface as medium and are
# correlated by sequence + campaign rules.
# v1.11.x: further demoted medium → low. Even after the v1.8.0 drop the
# FP rate on developer laptops swamped the real signal. Sequence rules
# (downloaded-binary-executes-then-shell, browser-spawns-installer-
# spawns-curl, etc.) catch the genuine exploit chains at HIGH; a bare
# browser→shell pairing is too thin on its own.
level: low
