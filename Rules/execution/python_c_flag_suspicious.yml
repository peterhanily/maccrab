title: Python One-Liner with Suspicious Imports
id: d1a2b3c4-0203-4000-a000-000000000203
status: stable
description: Detects python invocation with -c flag importing modules commonly associated with reverse shells, payload execution, or system manipulation (socket, subprocess, os, pty, base64).
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1059/006/
tags:
    - attack.execution
    - attack.t1059.006
logsource:
    category: process_creation
    product: macos
detection:
    selection_python:
        Image|endswith:
            - '/python'
            - '/python2'
            - '/python3'
        CommandLine|contains: ' -c '
    selection_suspicious_imports:
        CommandLine|contains:
            - 'import socket'
            - 'import subprocess'
            - 'import os;'
            - 'import os,'
            - 'import pty'
            - 'import base64'
            - 'import ctypes'
            - '__import__("socket")'
            - '__import__("subprocess")'
            - '__import__("os")'
    condition: selection_python and selection_suspicious_imports
falsepositives:
    - Python development and debugging one-liners
    - Legitimate system administration scripts
level: high
