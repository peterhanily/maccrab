title: osascript Executes Shell Command via do shell script
id: d1a2b3c4-0454-4000-b000-000000000454
status: experimental
description: >
    Detects osascript executing arbitrary shell commands via the 'do shell
    script' AppleScript command. This is commonly used for privilege
    escalation and code execution while appearing as legitimate AppleScript.
author: MacCrab Community
date: 2026/04/06
references:
    - https://attack.mitre.org/techniques/T1059/002/
tags:
    - attack.execution
    - attack.t1059.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/osascript'
        CommandLine|contains:
            - 'do shell script'
            - 'doShellScript'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and not filter_system and not filter_apple_signed
falsepositives:
    - Legitimate AppleScript automation
    - Finder scripts and Automator workflows
level: high
