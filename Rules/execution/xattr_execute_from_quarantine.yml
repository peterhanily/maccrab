title: Quarantine Attribute Check Followed by Execution
id: d1a2b3c4-0204-4000-a000-000000000204
status: experimental
description: Detects xattr used to inspect or remove quarantine attributes, which may indicate an attempt to bypass Gatekeeper before executing a downloaded file.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1553/001/
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1553.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/xattr'
    selection_quarantine:
        CommandLine|contains:
            - 'com.apple.quarantine'
    selection_locations:
        CommandLine|contains:
            - '/Downloads/'
            - '/tmp/'
            - '/var/tmp/'
            - '/private/tmp/'
            - '/Users/'
    condition: selection and selection_quarantine and selection_locations
falsepositives:
    - Users manually clearing quarantine on trusted downloads
    - Homebrew and package manager installations
level: medium
