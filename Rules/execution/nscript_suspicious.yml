title: osascript Loading Script from Network or Temp Path
id: d1a2b3c4-0206-4000-a000-000000000206
status: experimental
description: Detects osascript executing scripts loaded from network volumes, temp directories, or other suspicious locations. This may indicate remote script loading for payload execution.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1059/002/
tags:
    - attack.execution
    - attack.t1059.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/osascript'
    selection_network_path:
        CommandLine|contains:
            - '/Volumes/'
            - '/tmp/'
            - '/private/tmp/'
            - '/var/tmp/'
            - '/var/folders/'
            - 'smb://'
            - 'afp://'
            - '/net/'
    filter_apple:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and selection_network_path and not filter_apple
falsepositives:
    - Network-based deployment scripts
    - Legitimate Automator workflows on shared volumes
level: high
