title: Cryptocurrency Miner Process Detected
id: d1a2b3c4-0425-4000-a000-000000000425
status: experimental
description: >
    Detects execution of known cryptocurrency mining software. Cryptominers
    are commonly deployed by attackers after initial compromise to monetize
    access through unauthorized resource usage (cryptojacking).
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1496/
tags:
    - attack.execution
    - attack.impact
    - attack.t1496
logsource:
    category: process_creation
    product: macos
detection:
    selection_name:
        Image|endswith:
            - '/xmrig'
            - '/minerd'
            - '/cpuminer'
            - '/cgminer'
            - '/bfgminer'
            - '/ethminer'
            - '/phoenixminer'
            - '/t-rex'
            - '/nbminer'
            - '/gminer'
            - '/lolminer'
            - '/ccminer'
    # FP fix: dropped selection_cmdline — bare CommandLine substrings ('xmrig',
    # 'minerd', …) matched ANY argv mentioning them (a miner-killer script, a
    # security scan, documentation), and this rule is critical+suppressible:false.
    # The Image-name match (selection_name) is the reliable, high-confidence
    # signal for the actual miner binary executing.
    condition: selection_name
falsepositives:
    - Legitimate cryptocurrency mining by the system owner
    - Security research and testing
suppressible: false
level: high
