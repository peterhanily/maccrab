title: launchctl Job Registration or Bootstrap
id: d1a2b3c4-0208-4000-a000-000000000208
status: stable
description: Detects use of launchctl to dynamically register, load, or bootstrap a job. These techniques can establish persistence or execute commands while bypassing file-based detection.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1569/001/
tags:
    - attack.execution
    - attack.persistence
    - attack.t1569.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/launchctl'
        CommandLine|contains:
            - 'submit'
            - 'bootstrap'
            - 'load'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    # Homebrew Services (`brew services start ...`) shells out to
    # launchctl bootstrap/load for user-scoped LaunchAgents. Filter
    # Homebrew + common dev-tool parents (Docker, mas, mackup, etc.) to
    # stop this rule firing on every `brew services` invocation.
    filter_homebrew:
        ParentImage|startswith:
            - '/usr/local/Homebrew/'
            - '/usr/local/Cellar/'
            - '/opt/homebrew/'
        ParentImage|contains:
            - '/brew'
            - '/brew-services'
            - '/.brew/'
    filter_dev_tools:
        ParentImage|contains:
            - '/Docker.app/'
            - '/Docker Desktop.app/'
            - '/com.docker.helper'
            - '/OrbStack.app/'
            - '/colima'
            - '/lima'
            - '/podman'
            - '/Mackup'
            - '/mas'
            - '/asdf'
    condition: selection and not filter_system and not filter_apple_signed and not filter_homebrew and not filter_dev_tools
falsepositives:
    - Legitimate system administration tasks
    - Enterprise management tools
level: high
