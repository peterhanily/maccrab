title: curl or wget Download and Pipe to Shell
id: d1a2b3c4-0003-4000-a000-000000000003
status: experimental
description: Detects curl or wget output being piped to a shell interpreter, a common malware delivery technique.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1059/004/
    - https://attack.mitre.org/techniques/T1105/
tags:
    - attack.execution
    - attack.t1059.004
    - attack.command_and_control
    - attack.t1105
logsource:
    category: process_creation
    product: macos
detection:
    selection_shell:
        Image|endswith:
            - '/sh'
            - '/bash'
            - '/zsh'
    selection_pipe:
        CommandLine|contains:
            - 'curl '
            - 'wget '
            - '/dev/tcp/'
            - 'URLSession'
            - 'NSURLConnection'
    selection_execute:
        CommandLine|contains:
            - '| sh'
            - '| bash'
            - '| zsh'
            - '|sh'
            - '|bash'
            - '|zsh'
            - 'curl -s'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    # v1.18 audit: now that this survives Gate 7 on the Apple shell, suppress the
    # documented `curl -s <url> | sh` install path for well-known tools (same
    # trusted-installer set as fileless_attack_indicators) so legit dev setup
    # doesn't fire. A typosquat / off-list domain still trips it.
    filter_known_installers:
        CommandLine|contains:
            - 'sh.rustup.rs'
            - 'get.docker.com'
            - 'raw.githubusercontent.com/Homebrew/install/'
            - 'raw.githubusercontent.com/nvm-sh/nvm/'
            - 'sh.brew.sh'
            - 'install.python-poetry.org'
            - 'astral.sh/uv/install'
            - 'starship.rs/install'
            - 'fnm.vercel.app/install'
            - 'pyenv.run'
            - 'get.sdkman.io'
            - 'cli.github.com'
    condition: selection_shell and selection_pipe and selection_execute and not filter_system and not filter_known_installers
falsepositives:
    - Legitimate install scripts (Homebrew, rustup, nvm)
level: medium
