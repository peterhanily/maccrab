title: Suspicious Inline AppleScript Execution
id: d1a2b3c4-0009-4000-a000-000000000009
status: experimental
description: Detects osascript with inline script execution (-e flag) containing suspicious patterns like do shell script, HTTP requests, or system events manipulation.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1059/002/
tags:
    - attack.execution
    - attack.t1059.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/osascript'
        CommandLine|contains: ' -e '
    selection_suspicious:
        CommandLine|contains:
            - 'do shell script'
            - 'curl '
            - 'wget '
            - 'bash -'
            - 'tell application "System Events"'
            - 'keystroke'
            - 'key code'
            - 'tell application "Finder" to delete'
    condition: selection and selection_suspicious
falsepositives:
    - Legitimate automation using inline AppleScript
level: high
