title: Deep Shell Nesting Detected
id: d1a2b3c4-0435-4000-a000-000000000435
status: experimental
description: >
    Detects three or more levels of shell process nesting (e.g. sh spawns
    bash spawns zsh). Deep shell nesting is uncommon in normal usage and
    often indicates exploitation chains, post-exploitation frameworks, or
    obfuscated command execution attempting to evade detection.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1059/004/
tags:
    - attack.execution
    - attack.t1059.004
logsource:
    category: process_creation
    product: macos
detection:
    # NOTE: shells are Apple platform binaries by design; the standard
    # `not PlatformBinary` filter would disable this rule entirely.
    # FP control lives in the parent-lineage filters below.
    selection_shell:
        Image|endswith:
            - '/sh'
            - '/bash'
            - '/zsh'
            - '/dash'
            - '/fish'
            - '/tcsh'
            - '/csh'
    selection_parent_shell:
        ParentImage|endswith:
            - '/sh'
            - '/bash'
            - '/zsh'
            - '/dash'
            - '/fish'
            - '/tcsh'
            - '/csh'
    selection_grandparent_shell:
        GrandparentImage|endswith:
            - '/sh'
            - '/bash'
            - '/zsh'
            - '/dash'
            - '/fish'
            - '/tcsh'
            - '/csh'
    filter_terminal:
        GrandparentImage|endswith:
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/Ghostty'
            - '/Hyper'
            - '/login'
            - '/sshd'
            - '/tmux'
            - '/screen'
            - '/zellij'
    filter_build_systems:
        # Build tools and language runtimes commonly create deep shell
        # nesting via wrapper scripts and post-install hooks.
        GrandparentImage|endswith:
            - '/make'
            - '/gmake'
            - '/ninja'
            - '/cmake'
            - '/xcodebuild'
            - '/xcrun'
            - '/node'
            - '/npm'
            - '/npx'
            - '/pnpm'
            - '/yarn'
            - '/bun'
            - '/deno'
            - '/gradle'
            - '/gradlew'
            - '/mvnw'
            - '/mvn'
            - '/bazel'
            - '/bazelisk'
            - '/buck'
            - '/cargo'
            - '/rustup'
            - '/brew'
            - '/pip'
            - '/pip3'
            - '/uv'
            - '/poetry'
            - '/pipenv'
            - '/tox'
            - '/just'
            - '/task'
            - '/installer'
            - '/package_script_service'
    filter_env_managers:
        # Shell environment managers that legitimately spawn nested shells
        # for shimming / activation.
        GrandparentImage|endswith:
            - '/direnv'
            - '/asdf'
            - '/mise'
            - '/nvm'
            - '/pyenv'
            - '/rbenv'
            - '/jenv'
            - '/sdkman-init.sh'
            - '/sdk'
    filter_ci_cd:
        # CI/CD agents and automation tools
        GrandparentImage|contains:
            - 'jenkins'
            - 'buildkite'
            - 'github-actions'
            - 'gitlab-runner'
            - 'circleci'
            - 'concourse'
            - 'teamcity'
            - 'TeamCity'
            - 'drone'
            - 'Runner.Listener'
            - 'fastlane'
    condition: selection_shell and selection_parent_shell and selection_grandparent_shell and not filter_terminal and not filter_build_systems and not filter_env_managers and not filter_ci_cd
falsepositives:
    - Complex shell scripts calling sub-shells outside the build-system / env-manager lineage — extend filters as you observe new tooling
    - Terminal multiplexers (tmux, screen, zellij) with nested sessions — already filtered
level: medium
