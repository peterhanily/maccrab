title: osascript Spawned by Non-Apple Parent
id: d1a2b3c4-0002-4000-a000-000000000002
status: experimental
description: Detects osascript (AppleScript/JXA) execution from a non-Apple parent process, commonly used for social engineering and payload delivery.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1059/002/
tags:
    - attack.execution
    - attack.t1059.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/osascript'
    filter_apple_parents:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/Applications/Xcode'
    filter_automator:
        ParentImage|contains: 'Automator'
    condition: selection and not filter_apple_parents and not filter_automator
falsepositives:
    - Legitimate automation workflows using osascript
    - Homebrew and package managers
    - Hammerspoon, Alfred, Keyboard Maestro, BetterTouchTool, Raycast, Karabiner-Elements automation triggers
    - Slack / Zoom / Microsoft Teams invoking osascript for "Open in Calendar" or notification flows
# v1.11.x: demoted medium → low. osascript is the canonical macOS
# automation hook for productivity apps (Alfred, Hammerspoon, Keyboard
# Maestro, Raycast). Real social-engineering payloads still surface via
# sequence + JXA rules; this single-event rule is a weak indicator.
level: low
