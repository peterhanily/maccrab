title: Ruby or Perl Spawned by Application Bundle
id: d1a2b3c4-0200-4000-a000-000000000200
status: experimental
description: Detects Ruby or Perl interpreter execution spawned by a macOS application bundle. Malware may embed scripts in .app bundles to execute payloads while appearing as a legitimate application.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1059/006/
    - https://attack.mitre.org/techniques/T1059/
tags:
    - attack.execution
    - attack.t1059.006
logsource:
    category: process_creation
    product: macos
detection:
    selection_interpreter:
        Image|endswith:
            - '/ruby'
            - '/perl'
            - '/perl5'
    selection_parent:
        ParentImage|contains: '.app/Contents/'
    filter_xcode:
        ParentImage|contains:
            - '/Xcode.app/'
            - '/RubyMine.app/'
            - '/iTerm2.app/'
            - '/iTerm.app/'
            - '/Terminal.app/'
            - '/Alacritty.app/'
            - '/kitty.app/'
            - '/WezTerm.app/'
            - '/Warp.app/'
            - '/Ghostty.app/'
            - '/Hyper.app/'
            - '/Visual Studio Code.app/'
            - '/Cursor.app/'
            - '/Sublime Text.app/'
            - '/IntelliJ IDEA.app/'
            - '/IntelliJ IDEA CE.app/'
            - '/PyCharm.app/'
            - '/WebStorm.app/'
            - '/GoLand.app/'
            - '/PhpStorm.app/'
            - '/CLion.app/'
            - '/Android Studio.app/'
            - '/Atom.app/'
            - '/Nova.app/'
            - '/Zed.app/'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection_interpreter and selection_parent and not filter_xcode and not filter_system
falsepositives:
    - Development IDEs that launch Ruby/Perl
    - Legitimate automation tools
level: medium
