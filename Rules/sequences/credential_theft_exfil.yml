title: Credential File Access Followed by Network Upload
id: e1f2a3b4-0009-4000-b000-000000000009
status: experimental
description: >
    Detects access to credential stores (keychain, browser data, SSH keys)
    followed by outbound network activity from the same process — indicates
    active credential exfiltration.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1555/
tags:
    - attack.credential_access
    - attack.exfiltration
    - attack.t1555
    - attack.t1041

type: sequence
window: 60s
correlation: process.same
ordered: true

steps:
    - id: cred_read
      logsource:
          category: file_event
          product: macos
      detection:
          selection:
              TargetFilename|contains:
                  - 'login.keychain-db'
                  - '/Cookies'
                  - '/Login Data'
                  - '/.ssh/id_'
                  - '/Chrome/Default/'
          filter_apple:
              SignerType: 'apple'
          filter_system_path:
              Image|startswith:
                  - '/System/'
                  - '/usr/libexec/'
                  - '/usr/sbin/'
                  - '/Library/Apple/'
          # v1.6.5: Apple-daemon basename allowlist. Field data showed
          # /usr/libexec/networkserviceproxy firing this sequence at
          # CRITICAL despite filter_system_path. networkserviceproxy is
          # Apple's Network Extension control daemon — it legitimately
          # reads cookie DBs (Safari sync) and opens public-internet
          # connections (NSURLSession on behalf of the user). Sequence
          # engine per-step filter evaluation can race with SignerType
          # enrichment, so anchor on well-known Apple daemon basenames
          # that participate in browser / keychain / network activity.
          filter_apple_daemons:
              Image|endswith:
                  - '/networkserviceproxy'
                  - '/nsurlsessiond'
                  - '/trustd'
                  - '/apsd'
                  - '/accountsd'
                  - '/CommCenter'
                  - '/identityservicesd'
                  - '/cloudd'
                  - '/bird'
                  - '/fileproviderd'
                  - '/PasswordsKit'
                  - '/keychainsharingmessagingd'
                  - '/AMPDeviceDiscoveryAgent'
                  - '/SafariBookmarksSyncAgent'
                  - '/rapportd'
                  - '/parsecd'
          condition: selection and not filter_apple and not filter_system_path and not filter_apple_daemons

    - id: exfil
      logsource:
          category: network_connection
          product: macos
      detection:
          selection:
              DestinationIsPrivate: 'false'
          condition: selection
      process: cred_read.same

trigger: all
falsepositives:
    - Password managers (1Password, Bitwarden) syncing vault data to their cloud backends
    - Browsers (Chrome, Edge) syncing cookie/login databases to user cloud profiles
    - Backup software (Time Machine helpers, Backblaze, Arq) reading keychain/SSH config during scheduled backups
    - Cloud sync agents (Dropbox, iCloud) reading files under browser profile directories
level: high
# v1.4.2: lowered from critical to high. Critical bypasses NoiseFilter
# Gate 3 (trusted-browser-helper suppression), so every Chrome/Edge/
# Firefox helper legitimately reading its own Cookies DB and syncing to
# Google/Microsoft/Mozilla fired at critical. At high, Gate 3 drops the
# match for processes under a trusted browser bundle; a non-browser
# process doing credential-read→upload still fires at high — which is
# the right severity for unconfirmed exfil from an unknown process.
# User's field data: 22 critical FPs on Google Chrome Helper alone.
