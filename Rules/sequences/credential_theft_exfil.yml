title: Credential File Access Followed by Network Upload
id: e1f2a3b4-0009-4000-b000-000000000009
status: experimental
description: >
    Detects access to credential stores (keychain, browser data, SSH keys)
    followed by outbound network activity from the same process — indicates
    active credential exfiltration.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1555/
tags:
    - attack.credential_access
    - attack.exfiltration
    - attack.t1555
    - attack.t1041

type: sequence
window: 60s
correlation: process.same
ordered: true

steps:
    - id: cred_read
      logsource:
          category: file_event
          product: macos
      detection:
          selection:
              TargetFilename|contains:
                  - 'login.keychain-db'
                  - '/Cookies'
                  - '/Login Data'
                  - '/.ssh/id_'
                  - '/Chrome/Default/'
          condition: selection

    - id: exfil
      logsource:
          category: network_connection
          product: macos
      detection:
          selection:
              DestinationIsPrivate: 'false'
          condition: selection
      process: cred_read.same

trigger: all
level: critical
