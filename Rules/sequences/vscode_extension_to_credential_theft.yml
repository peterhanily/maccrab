title: VS Code Extension Steals Credentials and Establishes C2 (GlassWorm-style)
id: e1f2a3b4-0022-4000-b000-000000000022
status: experimental
description: >
    Detects a VS Code extension host process reading credential files and then
    making outbound network connections — the GlassWorm worm pattern that stole
    npm/GitHub/Git credentials and crypto wallets via malicious extensions.
author: MacCrab Community
date: 2026/03/31
references:
    - https://www.truesec.com/hub/blog/glassworm-self-propagating-vscode-extension
    - https://www.aikido.dev/blog/glassworm-returns-unicode-attack-github-npm-vscode
tags:
    - attack.initial_access
    - attack.credential_access
    - attack.command_and_control
    - attack.t1195.001
    - attack.t1552.001

type: sequence
window: 30s
correlation: process.lineage
ordered: true

steps:
    - id: extension_process
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              ParentImage|contains:
                  - 'Code Helper'
                  - 'Electron'
                  - 'code-server'
              Image|endswith:
                  - '/node'
                  - '/sh'
                  - '/bash'
          condition: selection

    - id: cred_read
      logsource:
          category: file_event
          product: macos
      detection:
          selection:
              TargetFilename|contains:
                  - '/.npmrc'
                  - '/.gitconfig'
                  - '/.git-credentials'
                  - '/.ssh/'
                  - '/.aws/'
          condition: selection
      process: extension_process.descendant

    - id: exfil
      logsource:
          category: network_connection
          product: macos
      detection:
          selection:
              DestinationIsPrivate: 'false'
          filter_microsoft:
              DestinationIp|startswith:
                  - '13.'
                  - '20.'
                  - '40.'
                  - '52.'
                  - '104.'
          condition: selection and not filter_microsoft
      process: extension_process.descendant

trigger: cred_read and exfil
level: critical
