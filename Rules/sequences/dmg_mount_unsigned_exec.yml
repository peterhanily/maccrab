title: DMG Mount Followed by Unsigned Binary Execution
id: e1f2a3b4-0012-4000-b000-000000000012
status: experimental
description: >
    Detects a disk image being mounted followed by execution of an unsigned
    binary, a common malware delivery method via trojanized DMGs.
author: MacCrab Community
date: 2026/03/31
tags:
    - attack.initial_access
    - attack.execution
    - attack.t1204.002

type: sequence
window: 60s
correlation: none
ordered: true

steps:
    - id: mount
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|endswith: '/hdiutil'
              CommandLine|contains: 'attach'
          condition: selection

    - id: execute
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|startswith: '/Volumes/'
          filter_signed:
              SignerType:
                  - 'apple'
                  - 'devId'
          condition: selection and not filter_signed

trigger: all
level: high
