title: Quarantine Removal Followed by Execution
id: e1f2a3b4-0006-4000-b000-000000000006
status: stable
description: >
    Detects removal of quarantine attribute from a file followed by execution
    of a binary from the same directory — classic Gatekeeper bypass pattern.
author: HawkEye Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1553/001/
tags:
    - attack.defense_evasion
    - attack.execution
    - attack.t1553.001

type: sequence
window: 30s
correlation: process.lineage
ordered: true

steps:
    - id: dequarantine
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|endswith: '/xattr'
              CommandLine|contains: 'com.apple.quarantine'
          condition: selection

    - id: execute
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|contains: '/Downloads/'
          filter_signed:
              SignerType:
                  - 'apple'
                  - 'devId'
          condition: selection and not filter_signed
      after: dequarantine

trigger: all
level: high
