title: node Process Reads Multiple Credential Files Shortly After /node_modules/ Spawn (node-ipc / require-time)
id: 9c2d052b-a8ce-43fc-a1a9-5ee9c86f0682
status: experimental
description: >
    Detects the require()-time credential-harvest pattern used by
    the node-ipc compromised versions (9.1.6 / 9.2.3 / 12.0.1) and
    by the Mini Shai-Hulud / GhostLoader payloads: a Node process
    whose argv references a path under /node_modules/ (i.e., the
    payload runs as soon as a module is required) is followed
    within 5 seconds by reads of multiple developer credential
    files in the same process or its descendants. The Sigma
    sequence engine here uses ordered correlation; only the first
    credential read is required to fire the rule, but the
    description ties the IOC back to the bulk pattern, and the
    `developer_credential_bulk_harvest` single-event rule covers
    the bulk-fan-out half once any of the reads clear the engine.
    Pairs with `node_modules_spawns_binary.yml` (the binary-drop
    variant) and `worm_self_propagation_signal.yml` (the
    publish-loop variant).
author: MacCrab Team
date: 2026/05/17
references:
    - https://snyk.io/blog/peacenotwar-node-ipc-supply-chain-2022
    - https://securityweek.com/node-ipc-malicious-update-2022/
    - https://www.aikido.dev/blog/openclaw-ghostloader-macos-postinstall-credential-phish-2026
    - https://attack.mitre.org/techniques/T1059/007/
    - https://attack.mitre.org/techniques/T1555/
    - https://attack.mitre.org/techniques/T1552/

type: sequence
window: 5s
correlation: process.lineage
ordered: true

tags:
    - attack.execution
    - attack.t1059.007
    - attack.credential_access
    - attack.t1555
    - attack.t1552
    - attack.initial_access
    - attack.t1195.001

steps:
    - id: node_module_require
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|endswith:
                  - '/node'
                  - '/bun'
                  - '/deno'
              CommandLine|contains:
                  - '/node_modules/'
          condition: selection

    - id: cred_read
      logsource:
          category: file_event
          product: macos
      detection:
          selection:
              TargetFilename|contains:
                  - '/.npmrc'
                  - '/.pypirc'
                  - '/.aws/credentials'
                  - '/.aws/config'
                  - '/.ssh/id_'
                  - '/.ssh/identity'
                  - '/.config/gh/hosts.yml'
                  - '/.gem/credentials'
                  - '/.cargo/credentials'
                  - '/.netrc'
                  - '/.git-credentials'
                  - '/.config/gcloud/'
                  - '/.kube/config'
                  - '/.docker/config.json'
                  - '/.env'
              FileAction: 'close'
          condition: selection
      process: node_module_require.descendant

trigger: all
falsepositives:
    - A legitimate Node CLI (eg. dotenv-cli, aws-sdk-bootstrap, gh-token-installer) that is itself shipped via /node_modules/ and legitimately reads dotfiles during normal use; review the parent CommandLine and the package identity
    - A multi-runtime version manager (proto / asdf / mise) loaded under /node_modules/ whose first action after install is to mirror dotfile state — allowlist by image
    - CI runners replaying a deployment script via npm exec whose first action is to read .npmrc + .aws/credentials — interactive parents are filtered upstream by the single-event credential rules; this sequence cannot disambiguate purely from process lineage
suppressible: false
level: high