title: File Download Followed by Cryptominer Execution
id: e1f2a3b4-0017-4000-b000-000000000017
status: experimental
description: >
    Detects a two-stage pattern: a file downloaded from the internet (curl, wget,
    or browser download) followed within 5 minutes by execution of a known
    cryptocurrency miner binary or a process with mining pool CLI arguments.
    Drive-by miner installs via malicious brew formulae, PyPI packages, or
    social engineering are common on macOS.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1496/
    - https://attack.mitre.org/techniques/T1105/
tags:
    - attack.impact
    - attack.t1496
    - attack.command_and_control
    - attack.t1105

type: sequence
window: 300s
ordered: true
correlation: process.lineage

steps:
    - id: download
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|endswith:
                  - '/curl'
                  - '/wget'
                  - '/python3'
                  - '/python'
              CommandLine|re: 'https?://[^\s]+'
          condition: selection

    - id: miner_exec
      logsource:
          category: process_creation
          product: macos
      detection:
          selection_name:
              Image|endswith:
                  - '/xmrig'
                  - '/cpuminer'
                  - '/cpuminer-multi'
                  - '/cgminer'
                  - '/bfgminer'
                  - '/minerd'
                  - '/ethminer'
                  - '/t-rex'
                  - '/lolminer'
          selection_args:
              CommandLine|contains:
                  - '--donate-level'
                  - '-o stratum+'
                  - 'pool.minexmr'
                  - 'xmrpool'
                  - 'nicehash.com'
          condition: selection_name or selection_args

trigger: download and miner_exec
falsepositives:
    - Blockchain developers or researchers intentionally running xmrig/cpuminer for local benchmarking
    - Hobbyist mining setups where the user knowingly installs and runs a miner
    - GPU/CPU benchmark suites that include miner binaries for hashrate measurement
level: high
