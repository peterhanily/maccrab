title: AI Tool Reads Credentials Then Makes Network Connection
id: e1f2a3b4-0029-4000-b000-000000000029
status: experimental
description: >
    Detects an AI coding tool reading credential files (SSH keys, AWS
    credentials, API keys, browser password stores, .env files) followed
    by an outbound network connection to an external host. This sequence
    is the core exfiltration pattern for prompt-injection attacks against
    AI agents: the injected instruction reads a credential, and the agent
    carries out the exfil via a legitimate-looking tool call.
author: MacCrab Community
date: 2026/04/22
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1071/
tags:
    - attack.credential_access
    - attack.exfiltration
    - attack.ai_safety
    - attack.t1552
    - attack.t1071

type: sequence
window: 60s
correlation: process.lineage
ordered: true

steps:
    - id: cred_read
      logsource:
          category: file_event
          product: macos
      detection:
          selection_cred_paths:
              TargetFilename|contains:
                  - '/.ssh/id_'
                  - '/.aws/credentials'
                  - '/.aws/config'
                  - '/.config/gcloud'
                  - '/Library/Keychains'
                  - '/.gnupg/secring'
                  - '/.netrc'
                  - '/.npmrc'
                  - '/.pypirc'
                  - '/.env'
              Image|contains:
                  - 'claude'
                  - 'cursor'
                  - 'copilot'
                  - 'aider'
                  - 'cline'
                  - 'windsurf'
                  - 'continue'
                  - 'cody'
          condition: selection_cred_paths

    - id: network_exfil
      logsource:
          category: network_connection
          product: macos
      detection:
          selection:
              DestinationIsPrivate: 'false'
          condition: selection
      process: cred_read.same_tree

trigger: all
falsepositives:
    - AI tools legitimately reading .env files during project setup and then making
      authenticated API calls to project services (developers should review the destination)
level: critical
