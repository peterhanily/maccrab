title: pip Install Triggers Credential Harvesting (LiteLLM-style)
id: e1f2a3b4-0021-4000-b000-000000000021
status: stable
description: >
    Detects a pip install triggering Python code that reads multiple credential
    stores — SSH keys, cloud configs, env files. Based on the March 2026 TeamPCP/LiteLLM
    attack where a malicious .pth file harvested credentials on every Python startup.
author: MacCrab Community
date: 2026/03/31
references:
    - https://www.truesec.com/hub/blog/malicious-pypi-package-litellm-supply-chain-compromise
    - https://www.wiz.io/blog/threes-a-crowd-teampcp-trojanizes-litellm-in-continuation-of-campaign
tags:
    - attack.initial_access
    - attack.credential_access
    - attack.t1195.001
    - attack.t1552.001

type: sequence
window: 30s
correlation: process.lineage
ordered: true

steps:
    - id: pip_install
      logsource:
          category: process_creation
          product: macos
      detection:
          selection:
              Image|endswith:
                  - '/pip'
                  - '/pip3'
                  - '/python'
                  - '/python3'
              CommandLine|contains:
                  - 'pip install'
                  - 'pip3 install'
          condition: selection

    - id: cred_access
      logsource:
          category: file_event
          product: macos
      detection:
          selection:
              TargetFilename|contains:
                  - '/.ssh/id_'
                  - '/.aws/credentials'
                  - '/.azure/'
                  - '/.config/gcloud/'
                  - '/.kube/config'
                  - '/.env'
                  - '/.gitconfig'
                  - '/.npmrc'
          condition: selection
      process: pip_install.descendant

trigger: all
falsepositives:
    - Legitimate DevOps tooling (awscli, azure-cli, google-cloud-sdk, kubectl helpers) that read ~/.aws or ~/.kube/config on first run after pip install
    - Dotenv-loading libraries (python-dotenv) reading .env files during project bootstrap
    - Python tools like pre-commit or git-python that read .gitconfig shortly after installation
level: critical
