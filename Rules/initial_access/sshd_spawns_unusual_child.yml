title: sshd Spawns Unusual Child Process
id: d1a2b3c4-0413-4000-a000-000000000413
status: experimental
description: Detects sshd spawning processes other than the standard login chain (user shell, login, sshd-session). An SSH server spawning unexpected child processes such as curl, python, perl, or nc may indicate exploitation of the SSH service itself, abuse of authorized_keys command restrictions, or post-authentication malicious activity from a compromised account.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1190/
    - https://attack.mitre.org/techniques/T1021/004/
tags:
    - attack.initial_access
    - attack.t1190
logsource:
    category: process_creation
    product: macos
detection:
    selection_parent:
        ParentImage|endswith: '/sshd'
    filter_standard_login:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/tcsh'
            - '/csh'
            - '/login'
            - '/sshd'
            - '/sshd-session'
            - '/sftp-server'
            - '/scp'
            - '/passwd'
    filter_apple:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection_parent and not filter_standard_login and not filter_apple
falsepositives:
    - SSH ForceCommand configurations that run specific binaries
    - Automated deployment tools connecting over SSH
    - Git over SSH operations spawning git-receive-pack or git-upload-pack
level: medium
