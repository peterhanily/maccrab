title: DMG Mounted from User-Writable Staging Path
id: d1a2b3c4-0070-4000-a000-000000000070
status: experimental
description: >
    Detects `hdiutil attach` mounting a disk image staged in a
    world-writable directory (`/tmp`, `/private/tmp`, `~/Downloads`,
    `~/Library/Caches`) when invoked by a non-installer, non-browser
    parent. Apple's own Installer.app, App Store, browsers, and
    signed third-party installers all stage DMGs in
    `/private/var/folders/` — that path is INTENTIONALLY excluded
    because every macOS update / pkg install uses it.
    What's left is the social-engineering pattern: malware staged
    in `/tmp` by a downloader (curl piped to a shell), or a "double-
    click DMG dropped from chat" run from `~/Downloads` with no
    parent browser context. Severity LOW because without downstream
    correlation (mounted volume contains an unsigned .app, then a
    LaunchAgent gets written from that volume) the signal alone
    fires on legitimate niche use (developer DMG testing, AppCleaner
    drag-installs). A v1.13 sequence rule should chain this with
    `mounted_volume_unsigned_app_executed` for HIGH severity.
author: MacCrab Community
date: 2026/03/31
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1204/002/
    - https://www.intego.com/mac-security-blog/atomic-stealer-macos-malware/
tags:
    - attack.initial_access
    - attack.t1204.002
logsource:
    category: process_creation
    product: macos
detection:
    selection_attach:
        Image|endswith: '/hdiutil'
        CommandLine|contains: 'attach'
    selection_path:
        CommandLine|contains:
            - '/tmp/'
            - '/private/tmp/'
            - '/Downloads/'
            - '/Library/Caches/'
            - '/.Trash/'
    # macOS' own staging area for signed installers — excluded.
    # Apple Installer, App Store, every notarized .pkg writes here.
    filter_apple_staging:
        CommandLine|contains:
            - '/private/var/folders/'
            - '/var/folders/'
    # Trusted installer / packaging contexts.
    filter_installer_parent:
        ParentImage|endswith:
            - '/Installer'
            - '/installd'
            - '/softwareupdated'
            - '/storeagent'
            - '/storedownloadd'
            - '/AppStore'
            - '/com.apple.installer'
            - '/Munki'
            - '/munki-pkg'
    # Browser-initiated downloads are the legitimate "user double-
    # clicked DMG from web" path. Still suspicious in aggregate but
    # filtered here — covered by the download_origin family of rules
    # which actually parse quarantine xattrs.
    filter_browser_parent:
        ParentImage|endswith:
            - '/Safari'
            - '/Google Chrome'
            - '/Firefox'
            - '/Brave Browser'
            - '/Microsoft Edge'
            - '/Arc'
    condition: selection_attach and selection_path and not (filter_apple_staging or filter_installer_parent or filter_browser_parent)
falsepositives:
    - Developer DMG testing (`hdiutil attach` from a build script in /tmp)
    - Forensics tooling that mounts evidence images from staging paths
    - Homebrew cask DMG installers — should be filtered by parent (brew)
level: low
