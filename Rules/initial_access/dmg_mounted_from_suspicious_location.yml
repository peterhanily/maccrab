title: DMG Mounted from Suspicious Location
id: d1a2b3c4-0070-4000-a000-000000000070
status: experimental
description: Detects hdiutil mounting disk images from temporary or staging directories.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1204/002/
tags:
    - attack.initial_access
    - attack.t1204.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/hdiutil'
        CommandLine|contains: 'attach'
    selection_path:
        CommandLine|contains:
            - '/tmp/'
            - '/private/tmp/'
            - '/var/folders/'
    condition: selection and selection_path
falsepositives:
    - Software installers using temporary staging
level: medium
