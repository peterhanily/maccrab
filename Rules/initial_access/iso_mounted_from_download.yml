title: ISO or DMG Mounted from Downloads Directory
id: d1a2b3c4-0128-4000-b000-000000000128
status: experimental
description: Detects mounting of ISO or DMG disk images located in user Downloads directories. Threat actors commonly deliver malware via disk images downloaded from the internet, as ISO files may bypass Gatekeeper checks and Mark-of-the-Web in some configurations.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1204/002/
tags:
    - attack.initial_access
    - attack.t1204.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/hdiutil'
        CommandLine|contains: 'attach'
    selection_downloads:
        CommandLine|contains: '/Downloads/'
    selection_image_type:
        CommandLine|contains:
            - '.iso'
            - '.dmg'
            - '.img'
            - '.sparseimage'
            - '.sparsebundle'
    condition: selection and selection_downloads and selection_image_type
falsepositives:
    - Users mounting legitimate software installers downloaded from trusted sources
    - IT departments distributing software via disk images
level: medium
