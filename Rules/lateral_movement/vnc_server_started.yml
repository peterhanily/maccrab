title: VNC Server Started or Screen Sharing Activated
id: d1a2b3c4-0291-4000-a000-000000000291
status: stable
description: Detects VNC server startup or screen sharing daemon activation. Adversaries may start VNC/screen sharing services to gain remote graphical access to the compromised system.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1021/005/
tags:
    - attack.lateral_movement
    - attack.t1021.005
logsource:
    category: process_creation
    product: macos
detection:
    selection_screensharing:
        Image|endswith:
            - '/screensharingd'
            - '/ScreensharingAgent'
    selection_vnc_binary:
        Image|contains:
            - 'vncserver'
            - 'x11vnc'
            - 'tightvnc'
            - 'RealVNC'
    selection_launchctl:
        Image|endswith: '/launchctl'
        CommandLine|contains:
            - 'com.apple.screensharing'
            - 'com.apple.ScreenSharing'
    selection_defaults:
        Image|endswith: '/defaults'
        CommandLine|contains:
            - 'com.apple.ScreenSharing'
            - 'VNCAlwaysStartOnConsole'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: (selection_screensharing or selection_vnc_binary or selection_launchctl or selection_defaults) and not filter_system
falsepositives:
    - Legitimate screen sharing sessions
    - Remote support tools
level: high
