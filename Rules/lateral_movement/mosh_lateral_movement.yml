title: Mosh (Mobile Shell) Remote Session from Unsigned Process
id: a1b2c3d4-1012-4000-b000-000000001012
status: experimental
description: |
  Detects the mosh client being launched from an unsigned or ad-hoc signed process.
  Mosh establishes encrypted remote sessions using UDP, which is often less
  scrutinised than TCP/22 SSH traffic by network monitoring tools. Attackers may
  prefer mosh over SSH to evade network-level SSH detection rules, and to maintain
  persistent sessions that survive network interruptions during lateral movement
  operations.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1021/004/
tags:
    - attack.lateral_movement
    - attack.t1021.004
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/mosh'
            - '/mosh-client'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate developers using mosh for remote development sessions
level: low
