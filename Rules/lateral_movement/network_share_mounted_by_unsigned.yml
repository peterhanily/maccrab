title: Network File Share Mounted by Unsigned Process
id: a1b2c3d4-1004-4000-b000-000000001004
status: experimental
description: |
  Detects mount_smbfs, mount_afp, or the mount command being used to attach
  remote network shares by processes that are not Apple or App Store signed.
  Attackers mount network shares to browse file systems on remote hosts, exfiltrate
  data, or stage files for lateral movement without triggering network connection
  alerts on the destination host.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1021/002/
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/mount_smbfs'
            - '/mount_afp'
            - '/mount_nfs'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
    filter_finder:
        ParentImage|endswith:
            - '/Finder'
    condition: selection and not filter_apple and not filter_finder
falsepositives:
    - Backup software mounting NAS shares
    - Time Machine, CCC, or similar backup tools
level: medium
