title: Suspicious SSH from Script-like or Non-Interactive Parent
id: a1b2c3d4-1007-4000-b000-000000001007
status: experimental
description: |
  Detects an SSH client spawned by a shell or scripting interpreter that is
  itself running non-interactively (no controlling TTY) and whose parent is
  not an Apple-signed component. This pattern is characteristic of an
  automated lateral-movement script that SSHes to another host, but is
  intentionally a SINGLE-EVENT signal: Sigma has no temporal/sequence
  semantics, so the prior "Multiple SSH Connections Spawned Rapidly by Same
  Parent" framing was misleading. Real burst/mass detection is delegated to
  the sequence engine (Rules/sequences/). Rule renamed from
  "Multiple SSH Connections Spawned Rapidly by Same Parent".
author: MacCrab Community
date: 2026/04/08
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1021/004/
    - https://attack.mitre.org/techniques/T1570/
tags:
    - attack.lateral_movement
    - attack.t1021.004
    - attack.t1570
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/ssh'
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/python'
            - '/python3'
            - '/ruby'
            - '/perl'
            - '/osascript'
            - '/launchd'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
    filter_apple_parent:
        ParentSignerType: 'apple'
    filter_ide_parent:
        # IDE-spawned shells frequently run without a /dev/tty even though
        # a human is driving them. Exclude common dev tools.
        ParentImage|endswith:
            - '/Cursor'
            - '/Code'
            - '/Code Helper'
            - '/Xcode'
            - '/iTerm2'
            - '/Terminal'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
    condition: selection and not filter_apple and not filter_apple_parent and not filter_ide_parent
falsepositives:
    - Ansible, Fabric, Paramiko-based automation scripts run from a deployment host
    - Legitimate parallel SSH tools (pssh, cssh)
    - CI runners and remote-build steps that SSH to fleet hosts
level: low
