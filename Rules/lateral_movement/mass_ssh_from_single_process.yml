title: Multiple SSH Connections Spawned Rapidly by Same Parent
id: a1b2c3d4-1007-4000-b000-000000001007
status: experimental
description: |
  Detects a shell or script interpreter spawning multiple SSH child processes in
  quick succession, which is characteristic of automated lateral movement scripts
  that SSH to many hosts simultaneously to spread malware, install backdoors, or
  execute commands across an internal network.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1021/004/
    - https://attack.mitre.org/techniques/T1570/
tags:
    - attack.lateral_movement
    - attack.t1021.004
    - attack.t1570
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/ssh'
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/python3'
            - '/python'
            - '/ruby'
            - '/perl'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
    condition: selection and not filter_apple
falsepositives:
    - Ansible, Fabric, Paramiko-based automation scripts
    - Legitimate parallel SSH tools (pssh, cssh)
level: medium
