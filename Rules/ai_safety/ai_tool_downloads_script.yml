title: AI Coding Tool Downloads and Executes Script
id: d1a2b3c4-2004-4000-a000-000000002004
status: stable
description: >
    Detects when a process spawned by an AI tool downloads content and
    pipes it to a shell for execution. This is a high-risk pattern that
    could indicate prompt injection causing the AI to fetch malicious code.
author: MacCrab Community
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1059/004/
tags:
    - attack.execution
    - attack.t1059.004
logsource:
    category: process_creation
    product: macos
detection:
    selection_download:
        CommandLine|contains:
            - 'curl'
            - 'wget'
    selection_pipe_exec:
        CommandLine|contains:
            - '| sh'
            - '| bash'
            - '| zsh'
            - '| python'
    selection_ai_parent:
        ProcessAncestors|contains:
            - '/claude'
            - '/claude-code'
            - '/Cursor'
            - '/cursor'
            - '/copilot'
            - '/gh-copilot'
            - '/codex'
            - '/aider'
            - '/continue'
            - '/cody'
            - '/zed'
            - '/windsurf'
            - '/Goose'
            - '/goose'
            - 'Claude.app'
            - 'Cursor.app'
            - 'Zed.app'
            - 'Windsurf.app'
            - 'Visual Studio Code.app'
            - '/Code Helper'
    # v1.18 audit: an AI assistant running a documented `curl <url> | sh` install
    # (Homebrew, rustup, docker, …) is benign dev setup. Suppress the well-known
    # installer endpoints (same set as fileless_attack_indicators); an off-list /
    # typosquat domain still fires.
    filter_known_installers:
        CommandLine|contains:
            - 'sh.rustup.rs'
            - 'get.docker.com'
            - 'raw.githubusercontent.com/Homebrew/install/'
            - 'raw.githubusercontent.com/nvm-sh/nvm/'
            - 'sh.brew.sh'
            - 'install.python-poetry.org'
            - 'astral.sh/uv/install'
            - 'starship.rs/install'
            - 'fnm.vercel.app/install'
            - 'pyenv.run'
            - 'get.sdkman.io'
            - 'cli.github.com'
    condition: selection_download and selection_pipe_exec and selection_ai_parent and not filter_known_installers
falsepositives:
    - Legitimate installation scripts (Homebrew, rustup, nvm)
level: medium
