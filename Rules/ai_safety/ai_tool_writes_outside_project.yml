title: AI Tool Process Writes File Outside Project Directory
id: d1a2b3c4-2009-4000-a000-000000002009
status: experimental
description: >
    Detects when a process spawned by an AI coding tool writes files outside
    the project directory where the AI session was started. This may indicate
    prompt injection causing scope creep or system modification.
author: MacCrab Community
date: 2026/04/04
tags:
    - attack.defense_evasion
    - attack.t1036
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/Library/LaunchAgents/'
            - '/Library/LaunchDaemons/'
            - '/.zshrc'
            - '/.bashrc'
            - '/.bash_profile'
            - '/Library/Security/'
    condition: selection
falsepositives:
    - AI tools legitimately modifying shell configuration at user request
level: high
