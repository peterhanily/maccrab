title: AI Coding Tool Accesses AWS Credentials
id: d1a2b3c4-2008-4000-a000-000000002008
status: stable
description: >
    Detects access to AWS credential files. AI coding tools should not
    need to read cloud provider credentials during code generation.
author: MacCrab Community
date: 2026/04/04
tags:
    - attack.credential_access
    - attack.t1552.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/.aws/credentials'
            - '/.aws/config'
            - '/gcloud/credentials'
            - '/.azure/'
    condition: selection
falsepositives:
    - AWS CLI operations, terraform apply, cloud deployment scripts
level: high
