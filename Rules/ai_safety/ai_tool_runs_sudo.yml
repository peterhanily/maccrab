title: AI Coding Tool Child Runs Sudo
id: d1a2b3c4-2002-4000-a000-000000002002
status: stable
description: >
    Detects when a process spawned by an AI coding tool attempts to use
    sudo for privilege escalation. AI tools should rarely need root access.
author: MacCrab Community
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1548/003/
tags:
    - attack.privilege_escalation
    - attack.t1548.003
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/sudo'
        ParentImage|contains:
            - 'claude'
            - 'codex'
            - 'openclaw'
            - 'Cursor'
    condition: selection
falsepositives:
    - Installing system packages that legitimately require sudo
level: high
