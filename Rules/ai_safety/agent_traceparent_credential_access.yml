title: Agent Read Credential Material (Traceparent-Bound)
id: d1a2b3c4-2052-4000-a000-000000002052
status: stable
description: >
    A high-confidence agent-attributed (TRACEPARENT-bound) process
    accessed credential material — SSH private keys, AWS credentials,
    cloud SDK tokens, or browser-extension wallet directories. The
    trace_id binds this read back to a specific agent interaction
    visible in the OTLP span timeline; pair with
    `agent_filesystem_violation_high_conf` to catch the read-then-egress
    pattern.
author: MacCrab Community
date: 2026/05/05
references:
    - docs/AGENT_TRACES.md
    - https://attack.mitre.org/techniques/T1555/
tags:
    - attack.credential_access
    - attack.t1555
    - attack.t1552.001
    - attack.t1552.004
    - maccrab.agent_traces
logsource:
    category: file_event
    product: macos
detection:
    selection_traceparent:
        MachineAgentConfidence: 'traceparent'
    selection_keys:
        TargetFilename|contains:
            - '/.ssh/id_'
            - '/.ssh/identity'
            - '/.aws/credentials'
            - '/.aws/config'
            - '/Application Support/Google/Chrome/Default/Login Data'
            - '/Library/Application Support/Firefox/Profiles/'
            - '/Library/Application Support/Cookies/'
            - '/MetaMask/'
            - '/Phantom/'
            - '/Coinbase Wallet/'
        FileAction: 'close'
    condition: selection_traceparent and selection_keys
falsepositives:
    - Operator instructed the agent to perform a key rotation or backup
      (review originating tool span before triage)
    - Browser extension auto-update touching extension data dir
level: high
