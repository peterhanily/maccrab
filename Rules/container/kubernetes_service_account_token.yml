title: Kubernetes Service Account Token Read from Unexpected Process
id: d1a2b3c4-0433-4000-a000-000000000433
status: experimental
description: >
    Detects unexpected processes reading Kubernetes service account tokens
    mounted at /var/run/secrets/kubernetes.io/serviceaccount/. Attackers
    running inside a K8s pod steal the service account token to authenticate
    to the Kubernetes API server, enumerate cluster resources, and escalate
    to cluster-admin if the service account is over-privileged. On macOS,
    this path is relevant for local kind/minikube/Rancher Desktop clusters
    where the kubeconfig and token files are accessible to host processes.
author: MacCrab Community
date: 2026/04/22
references:
    - https://attack.mitre.org/techniques/T1552.007/
    - https://attack.mitre.org/techniques/T1552/
tags:
    - attack.credential_access
    - attack.t1552
    - attack.t1552.007
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/serviceaccount/token'
            - '/serviceaccount/ca.crt'
            - '/.kube/config'
    selection_sensitive:
        TargetFilename|contains|all:
            - 'kubernetes'
            - 'token'
    filter_kubectl:
        Image|endswith:
            - '/kubectl'
            - '/helm'
            - '/k9s'
            - '/k3s'
            - '/kind'
    filter_signed:
        SignerType:
            - 'apple'
            - 'devId'
    condition: (selection or selection_sensitive) and not filter_kubectl and not filter_signed
falsepositives:
    - Container orchestration tooling reading service account tokens for legitimate authentication
    - CI/CD pipelines deploying to Kubernetes
level: high
