title: Docker Privileged Container Launched
id: d1a2b3c4-0420-4000-a000-000000000420
status: experimental
description: >
    Detects docker run with --privileged flag, which disables all security
    mechanisms and grants the container full access to the host. This is
    commonly abused for container escape and host compromise.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1610/
    - https://attack.mitre.org/techniques/T1611/
tags:
    - attack.execution
    - attack.privilege_escalation
    - attack.t1610
    - attack.t1611
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/docker'
            - '/nerdctl'
            - '/podman'
        CommandLine|contains: '--privileged'
    selection_run:
        CommandLine|contains:
            - ' run '
            - ' create '
    condition: selection and selection_run
falsepositives:
    - Legitimate development containers requiring hardware access
    - CI/CD pipelines building Docker images inside Docker
level: high
