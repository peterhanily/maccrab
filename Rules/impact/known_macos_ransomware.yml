title: Known macOS Ransomware Process Detected
id: f0e1d2c3-a009-4000-e000-00000000a009
status: experimental
description: |
  Detects process names and binary paths associated with known macOS
  ransomware families: EvilQuest/ThiefQuest (2020), KeRanger (2016),
  FileCoder (2014), MacRansom (2017), Patcher (2017), and the macOS
  variant of LockBit (2023). This rule fires on known-bad names and
  characteristic command-line patterns. Combine with behavioral scoring
  and campaign detection for highest-confidence attribution.
author: MacCrab Community
date: 2026/04/22
references:
    - https://attack.mitre.org/techniques/T1486/
    - https://www.sentinelone.com/labs/evil-quest-thief-in-the-app-store/
    - https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom_keranger.a
tags:
    - attack.impact
    - attack.t1486
logsource:
    category: process_creation
    product: macos
detection:
    selection_known_names:
        Image|endswith:
            # NOTE: bare '/patch' removed (v1.17.1) — it matched GNU `patch`
            # (common in builds) and fired this CRITICAL rule falsely. The
            # Patcher-2017 ransomware binary is '/Patcher'; the EvilQuest
            # '/patch' masquerade is still caught by selection_evilquest_patterns
            # (which AND-gates it with a com.apple.questd/patch.app/evilquest
            # command line).
            - '/Patcher'
            - '/finder_update'
            - '/MacRansom'
            - '/filecoder'
            - '/keranger'
            - '/com.apple.finder.plist'
    selection_known_name_substrings:
        Image|contains:
            - 'EvilQuest'
            - 'ThiefQuest'
            - 'KeRanger'
    selection_lockbit_macos:
        Image|contains:
            - 'lockbit'
            - 'LockBit'
        CommandLine|contains:
            - '--encrypted'
            - '--encrypt'
    selection_evilquest_patterns:
        CommandLine|contains:
            - 'com.apple.questd'
            - 'patch.app'
            - 'evilquest'
        Image|contains:
            - '/questd'
            - '/patch'
    condition: selection_known_names or selection_known_name_substrings or selection_lockbit_macos or selection_evilquest_patterns
falsepositives:
    - None expected — these names are specific to known malware families
suppressible: false
level: critical
