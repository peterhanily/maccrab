title: Non-Standard XPC Service Registered
id: d1a2b3c4-1011-4000-a000-000000001011
status: experimental
description: >
    Detects registration of XPC services with non-standard naming that may
    indicate persistence via rogue launch services.
author: HawkEye Community
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1543/
tags:
    - attack.persistence
    - attack.t1543
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/launchctl'
        CommandLine|contains:
            - 'bootstrap'
            - 'enable'
            - 'load'
    filter_system:
        CommandLine|contains:
            - 'com.apple.'
            - '/System/'
    condition: selection and not filter_system
falsepositives:
    - Legitimate third-party service installation
level: medium
