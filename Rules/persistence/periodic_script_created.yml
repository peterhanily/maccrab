title: Periodic Script Created
id: d1a2b3c4-0015-4000-a000-000000000015
status: stable
description: Detects creation of periodic scripts in /etc/periodic/ or /usr/local/etc/periodic/, which execute on daily/weekly/monthly schedules.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1053/003/
tags:
    - attack.persistence
    - attack.t1053.003
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|startswith:
            - '/etc/periodic/'
            - '/usr/local/etc/periodic/'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - System administration scripts
level: high
