title: Plist Written to Library by Process from Temp Directory
id: d1a2b3c4-0211-4000-a000-000000000211
status: stable
description: Detects plist file creation in ~/Library directories by a process executing from a temporary directory. This pattern is common in malware that stages persistence from /tmp or /var/folders.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1543/001/
tags:
    - attack.persistence
    - attack.t1543.001
logsource:
    category: file_event
    product: macos
detection:
    selection_target:
        TargetFilename|contains: '/Library/'
        TargetFilename|endswith: '.plist'
    selection_source:
        Image|contains:
            - '/tmp/'
            - '/private/tmp/'
            - '/var/tmp/'
            - '/var/folders/'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    filter_browser_helper:
        Image|contains:
            - '/Google Chrome.app/'
            - '/Chromium.app/'
            - '/Firefox.app/'
            - '/Safari.app/'
            - '/Microsoft Edge.app/'
            - '/Arc.app/'
            - '/Brave Browser.app/'
            - '/Opera.app/'
            - '/Vivaldi.app/'
    condition: selection_target and selection_source and not filter_system and not filter_apple_signed and not filter_browser_helper
falsepositives:
    - Installer packages writing configuration plists
    - Legitimate software first-run configuration
level: high
