title: Login or Logout Hook Configured via defaults
id: d1a2b3c4-0108-4000-a000-000000000108
status: stable
description: Detects the use of the defaults command to configure LoginHook or LogoutHook in the com.apple.loginwindow preference domain. These hooks execute scripts at user login or logout and serve as a legacy persistence mechanism.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1037/002/
tags:
    - attack.persistence
    - attack.t1037.002
logsource:
    category: process_creation
    product: macos
detection:
    # The previous condition required `write` to appear in the command
    # line. That missed three real-world persistence flows:
    #   1. `defaults import com.apple.loginwindow <plist>` — same
    #      persistence outcome, no `write` token in argv.
    #   2. `plutil -replace LoginHook` / `plutil -insert LoginHook`
    #      against /var/root/Library/Preferences/com.apple.loginwindow
    #      .plist or ~/Library/Preferences/.
    #   3. `defaults read com.apple.loginwindow LoginHook` is a recon
    #      precursor to overwriting an existing hook — worth at least a
    #      low-confidence signal even without a mutation.
    # Accept any of write/import/read on the defaults path, or any
    # plutil mutation against the loginwindow plist.
    selection_defaults:
        Image|endswith: '/defaults'
        CommandLine|contains: 'com.apple.loginwindow'
    selection_plutil:
        Image|endswith: '/plutil'
        CommandLine|contains: 'com.apple.loginwindow'
    selection_hook:
        CommandLine|contains:
            - 'LoginHook'
            - 'LogoutHook'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: (selection_defaults or selection_plutil) and selection_hook and not filter_system and not filter_apple_signed
falsepositives:
    - Legacy enterprise management tools that still use login hooks
    - IT administrators configuring login scripts
level: medium
