title: Dock Tile Plugin Installed
id: d1a2b3c4-0103-4000-a000-000000000103
status: experimental
description: Detects installation of a Dock tile plugin bundle. Dock tile plugins are loaded by the Dock process and execute code whenever the Dock is running, providing a stealthy persistence mechanism.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1547/
tags:
    - attack.persistence
    - attack.t1547
logsource:
    category: file_event
    product: macos
detection:
    # A .docktileplugin file is itself a strong indicator — every
    # docktileplugin install drops a directory bundle ending in this
    # extension. The previous `selection_paths` clause was an AND-of-
    # contains over three locations, but `.app/` alone is so generic
    # that the clause effectively passed every match through; it added
    # no precision while obscuring the real signal. Anchor on the
    # extension and let the apple-signing filter do the work.
    selection:
        TargetFilename|endswith: '.docktileplugin'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate application installations that include Dock tile plugins
    - Xcode plugin development
level: high
