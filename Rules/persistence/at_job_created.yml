title: at Job Scheduled
id: d1a2b3c4-0018-4000-a000-000000000018
status: experimental
description: Detects use of the at command to schedule one-time job execution, which can be used for persistence or delayed payload execution.
author: HawkEye Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1053/002/
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/at'
    filter_list:
        CommandLine|contains:
            - '-l'
            - 'atq'
    condition: selection and not filter_list
falsepositives:
    - Legitimate use of at for job scheduling
level: medium
