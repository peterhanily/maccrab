title: Finder Sync Extension Installed by Unsigned Process
id: d1a2b3c4-0217-4000-a000-000000000217
status: experimental
description: Detects Finder sync extension plugin installation by an unsigned or ad-hoc signed process. Finder sync extensions can execute code whenever Finder displays a directory, providing persistent code execution.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1547/
tags:
    - attack.persistence
    - attack.t1547
logsource:
    category: file_event
    product: macos
detection:
    # Two install paths cover real-world FinderSync extensions:
    #   1. New file-provider extensions land under
    #      /Library/Application Support/FileProvider/.
    #   2. Traditional .appex bundles live inside a containing .app at
    #      .app/Contents/PlugIns/*.appex/. The previous selection_alt
    #      used `contains|all: ['.appex', 'FinderSync']` — the string
    #      "FinderSync" only appears in the Info.plist's
    #      NSExtensionPointIdentifier, never in the file path itself,
    #      so the clause never fired.
    selection:
        TargetFilename|contains: '/Library/Application Support/FileProvider/'
    selection_alt:
        TargetFilename|contains: '.app/Contents/PlugIns/'
        TargetFilename|endswith:
            - '.appex'
            - '.appex/Info.plist'
            - '.appex/PluginInfo.plist'
    filter_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    condition: (selection or selection_alt) and not filter_signed
falsepositives:
    - Legitimate cloud storage applications (Dropbox, OneDrive)
    - Source control extensions
level: medium
