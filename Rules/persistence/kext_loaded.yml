title: Kernel Extension Loaded
id: d1a2b3c4-0017-4000-a000-000000000017
status: stable
description: Detects loading of kernel extensions. On modern macOS, kext loading is highly restricted and may indicate tampering.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1547/006/
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1547.006
logsource:
    # driver_load is the correct macOS logsource — ESCollector maps
    # NOTIFY_KEXTLOAD and NOTIFY_IOKIT_OPEN here. The previous
    # selection mixed driver_load (.kext bundles) with executables
    # (kextload, kextutil, KernelExtensionManagement) that surface
    # only under process_creation; under a `driver_load` logsource
    # those Image suffixes never matched. Process-creation invocations
    # of kextload/kextutil are covered by the broader `kext_unload`
    # and `system_extension_load` rules.
    category: driver_load
    product: macos
detection:
    selection:
        Image|endswith: '.kext'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate third-party kernel extensions (VirtualBox, VMware, audio drivers)
level: high
