title: Folder Actions Script Installed for Persistence
id: d1a2b3c4-0463-4000-a000-000000000463
status: experimental
description: >
    Detects installation of Folder Action scripts, which execute
    automatically when files are added to a monitored folder. Attackers
    use Folder Actions for persistence — the script runs every time
    a file is dropped into the folder, with no visible indicator.
    Common targets: Desktop, Downloads, Documents folders.
author: MacCrab Community
date: 2026/04/09
references:
    - https://attack.mitre.org/techniques/T1547/015/
tags:
    - attack.persistence
    - attack.t1547.015
logsource:
    # File-event logsource. The Folder Action persistence primitive is
    # observable as a write under ~/Library/Scripts/Folder Action
    # Scripts/. The earlier `selection_osa_setup` branch matched on
    # process fields (Image / CommandLine) under a `file_event`
    # logsource, which the engine never delivers — that branch was
    # effectively dead. Process-creation osascript activity is already
    # covered by `osascript_from_non_apple` and the fileless-attack
    # rule; here we anchor purely on the persistence file write.
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/Library/Scripts/Folder Action Scripts/'
            - '/Folder Action Scripts/'
        FileAction:
            - 'create'
            - 'write'
            - 'rename'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate Automator folder actions
    - Photography workflows (auto-import on folder add)
level: medium
