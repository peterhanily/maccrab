title: At Job Scheduled (Legacy macOS Scheduler)
id: d1a2b3c4-0440-4000-b000-000000000440
status: experimental
description: >
    Detects use of the at(1) scheduler to queue one-time future command
    execution. Modern macOS very rarely uses at — atrun is disabled by
    default on recent releases and most automation uses launchd. Attackers
    sometimes prefer at(1) precisely because monitoring tools focus on
    cron/launchd. This rule excludes status queries (-l, atq) and
    Apple-signed system tooling.
author: MacCrab Community
date: 2026/04/05
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1053/002/
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.002
logsource:
    category: process_creation
    product: macos
detection:
    selection_at:
        Image|endswith:
            - '/at'
            - '/batch'
    filter_list_queries:
        CommandLine|contains:
            - ' -l'
            - 'atq '
            - '/atq'
            - ' -c '
    filter_apple_parent:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    condition: selection_at and not filter_list_queries and not filter_apple_parent
falsepositives:
    - Administrators manually scheduling one-time maintenance tasks
    - Legacy backup scripts using at for delayed execution
level: medium
