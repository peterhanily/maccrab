title: Wi-Fi Password Extracted from Keychain
id: d1a2b3c4-0501-4000-a000-000000000501
status: experimental
description: >
    Detects processes reading saved Wi-Fi network passwords from the system
    keychain. The macOS `security` command and direct Keychain API access
    can retrieve plaintext WPA/WPA2 pre-shared keys for all remembered
    networks. Attackers use this to pivot to networks the victim has
    previously connected to, or to sell credential sets.
author: MacCrab Community
date: 2026/04/22
references:
    - https://attack.mitre.org/techniques/T1555.001/
    - https://ss64.com/osx/security.html
tags:
    - attack.credential_access
    - attack.wireless
    - attack.t1555.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_security_wifi:
        Image|endswith: '/security'
        CommandLine|contains:
            - 'AirPort network password'
            - 'find-generic-password'
            - 'find-internet-password'
    selection_networksetup_psk:
        Image|endswith: '/networksetup'
        CommandLine|contains:
            - 'getairportnetwork'
            - '-getWirelessNetworkPassword'
    selection_python_keychain:
        Image|endswith:
            - '/python3'
            - '/python'
        CommandLine|contains:
            - 'AirPort'
            - 'SystemConfiguration'
            - 'password'
            - 'psk'
    filter_system_context:
        ParentImage|endswith:
            - '/configd'
            - '/loginwindow'
            - '/airportd'
        PlatformBinary: 'true'
    condition: (selection_security_wifi or selection_networksetup_psk or selection_python_keychain)
        and not filter_system_context
falsepositives:
    - Network management scripts legitimately reading Wi-Fi credentials for provisioning
    - IT automation tools that backup or migrate network profiles
level: high
