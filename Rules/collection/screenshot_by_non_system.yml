title: Screenshot Capture by Non-System Process
id: d1a2b3c4-0090-4000-a000-000000000090
status: experimental
description: Detects screencapture utility invocation by non-Apple parent processes.
author: HawkEye Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1113/
tags:
    - attack.collection
    - attack.t1113
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/screencapture'
    filter_apple:
        ParentImage|startswith:
            - '/System/'
            - '/usr/'
    filter_shortcuts:
        ParentImage|contains: 'Shortcuts'
    condition: selection and not filter_apple and not filter_shortcuts
falsepositives:
    - Legitimate screenshot automation workflows
    - Screen recording applications
level: medium
