title: CGEventTap Created by Non-Apple Process
id: d1a2b3c4-0091-4000-a000-000000000091
status: experimental
description: Detects creation of keyboard event taps, which can be used for keylogging. Uses process execution patterns associated with event tap creation.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1056/001/
tags:
    - attack.collection
    - attack.credential_access
    - attack.t1056.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'CGEventTapCreate'
            - 'CGEventTap'
            - 'kCGEventKeyDown'
            - 'NSEvent.addGlobalMonitorForEvents'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate keyboard shortcut managers (Karabiner, BetterTouchTool)
    - Accessibility software
level: high
