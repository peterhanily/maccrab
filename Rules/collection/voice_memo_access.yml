title: Voice Memo Files Accessed by Unusual Process
id: d1a2b3c4-0264-4000-a000-000000000264
status: experimental
description: Detects access to Voice Memos recordings by processes other than the Voice Memos app. Adversaries may access stored voice recordings for intelligence gathering or surveillance.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1123/
tags:
    - attack.collection
    - attack.t1123
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/com.apple.voicememos/'
            - '/Library/Voice Memos/'
        TargetFilename|endswith:
            - '.m4a'
            - '.caf'
    filter_voicememos:
        Image|contains:
            - 'Voice Memos'
            - 'voicememod'
            - 'com.apple.voicememos'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and not filter_voicememos and not filter_system
falsepositives:
    - Audio editing applications
    - Backup utilities
level: high
