title: Attempted Tamper of MacCrab Components (Self-Protection)
id: d1a2b3c4-0500-4000-a000-000000000505
status: experimental
description: >
    Detects any attempt by a non-MacCrab process to kill, unload,
    delete, or rename MacCrab's own daemons, system extension,
    application bundle, or rule corpus. Catches the
    EDR-disable-then-fire-payload pattern used by macOS.SearchAwesome
    against competing LaunchAgents (2024), Atomic Stealer's attempt
    to disable Little Snitch, and the general worm prerequisite of
    eliminating telemetry before the destructive payload runs.
    Authoritative tamper detection is handled by the SelfDefense
    subsystem (binary-integrity hashing + signal interception + a
    direct file monitor on MacCrab's own components); this rule is a
    supplementary, recorded-but-not-alerted heuristic, because
    rm/launchctl/pkill of MacCrab paths via a shell is structurally
    indistinguishable from MacCrab's own install / update / reload.
author: MacCrab Community
date: 2026/05/14
references:
    - https://objective-see.org/blog/blog_0x47.html
    - https://www.kandji.io/blog/amos-macos-stealer-analysis
    - https://attack.mitre.org/techniques/T1562/001/
    - https://attack.mitre.org/techniques/T1070/004/
tags:
    - attack.defense_evasion
    - attack.t1562.001
    - attack.t1070.004
    - attack.impact
    - maccrab.self_protection
logsource:
    category: process_creation
    product: macos
detection:
    selection_kill_tool:
        Image|endswith:
            - '/pkill'
            - '/killall'
            - '/kill'
            - '/launchctl'
            - '/systemextensionsctl'
        CommandLine|contains:
            - 'maccrab'
            - 'MacCrab'
            - 'com.maccrab'
    selection_unload_path:
        Image|endswith:
            - '/launchctl'
        CommandLine|contains:
            - 'bootout'
            - 'unload'
            - 'disable'
        CommandLine|contains|all:
            - 'maccrab'
    selection_destruct_path:
        Image|endswith:
            - '/rm'
            - '/mv'
        CommandLine|contains:
            - '/MacCrab.app'
            - '/MacCrabAgent'
            - '/maccrabd'
            - '/com.maccrab.agent'
            - 'compiled_rules/'
            - '/Library/Application Support/MacCrab'
    filter_maccrab_self:
        Image|contains:
            - 'MacCrab.app/Contents/'
            - 'MacCrabAgent'
            - 'maccrabd'
            - 'maccrabctl'
        ParentImage|contains:
            - 'MacCrab.app/Contents/'
            - 'maccrabd'
            - 'sysextd'
    # v1.12.5 fix: filter_maccrab_self is AND-style (Image AND
    # ParentImage), which doesn't suppress the common case where
    # MacCrab spawns a system helper (/bin/rm, /usr/bin/pkill,
    # /bin/launchctl) to do its own maintenance. The Image is the
    # helper, not a MacCrab binary, so the AND never matches.
    # Add a Parent-only filter for any process whose parent IS
    # MacCrab itself — that covers RuleBundleInstaller's elevated
    # cleanup, SystemExtensionManager's launchctl invocations,
    # AppState's pkill SIGUSR1 calls, etc.
    filter_maccrab_parent:
        ParentImage|contains:
            - 'MacCrab.app/Contents/'
            - 'com.maccrab.agent'
            - '/MacCrabAgent'
            - '/maccrabd'
            - '/maccrabctl'
    # v1.17.1 fix: full-ancestry self-exclusion. filter_maccrab_self /
    # filter_maccrab_parent are parent-only and miss MacCrab's own maintenance
    # when it goes through a shell hop (MacCrab -> osascript/sh -> rm/launchctl
    # /pkill). ProcessAncestors is the lineage-resolved chain of ancestor
    # names+executables, so this matches MacCrab ANYWHERE in the lineage, not
    # just as the direct parent. A genuine third-party tamper has no MacCrab
    # ancestor and still fires (and survives NoiseFilter Gate 7 at critical).
    filter_maccrab_ancestry:
        ProcessAncestors|contains:
            - 'MacCrab.app/Contents/'
            - 'com.maccrab.agent'
            - '/MacCrabAgent'
            - '/maccrabd'
            - '/maccrabctl'
    filter_installer:
        Image|endswith:
            - '/installer'
            - '/system_installd'
            - '/Sparkle'
            - '/sparkle'
            - '/Updater'
            - '/Autoupdate'
    # v1.12.5 fix: legitimate destructive operations spawned by
    # brew/cask, osascript admin shell (RuleBundleInstaller's
    # elevation channel), or the sysext (de)activation flow all
    # have rm/mv lineage that trips selection_destruct_path. The
    # filter_maccrab_self block above is AND-style (Image AND
    # ParentImage), which doesn't match when MacCrab itself is the
    # GRANDPARENT (osascript -> sh -> rm). Use ParentImage-only
    # match here for the upgrade-installer lineage.
    filter_upgrade_installer:
        ParentImage|endswith:
            - '/brew'
            - '/osascript'
            - '/sysextd'
            - '/launchctl'
            - '/Updater'
            - '/Autoupdate'
    filter_brew_lineage:
        CommandLine|contains:
            - '/Homebrew/'
            - '/Cellar/maccrab/'
            - 'Caskroom/maccrab/'
    condition: (selection_kill_tool or selection_unload_path or selection_destruct_path) and not filter_maccrab_self and not filter_maccrab_parent and not filter_maccrab_ancestry and not filter_installer and not filter_upgrade_installer and not filter_brew_lineage
falsepositives:
    - The user running `brew uninstall maccrab` or `make uninstall` from an interactive shell — investigate parent shell + correlate with explicit dashboard "Uninstall" action
    - Sparkle auto-update replacing the .app bundle as part of an in-place upgrade; filter_installer covers Sparkle's path
    - Internal tests / dev rebuilds in the project directory; should be allowlisted by parent path matching the project tree
    - MacCrab's OWN maintenance via an intermediary shell (MacCrab -> osascript/sh -> rm/launchctl/pkill) — now excluded by filter_maccrab_ancestry, which matches MacCrab anywhere in the lineage rather than only as the direct parent
# v1.17.1 (final): demoted CRITICAL -> HIGH. This process_creation heuristic
# fires on rm/launchctl/pkill of MacCrab paths via a shell — identical in shape
# to MacCrab's OWN install / update / reload / build and to the OS's privileged
# sysext (de)activation. Those legitimate operations routinely break the
# MacCrab lineage (osascript-admin / sysextd reparent the privileged shell off
# MacCrab), so filter_maccrab_ancestry below cannot exclude them, and the rule
# produced the bulk of false criticals on a dev Mac (rm/launchctl run by root
# during activation). We cannot make it "absolutely sure", so it no longer
# alerts: at HIGH, with the actor always an Apple system binary, NoiseFilter
# Gate 7 suppresses it. AUTHORITATIVE tamper detection is the SelfDefense
# subsystem (integrity hashing + signal interception + direct file monitor on
# MacCrab's own files/plist), which observes real tampering instead of guessing
# from a shell command line. The filters below are retained for the rare
# non-Apple-actor case and for forensic hunting.
level: medium
