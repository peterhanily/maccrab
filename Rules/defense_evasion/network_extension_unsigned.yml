title: Unsigned Network Extension Provider Installation
id: a1b2c3d4-0002-4000-a002-000000000002
status: experimental
description: >
    Detects creation of NEPacketTunnelProvider, NEDNSProxyProvider,
    NEAppProxyProvider, or NEFilterDataProvider bundles by an
    unsigned or ad-hoc-signed process. These providers can intercept
    every packet leaving the device — legitimate VPN/firewall apps
    are always Developer-ID-signed and notarized. An unsigned
    Network Extension is a strong indicator of malware attempting
    to establish a covert VPN tunnel or DNS hijack.
author: MacCrab Community
date: 2026/04/29
references:
    - https://attack.mitre.org/techniques/T1556/
    - https://developer.apple.com/documentation/networkextension
tags:
    - attack.defense_evasion
    - attack.t1556
logsource:
    category: file_event
    product: macos
detection:
    selection:
        # v1.17.1 FP fix: dropped the bare 'NetworkExtension' substring —
        # it matched Apple's own framework paths, so /usr/libexec/nehelper
        # and nesessionmanager (Apple platform binaries) tripped this rule.
        # The credible signal is installing a provider .appex / provider class.
        TargetFilename|contains:
            - '.appex/Contents/Info.plist'
        FileAction:
            - 'create'
            - 'write'
    selection_provider:
        TargetFilename|contains:
            - 'PacketTunnelProvider'
            - 'DNSProxyProvider'
            - 'AppProxyProvider'
            - 'FilterDataProvider'
    filter_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    filter_system:
        # v1.17.1 FP fix: added the platform binary dirs. Apple daemons live
        # under /usr/libexec, /usr/sbin, /sbin — they were missing here, so a
        # SignerType mis-classification (ESHelpers Apple-detection bug) left
        # Apple's own nehelper/nesessionmanager firing this at CRITICAL.
        Image|startswith:
            - '/System/'
            - '/Applications/'
            - '/usr/libexec/'
            - '/usr/sbin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/bin/'
    condition: (selection or selection_provider) and not filter_signed and not filter_system
falsepositives:
    - In-house enterprise VPN clients deployed via MDM with internal signing
    - Open-source security research tools running unsigned
# v1.17.1: was CRITICAL, which bypassed the NoiseFilter suppression layer
# AND forced an OS notification. Dropped to HIGH so suppression applies; an
# unsigned NE provider is serious but this selector is FP-prone.
level: high
