title: APFS Snapshot Created Outside Time Machine
id: d1a2b3c4-1010-4000-a000-000000001010
status: experimental
description: >
    Detects creation of APFS snapshots outside of normal Time Machine backups.
    Attackers can use snapshots to hide data, stage exfiltration, or create
    restore points before deploying destructive payloads.
author: MacCrab Community
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1564/
tags:
    - attack.defense_evasion
    - attack.t1564
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/tmutil'
        CommandLine|contains: 'snapshot'
    filter_timemachine:
        ParentImage|contains: 'backupd'
    condition: selection and not filter_timemachine
falsepositives:
    - System administrators creating manual snapshots
level: low
