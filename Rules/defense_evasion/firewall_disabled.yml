title: macOS Application Firewall Disabled
id: d1a2b3c4-0114-4000-a000-000000000114
status: stable
description: Detects the macOS application firewall being disabled via the socketfilterfw command-line utility. Disabling the firewall allows unrestricted inbound network connections.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1562/004/
tags:
    - attack.defense_evasion
    - attack.t1562.004
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/socketfilterfw'
        # All disable variants in one selection so any single flag fires
        # the rule. Previously `selection` only anchored on the Image and
        # required `selection_disable` to AND in — that worked but split
        # the intent across two selectors and made it easy to miss the
        # numeric (`0`) and `disable` aliases that older socketfilterfw
        # builds accept.
        CommandLine|contains:
            - '--setglobalstate off'
            - '--setglobalstate 0'
            - '--setglobalstate disable'
            - '--setblockall off'
            - '--setblockall 0'
            - '--setstealthmode off'
            - '--setstealthmode 0'
            - '--setallowsigned off'
            - '--setallowsigned 0'
            - '--setallowsignedapp off'
            - '--setallowsignedapp 0'
    condition: selection
falsepositives:
    - IT administrators adjusting firewall settings for troubleshooting
    - MDM profiles reconfiguring firewall rules
level: medium
