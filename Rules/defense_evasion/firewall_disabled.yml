title: macOS Application Firewall Disabled
id: d1a2b3c4-0114-4000-a000-000000000114
status: stable
description: Detects the macOS application firewall being disabled via the socketfilterfw command-line utility. Disabling the firewall allows unrestricted inbound network connections.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1562/004/
tags:
    - attack.defense_evasion
    - attack.t1562.004
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/socketfilterfw'
    selection_disable:
        CommandLine|contains:
            - '--setglobalstate off'
            - '--setblockall off'
            - '--setstealthmode off'
            - '--setallowsigned off'
    condition: selection and selection_disable
falsepositives:
    - IT administrators adjusting firewall settings for troubleshooting
    - MDM profiles reconfiguring firewall rules
level: high
