title: Code Signature Removed from Binary
id: d1a2b3c4-0225-4000-a000-000000000225
status: stable
description: Detects use of codesign with --remove-signature flag to strip code signatures from binaries. Adversaries may remove signatures to modify signed binaries or evade signature-based detection.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1553/002/
tags:
    - attack.defense_evasion
    - attack.t1553.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/codesign'
        CommandLine|contains: '--remove-signature'
    condition: selection
falsepositives:
    - Xcode `codesign --remove-signature` in a build script before re-signing with a Developer ID
    - Fastlane / xcodebuild release pipelines that strip then re-apply signatures
    - Homebrew bottle install scripts that remove a stale ad-hoc signature before re-signing for arm64
    - Reverse engineering tooling (Hopper, IDA, Ghidra workflows) inspecting macOS binaries
level: medium
