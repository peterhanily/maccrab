title: Interpreter Path Hijacking via Environment Variables
id: d1a2b3c4-0454-4000-a000-000000000454
status: experimental
description: >
    Detects processes launched with environment variables that hijack
    interpreter library search paths. Beyond DYLD_INSERT_LIBRARIES,
    attackers can use PYTHONPATH, PERL5LIB, RUBYLIB, NODE_PATH, and
    similar variables to inject malicious code into legitimate
    interpreter processes.
author: MacCrab Community
date: 2026/04/09
references:
    - https://attack.mitre.org/techniques/T1574/007/
tags:
    - attack.defense_evasion
    - attack.persistence
    - attack.t1574.007
logsource:
    category: process_creation
    product: macos
detection:
    selection_python:
        CommandLine|contains:
            - 'PYTHONPATH='
            - 'PYTHONSTARTUP='
            - 'PYTHONHOME='
    selection_perl:
        CommandLine|contains:
            - 'PERL5LIB='
            - 'PERL5OPT='
            - 'PERLLIB='
    selection_ruby:
        CommandLine|contains:
            - 'RUBYLIB='
            - 'RUBYOPT='
    selection_node:
        CommandLine|contains:
            - 'NODE_PATH='
            - 'NODE_OPTIONS='
    selection_generic:
        CommandLine|contains:
            - 'LD_PRELOAD='
            - 'DYLD_FRAMEWORK_PATH='
            - 'DYLD_LIBRARY_PATH='
            - 'DYLD_FALLBACK_LIBRARY_PATH='
            - 'CLASSPATH='
            - 'JAVA_TOOL_OPTIONS='
    filter_dev:
        ParentImage|endswith:
            - '/Terminal'
            - '/iTerm2'
            - '/login'
            - '/sshd'
    filter_apple:
        SignerType: 'apple'
    condition: (selection_python or selection_perl or selection_ruby or selection_node or selection_generic) and not filter_dev and not filter_apple
falsepositives:
    - Development environments with custom library paths
    - Virtual environments (Python venv, conda)
level: medium
