title: Unexpected MDM Profile Installation
id: d1a2b3c4-0330-4000-a000-000000000330
status: experimental
description: >
    Detects MDM configuration profiles being installed outside of expected MDM
    enrollment workflows. Rogue configuration profiles can disable security
    controls (Gatekeeper, SIP warnings), install root CA certificates for MITM
    attacks, configure proxies for traffic interception, or silently grant TCC
    permissions. This rule fires when the profiles command is used to install
    a profile and the parent process is not a known MDM agent.
author: MacCrab Community
date: 2026/04/04
references:
    - https://attack.mitre.org/techniques/T1562/001/
    - https://attack.mitre.org/techniques/T1553/004/
    - https://objective-see.org/blog/blog_0x70.html
tags:
    - attack.defense_evasion
    - attack.t1562.001
    - attack.t1553.004
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/profiles'
        CommandLine|contains:
            - 'install'
            - '-I'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_mdm_agents:
        ParentImage|contains:
            - '/jamf'
            - '/JamfAgent'
            - '/JamfManagementService'
            - '/mosyle'
            - '/MosyleAgent'
            - '/kandji'
            - '/KandjiAgent'
            - '/mdmclient'
            - '/MDMDaemon'
            - '/munki'
            - '/ManagedClient'
            - '/fleetd'
            - '/osqueryd'
            - '/Addigy'
            - '/SimpleMDM'
            - '/Hexnode'
            - '/FileWave'
    filter_apple_signed:
        ParentSignerType: 'apple'
    condition: selection and not filter_system and not filter_mdm_agents and not filter_apple_signed
falsepositives:
    - IT administrators manually installing profiles during initial device setup
    - Enterprise enrollment scripts run outside standard MDM agents
    - Developer provisioning profile installation via Xcode tools
level: high
