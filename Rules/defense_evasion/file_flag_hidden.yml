title: File Hidden via chflags Command
id: d1a2b3c4-0223-4000-a000-000000000223
status: experimental
description: Detects use of chflags to set the hidden flag on files or directories. Adversaries may hide malicious files using macOS file flags, which are more persistent than dot-prefix hiding.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1564/001/
tags:
    - attack.defense_evasion
    - attack.t1564.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/chflags'
        CommandLine|contains: 'hidden'
    filter_nohidden:
        CommandLine|contains: 'nohidden'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and not filter_nohidden and not filter_system
falsepositives:
    - System utilities managing file visibility
    - Legitimate applications hiding support files
level: medium
