title: Ad-Hoc Code Signing of Binary
id: d1a2b3c4-0113-4000-a000-000000000113
status: experimental
description: Detects the use of codesign to apply an ad-hoc signature to a binary. Attackers may ad-hoc sign malware to bypass unsigned binary restrictions while avoiding the use of a traceable developer identity.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1553/002/
tags:
    - attack.defense_evasion
    - attack.t1553.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/codesign'
        CommandLine|contains:
            - '-s -'
            - '--sign -'
            - '-s "-"'
            - "--sign '-'"
    filter_xcode:
        ParentImage|contains:
            - '/Xcode'
            - '/xcodebuild'
    filter_brew:
        ParentImage|contains:
            - '/brew'
            - '/Homebrew'
    condition: selection and not filter_xcode and not filter_brew
falsepositives:
    - Developers ad-hoc signing during local development and testing
    - CI/CD build pipelines
    - Homebrew formula builds
level: medium
