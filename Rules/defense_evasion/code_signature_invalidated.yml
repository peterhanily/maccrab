title: Code Signature Invalidated at Runtime
id: d1a2b3c4-0430-4000-a000-000000000430
status: experimental
description: >
    Detects a process whose code signature became invalid at runtime
    (ES NOTIFY_CS_INVALIDATED) — runtime patching of a signed binary in memory,
    self-modifying code, or an attacker bypassing code-signing enforcement.
    This is a self-event (TargetIsSelf=true): the process invalidated its OWN
    signature.

    v1.18: revived onto the real ES event. The dominant false positive is
    legitimate JIT (Electron/Chromium/Node/Java/LLVM) which invalidates the
    signature as part of normal dynamic codegen, so those runtimes are filtered
    by path; Apple-signed processes clear via SignerType + NoiseFilter. What
    remains — a non-Apple, non-JIT binary tampering its own signature — is high
    signal.
author: MacCrab Community
date: 2026/04/05
modified: 2026/06/04
references:
    - https://attack.mitre.org/techniques/T1553/002/
tags:
    - attack.defense_evasion
    - attack.t1553.002
logsource:
    category: process_event
    product: macos
detection:
    selection:
        event.action: 'cs_invalidated'
    filter_apple:
        SignerType: 'apple'
    filter_jit_tools:
        Image|endswith:
            - '/Electron'
            - '/electron'
            - '/Electron Helper'
            - '/Electron Helper (Renderer)'
            - '/Electron Helper (GPU)'
            - '/Electron Helper (Plugin)'
            - '/Chromium Helper'
            - '/node'
            - '/java'
            - '/mono'
            - '/dotnet'
    filter_jit_frameworks:
        Image|contains:
            - '.app/Contents/Frameworks/Electron Framework.framework/'
            - '.app/Contents/Frameworks/Chromium Embedded Framework.framework/'
            - '/Contents/Frameworks/Squirrel.framework/'
    condition: selection and not filter_apple and not filter_jit_tools and not filter_jit_frameworks
falsepositives:
    - JIT/dynamic-codegen runtimes not in the allowlist (new Electron/Node builds, PyPy, Wasmtime)
    - Development builds with incomplete or ad-hoc signing
level: high
