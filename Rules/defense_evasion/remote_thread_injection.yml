title: Remote Thread Created in Another Process
id: d1a2b3c4-0429-4000-a000-000000000429
status: experimental
description: >
    Detects a process creating a thread inside ANOTHER process's address space
    (ES NOTIFY_REMOTE_THREAD_CREATE). This is a strong, low-false-positive
    indicator of code injection used for defense evasion, privilege escalation,
    or credential theft — even debuggers attach via ptrace/TRACE rather than
    thread_create, so a remote thread into a process you don't own is rarely
    legitimate.

    v1.18: revived onto the real ES event (was parked on the never-dispatched
    `es_event` category). Subject = the injecting process; target carried as
    Target* enrichments. Same-team and target-self pairs are excluded in place
    of the unimplemented |fieldref same-signer filter.
author: MacCrab Community
date: 2026/04/05
modified: 2026/06/04
references:
    - https://attack.mitre.org/techniques/T1055/
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055
logsource:
    category: process_event
    product: macos
detection:
    selection:
        event.action: 'remote_thread_create'
    filter_self:
        TargetIsSelf: 'true'
    filter_same_team:
        SameTeam: 'true'
    filter_apple:
        SignerType: 'apple'
    filter_debugger:
        Image|endswith:
            - '/lldb'
            - '/lldb-rpc-server'
            - '/debugserver'
            - '/DTServiceHub'
            - '/ReportCrash'
            - '/spindump'
    condition: selection and not filter_self and not filter_same_team and not filter_apple and not filter_debugger
falsepositives:
    - Accessibility frameworks injecting helper threads into apps
    - Non-Apple endpoint-security / profiling products
level: high
