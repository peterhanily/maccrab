title: Hidden File Created in User Directory
id: d1a2b3c4-0023-4000-a000-000000000023
status: experimental
description: Detects creation of hidden files (dot-prefix) in user home directories by UNSIGNED or ad-hoc-signed processes. Malware drops staged payloads as dotfiles to avoid Finder visibility; legitimate apps that write dotfiles (vendor drivers, dev tools, Electron apps) are developer-ID signed and bypass this rule at the signer check.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1564/001/
tags:
    - attack.defense_evasion
    - attack.t1564.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|startswith: '/Users/'
        TargetFilename|re: '/Users/[^/]+/\.[^/]+'
    # v1.6.10: require an unsigned or ad-hoc-signed subject. Across
    # v1.6.5-v1.6.9 this rule kept firing on developer-ID-signed
    # vendor drivers (Logitech Options+, Razer Synapse, etc.) despite
    # increasingly long vendor allow-lists — because vendor binaries
    # rename between releases and the allow-list was brittle. The
    # signer anchor flips the model: only explicitly-untrusted
    # binaries can fire at all. Developer-ID signed Logitech /
    # Razer / Elgato agents are trusted by the OS signature graph;
    # they don't need an allow-list entry here.
    selection_signer:
        SignerType:
            - 'unsigned'
            - 'adHoc'
    filter_common:
        TargetFilename|contains:
            - '/.Trash/'
            - '/.cache/'
            - '/.config/'
            - '/.local/'
            - '/.npm/'
            - '/.ssh/'
            - '/.git/'
            - '/.docker/'
            - '/.vscode/'
            - '/.zsh_history'
            - '/.bash_history'
            - '/Library/'
    # Terminal-launched admin tools (writing .zshrc, .bash_profile
    # via editor, etc.) are user-intentional even if the editor
    # itself is unsigned.
    filter_terminal_parent:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
    condition: selection and selection_signer and not filter_common and not filter_terminal_parent
falsepositives:
    - Unsigned developer tools writing dotfiles (suppress via allowlist / NoiseFilter Gate 5)
    - Unsigned update agents — rarely seen in practice; file a noise report if you hit this
level: low
