title: System Log Files Deleted
id: d1a2b3c4-0111-4000-a000-000000000111
status: stable
description: Detects deletion or truncation of system log files. Attackers commonly remove log files to cover their tracks after an intrusion.
author: HawkEye Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1070/002/
tags:
    - attack.defense_evasion
    - attack.t1070.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'rm /var/log/'
            - 'rm /private/var/log/'
            - 'rm /Library/Logs/'
            - 'rm -rf /var/log/'
            - 'rm -rf /private/var/log/'
            - 'rm -rf /Library/Logs/'
            - '> /var/log/'
            - '> /private/var/log/'
            - 'truncate /var/log/'
            - 'truncate /private/var/log/'
            - 'log erase'
    condition: selection
falsepositives:
    - Log rotation scripts and system maintenance (newsyslog, logrotate, aslmanager with Apple signature)
    - Disk cleanup utilities
level: high
