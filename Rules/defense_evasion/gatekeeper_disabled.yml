title: Gatekeeper Disabled via spctl
id: d1a2b3c4-0020-4000-a000-000000000020
status: stable
description: Detects disabling of macOS Gatekeeper via spctl --master-disable.
author: HawkEye Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1553/001/
tags:
    - attack.defense_evasion
    - attack.t1553.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/spctl'
        CommandLine|contains: '--master-disable'
    condition: selection
falsepositives:
    - System administrators intentionally disabling Gatekeeper
level: critical
