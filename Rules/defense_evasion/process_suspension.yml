title: Process Suspended via SIGSTOP From Non-Platform Parent
id: d1a2b3c4-0434-4000-a000-000000000434
status: experimental
description: >
    Detects `kill`/`killall` issuing SIGSTOP (signal 19) against a
    process. Attackers may suspend monitoring daemons, AV agents, or
    logging services as a defense-evasion tactic. Job control in
    terminals and batch schedulers also legitimately sends SIGSTOP,
    so the rule is narrowed to non-Apple parents and downgraded to
    low. Use in correlation with security_tool_disabled.yml /
    sequence rules for higher-confidence campaigns.
author: MacCrab Community
date: 2026/04/05
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_kill_stop:
        Image|endswith: '/kill'
        CommandLine|contains:
            - ' -STOP '
            - ' -SIGSTOP '
            - ' -s STOP'
            - ' -s SIGSTOP'
    selection_killall_stop:
        Image|endswith: '/killall'
        CommandLine|contains:
            - ' -STOP '
            - ' -SIGSTOP '
            - ' -s STOP'
            - ' -s SIGSTOP'
    filter_apple:
        SignerType: 'apple'
    filter_apple_parent:
        ParentSignerType: 'apple'
    condition: (selection_kill_stop or selection_killall_stop) and not filter_apple and not filter_apple_parent
falsepositives:
    - Job control in interactive terminal sessions
    - Process management scripts pausing batch jobs
    - Build systems suspending child processes
level: low
