title: Process Suspended by Another Process
id: d1a2b3c4-0434-4000-a000-000000000434
status: experimental
description: >
    Detects a process being suspended via SIGSTOP or the proc_suspend API.
    Attackers may suspend security tools, logging daemons, or monitoring
    processes as an anti-analysis or defense evasion technique to prevent
    detection while performing malicious actions.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_kill_stop:
        Image|endswith: '/kill'
        CommandLine|contains:
            - '-STOP'
            - '-SIGSTOP'
            - '-19 '
            - '-s STOP'
    selection_killall_stop:
        Image|endswith: '/killall'
        CommandLine|contains:
            - '-STOP'
            - '-SIGSTOP'
            - '-19 '
    filter_apple:
        SignerType: 'apple'
    condition: (selection_kill_stop or selection_killall_stop) and not filter_apple
falsepositives:
    - Job control in terminal sessions
    - Process management scripts pausing batch jobs
level: medium
