title: TCC Database Reset via tccutil
id: d1a2b3c4-0222-4000-a000-000000000222
status: stable
description: Detects use of tccutil to reset TCC (Transparency, Consent, and Control) permissions. Adversaries may reset TCC to clear evidence of previous permission grants or force re-prompting of users.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/tccutil'
        CommandLine|contains: 'reset'
    condition: selection
falsepositives:
    - IT administration resetting permissions during troubleshooting
    - Privacy-focused utilities
level: high
