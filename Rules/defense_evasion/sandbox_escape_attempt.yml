title: sandbox-exec Invoked With Permissive Profile
id: d1a2b3c4-0220-4000-a000-000000000220
status: experimental
description: >
    Detects `sandbox-exec` invoked with a permissive ("allow default")
    or no-op profile, which defeats the sandbox it is supposed to
    enforce. Attackers occasionally use sandbox-exec as a wrapper to
    obscure execution lineage; a permissive profile means the wrapper
    grants no isolation. The prior version of this rule also tried to
    match Mach/IOKit sandbox-escape API names (sandbox_check,
    APP_SANDBOX_CONTAINER_ID, IOServiceOpen) inside CommandLine, but
    those identifiers live in compiled binary segments and never
    appear on the command line, so those selectors were removed.
    Detection of in-process sandbox-escape primitives is tracked
    against the planned v1.13 Endpoint Security exception-port rules.
author: MacCrab Community
date: 2026/03/30
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1497/001/
    - https://developer.apple.com/library/archive/documentation/Security/Conceptual/AppSandboxDesignGuide/AboutAppSandbox/AboutAppSandbox.html
tags:
    - attack.defense_evasion
    - attack.t1497.001
detection:
    selection_sandbox_exec:
        Image|endswith: '/sandbox-exec'
        CommandLine|contains:
            - '(allow default)'
            - '-n no-sandbox'
    filter_apple_parent:
        ParentSignerType: 'apple'
    filter_xcode_parent:
        ParentImage|contains:
            - '/Xcode.app/'
            - '/Developer/'
    condition: selection_sandbox_exec and not filter_apple_parent and not filter_xcode_parent
logsource:
    category: process_creation
    product: macos
falsepositives:
    - Security researchers and sandbox-profile authors testing profiles locally
    - Developer scripts launching child processes under a deliberately permissive profile
level: medium
