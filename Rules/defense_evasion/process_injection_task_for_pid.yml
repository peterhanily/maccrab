title: Process Injection via task_for_pid Reference
id: d1a2b3c4-0109-4000-a000-000000000109
status: experimental
description: Detects processes whose command-line arguments reference task_for_pid, which is a Mach API used to obtain a send right to a target process task port. This is a prerequisite for process injection on macOS.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1055/
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'task_for_pid'
            - 'processor_set_tasks'
            - 'mach_vm_write'
            - 'thread_create_running'
    filter_xcode:
        ParentImage|contains:
            - '/Xcode'
            - '/lldb'
            - '/debugserver'
            - '/DTServiceHub'
    filter_apple_debug:
        Image|endswith:
            - '/lldb'
            - '/debugserver'
        SignerType: 'apple'
    # v1.12.0: see task_for_pid_injection.yml — CommandLine|contains on
    # Mach API names also triggers on text-search tools, pagers, editors,
    # and shells running pipelines that grep for the literal name.
    filter_text_tools:
        Image|endswith:
            - '/grep'
            - '/egrep'
            - '/fgrep'
            - '/awk'
            - '/sed'
            - '/head'
            - '/tail'
            - '/cat'
            - '/less'
            - '/more'
            - '/man'
            - '/find'
            - '/xargs'
            - '/cut'
            - '/sort'
            - '/uniq'
            - '/tr'
            - '/wc'
            - '/file'
            - '/strings'
            - '/echo'
            - '/printf'
            - '/jq'
            - '/yq'
            - '/ed'
            - '/vi'
            - '/vim'
            - '/nano'
            - '/emacs'
    filter_shells:
        Image|endswith:
            - '/zsh'
            - '/bash'
            - '/sh'
            - '/dash'
            - '/fish'
            - '/csh'
            - '/tcsh'
    # v1.12.0 RC17: see task_for_pid_injection.yml — path-based filter
    # to catch /bin/ls etc. when SignerType enrichment hasn't landed.
    filter_apple_paths:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/System/'
            - '/usr/libexec/'
    filter_dev_ai_tools:
        Image|contains:
            - '/.local/share/claude/'
            - '/Applications/Cursor.app/'
            - '/Applications/Visual Studio Code.app/'
            - '/Applications/Xcode.app/'
    condition: selection and not filter_xcode and not filter_apple_debug and not filter_text_tools and not filter_shells and not filter_apple_paths and not filter_dev_ai_tools
falsepositives:
    - Debugging tools and profilers
    - Security research tools
    - Documentation / source-code grep / man lookups (filtered)
level: low
