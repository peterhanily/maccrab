title: DYLD_INSERT_LIBRARIES Environment Variable Used
id: d1a2b3c4-0024-4000-a000-000000000024
status: stable
description: Detects use of DYLD_INSERT_LIBRARIES in process arguments or environment, a technique for dylib injection on macOS.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1574/006/
tags:
    - attack.defense_evasion
    - attack.persistence
    - attack.t1574.006
logsource:
    category: process_creation
    product: macos
detection:
    selection_env:
        CommandLine|startswith:
            - 'DYLD_INSERT_LIBRARIES='
            - 'DYLD_FRAMEWORK_PATH='
            - 'DYLD_LIBRARY_PATH='
    selection_combined:
        CommandLine|contains:
            - ' DYLD_INSERT_LIBRARIES='
            - ' DYLD_FRAMEWORK_PATH='
            - ' DYLD_LIBRARY_PATH='
            - '__XPC_DYLD_INSERT_LIBRARIES'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: (selection_env or selection_combined) and not filter_system and not filter_apple_signed
falsepositives:
    - Debugging tools injecting diagnostic libraries
    - Some legitimate application frameworks
level: high
