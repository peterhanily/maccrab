title: Non-System Binary Lacks Notarization
id: d1a2b3c4-3004-4000-a000-000000003004
status: stable
description: >
    Detects execution of a binary that is not notarized by Apple, is not
    Apple-signed, and does not reside under /System/. Since macOS 10.15,
    Apple requires notarization for all distributed software. A binary
    lacking notarization may indicate malware, a trojanized tool, or
    software that has bypassed Gatekeeper protections. This is especially
    concerning for binaries in ~/Downloads or /tmp.
author: MacCrab Community
date: 2026/04/04
references:
    - https://developer.apple.com/documentation/security/notarizing_macos_software_before_distribution
    - https://attack.mitre.org/techniques/T1553/001/
tags:
    - attack.defense_evasion
    - attack.t1553.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        NotarizationStatus: 'not_notarized'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/bin/'
            - '/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    # v1.17.1 FP fix: a valid Developer-ID (or App Store) signature already
    # cleared Gatekeeper at first launch. Absence of a STAPLED notarization
    # ticket is normal for CLI tools (Homebrew/npm/pip/cargo) and is not by
    # itself malware — this rule was ~40-46% of all alert volume.
    filter_devid_signed:
        SignerType:
            - 'devId'
            - 'appStore'
    # v1.17.1 FP fix: developer toolchain / package-manager / build-scratch
    # trees (uv, node, python, esbuild, ruff, gh, and MacCrab's own SwiftPM
    # build artifacts). These are routinely signed-but-unstapled or ad-hoc and
    # dominated the false positives. Absolute system prefixes are anchored with
    # |startswith so a crafted subpath (e.g. /tmp/usr/local/bin/evil) can't
    # match; the home-relative trees use |contains because the rule can't know
    # $HOME. An unsigned drop into node_modules is still caught by
    # node_modules_spawns_binary / package_drops_native_binary_in_pure_js_pkg.
    filter_devtools_system:
        Image|startswith:
            - '/opt/homebrew/'
            - '/usr/local/Cellar/'
            - '/usr/local/bin/'
    filter_devtools_user:
        Image|contains:
            - '/.nvm/'
            - '/.cargo/bin/'
            - '/node_modules/'
            - '/.venv/'
            - '/site-packages/'
            - '/.local/bin/'
            - '/.local/share/uv/'    # uv-managed CPython interpreters
            - '/.local/pipx/'        # pipx app virtualenvs
            - '/.pyenv/'
            - '/.rbenv/'
            - '/.build/'
            # SwiftPM compiles + RUNS the Package.swift manifest as a Mach-O
            # from a scratch dir under macOS TMPDIR's .../T/. Anchored on '/T/'
            # so an attacker path (~/Downloads/TemporaryDirectory.x/payload,
            # no '/T/' parent) still fires.
            - '/T/TemporaryDirectory.'
    filter_xcode:
        Image|startswith:
            - '/Applications/Xcode'
            - '/Library/Developer/'
    condition: selection and not filter_system and not filter_apple_signed and not filter_devid_signed and not filter_devtools_system and not filter_devtools_user and not filter_xcode
falsepositives:
    - Locally compiled development binaries
    - Open source tools installed via Homebrew (some may lack notarization)
    - Legacy software predating notarization requirement
level: high
