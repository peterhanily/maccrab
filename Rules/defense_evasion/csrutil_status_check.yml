title: SIP Status Queried via csrutil
id: d1a2b3c4-0025-4000-a000-000000000025
status: experimental
description: Detects csrutil status being checked, which may indicate reconnaissance for SIP bypass or tamper attempts.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1518/001/
tags:
    - attack.discovery
    - attack.t1518.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/csrutil'
        # Only fire on reconnaissance queries, not on active-tampering
        # invocations. `csrutil disable / clear / authenticated-root
        # disable` are caught by `sip_check_before_tampering.yml` and
        # tagged attack.defense_evasion; double-firing both rules on a
        # single disable attempt was producing the "coordinated attack
        # from single process" campaign on csrutil (discovery +
        # defense_evasion from two rules on one invocation).
        CommandLine|contains:
            - ' status'
            - ' netboot'
            - ' authenticated-root status'
            - ' --help'
    filter_apple:
        ParentImage|startswith: '/System/'
    filter_platform:
        PlatformBinary: 'true'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
    filter_apple_parent:
        ParentSignerType: 'apple'
    # Backstop: /usr/bin/csrutil is an Apple platform binary. Anchor on
    # the shipped path so the rule stays silent even when PlatformBinary
    # / ParentSignerType enrichment is unavailable. This is belt-and-
    # braces with filter_platform above.
    filter_system_path:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/System/'
    condition: selection and not filter_apple and not filter_platform and not filter_terminal and not filter_apple_parent and not filter_system_path
falsepositives:
    - System administration
    - Security audit tools
level: low
