title: Security Tool Process Terminated
id: d1a2b3c4-0022-4000-a000-000000000022
status: experimental
description: Detects kill signals sent to known macOS security tool processes.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_kill:
        Image|endswith:
            - '/kill'
            - '/killall'
            - '/pkill'
    selection_target:
        CommandLine|contains:
            - 'LuLu'
            - 'BlockBlock'
            - 'OverSight'
            - 'RansomWhere'
            - 'KnockKnock'
            - 'ReiKey'
            - 'Netiquette'
            - 'DNSMonitor'
            - 'Santa'
            - 'maccrabd'
            - 'CrowdStrike'
            - 'Falcon'
            - 'SentinelOne'
            - 'Elastic Agent'
    condition: selection_kill and selection_target
falsepositives:
    - System administrators intentionally stopping security tools for maintenance
level: critical
