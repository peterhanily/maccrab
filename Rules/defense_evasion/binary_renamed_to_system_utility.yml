title: Unsigned Binary Masquerading as System Utility
id: d1a2b3c4-0027-4000-a000-000000000027
status: experimental
description: >
    Detects non-Apple-signed binaries whose filename matches a well-known macOS
    system daemon (sshd, cron, launchd, mds, mdworker, trustd, securityd) but
    which live outside the canonical system paths. Adversaries rename payloads
    to mimic system processes (T1036.004) so that casual inspection of `ps`
    output does not raise suspicion.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1036/004/
tags:
    - attack.defense_evasion
    - attack.t1036.004
logsource:
    category: process_creation
    product: macos
detection:
    selection_name:
        Image|endswith:
            - '/sshd'
            - '/cron'
            - '/launchd'
            - '/mds'
            - '/mdworker'
            - '/trustd'
            - '/securityd'
    filter_system_path:
        Image|startswith:
            - '/usr/'
            - '/System/'
            - '/sbin/'
    filter_apple:
        SignerType: 'apple'
    condition: selection_name and not filter_system_path and not filter_apple
falsepositives:
    - In-house developer builds of system utilities run from /tmp, ~/build, or DerivedData
    - Custom OpenSSH server builds (e.g. Homebrew openssh, MacPorts) shipping their own /sshd
    - QA/test harnesses that ship renamed stub binaries (mock sshd, mock launchd)
level: high
