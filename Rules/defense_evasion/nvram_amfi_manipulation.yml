title: NVRAM AMFI Security Variable Manipulation
id: d1a2b3c4-0342-4000-a000-000000000342
status: stable
description: >
    Detects attempts to modify NVRAM variables that control AMFI (Apple Mobile
    File Integrity) enforcement. While the kernel ignores standalone NVRAM writes
    for these variables (requiring boot-args via recovery mode), the attempt
    itself indicates an adversary probing for AMFI bypass vectors.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/nvram'
        CommandLine|contains:
            - 'amfi_get_out_of_my_way'
            - 'amfi_allow_any_signature'
            - 'cs_enforcement_disable'
            - 'PE_i_can_has_debugger'
    condition: selection
falsepositives:
    - Security researchers testing AMFI enforcement
level: critical
