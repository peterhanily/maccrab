title: Kernel Cache Rebuild by Non-System Process
id: d1a2b3c4-0226-4000-a000-000000000226
status: stable
description: Detects invocation of kmutil or kextcache by non-system processes. Rebuilding the kernel cache outside of system updates may indicate kernel extension manipulation or rootkit installation.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1014/
tags:
    - attack.defense_evasion
    - attack.t1014
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/kmutil'
            - '/kextcache'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_installer:
        ParentImage|endswith:
            - '/installer'
            - '/softwareupdated'
    condition: selection and not filter_system and not filter_installer
falsepositives:
    - System updates rebuilding kernel cache
    - Legitimate kext management by administrators
level: high
