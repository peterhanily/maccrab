title: Plist Conversion via plutil for Inspection
id: d1a2b3c4-0228-4000-a000-000000000228
status: experimental
description: Detects use of plutil to convert plist files between formats, which may indicate reconnaissance or tampering of configuration files. Adversaries convert binary plists to XML for inspection and modification.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1562/001/
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/plutil'
        CommandLine|contains: '-convert'
    selection_sensitive:
        CommandLine|contains:
            - '/LaunchAgents/'
            - '/LaunchDaemons/'
            - '/Preferences/com.apple.'
            - '/TCC/'
            - '/Security/'
            - 'authorization'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and selection_sensitive and not filter_system
falsepositives:
    - System administrators inspecting plist configurations
    - Backup and migration tools
level: medium
