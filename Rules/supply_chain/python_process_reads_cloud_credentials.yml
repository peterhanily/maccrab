title: Python Process Reads Cloud Provider Credentials
id: d1a2b3c4-0308-4000-a000-000000000008
status: experimental
description: >
    Detects Python processes reading credential files for AWS, GCP, and Azure cloud
    providers. The TeamPCP/LiteLLM attack (March 2026) harvested cloud credentials
    including AWS access keys, GCP service account keys, and Azure tokens as part of
    a comprehensive credential theft operation.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection_process:
        Image|endswith:
            - '/python'
            - '/python3'
            - '/python3.10'
            - '/python3.11'
            - '/python3.12'
            - '/python3.13'
    selection_cloud_files:
        TargetFilename|endswith:
            - '/.aws/credentials'
            - '/.aws/config'
            - '/.config/gcloud/application_default_credentials.json'
            - '/.config/gcloud/credentials.db'
            - '/.azure/accessTokens.json'
            - '/.azure/azureProfile.json'
            - '/.azure/msal_token_cache.json'
    filter_known_tools:
        Image|contains:
            - '/aws-cli/'
            - '/gcloud/'
            - '/azure-cli/'
    condition: selection_process and selection_cloud_files and not filter_known_tools
falsepositives:
    - Legitimate Python cloud SDKs (boto3, google-cloud, azure-sdk)
    - Cloud infrastructure management tools written in Python
level: medium
