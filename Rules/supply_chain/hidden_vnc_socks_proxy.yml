title: Hidden VNC or SOCKS Proxy Server Started by Non-System Process
id: d1a2b3c4-0318-4000-a000-000000000018
status: experimental
description: >
    Detects VNC servers or SOCKS proxy servers started in listening mode by
    non-system processes. The GlassWorm worm (Jan-March 2026) deployed hidden
    SOCKS proxies and VNC servers on compromised machines to enable remote
    access and lateral movement. To reduce false positives from legitimate SSH
    tunneling, this rule requires both a VNC/SOCKS keyword AND an explicit
    listening/bind flag in the command line, plus a non-Apple, non-developer-IDE
    parent so day-to-day `ssh -D 1080` from a terminal does not trigger.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1219/
    - https://attack.mitre.org/techniques/T1090/
    - https://www.sentinelone.com/labs/glassworm-vscode-worm-2026/
tags:
    - attack.command_and_control
    - attack.t1219
    - attack.t1090
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_proxy_keyword:
        CommandLine|contains:
            - 'x11vnc'
            - 'tightvnc'
            - 'tigervnc'
            - 'vnc-server'
            - 'vncserver'
            - ' rfb '
            - 'socksify'
            - 'proxychains'
            - ' socks5 '
            - ' socks4 '
    selection_listening:
        CommandLine|contains:
            - ' -D 1080'
            - ' -D 9050'
            - ' -listen'
            - ' --listen'
            - ' -p 5900'
            - ' -p 5901'
            - ' -port 5900'
            - ' bind '
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple:
        SignerType: 'apple'
    filter_apple_parent:
        ParentSignerType: 'apple'
    filter_screen_sharing:
        Image|endswith: '/screensharingd'
    filter_ide_parent:
        ParentImage|endswith:
            - '/Code'
            - '/Code Helper'
            - '/Cursor'
            - '/Xcode'
    condition: selection_proxy_keyword and selection_listening and not filter_system and not filter_apple and not filter_apple_parent and not filter_screen_sharing and not filter_ide_parent
falsepositives:
    - Legitimate remote desktop applications (TeamViewer, AnyDesk)
    - SSH SOCKS tunneling from terminal for development (-D flag)
    - Corporate VPN/proxy tools
level: medium
