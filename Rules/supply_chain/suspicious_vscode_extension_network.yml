title: VS Code Extension Makes Suspicious Outbound Connection
id: d1a2b3c4-0317-4000-a000-000000000017
status: experimental
description: >
    Detects VS Code extension host processes making outbound network connections to
    non-Microsoft, non-GitHub IP addresses on unusual ports. The GlassWorm worm
    (Jan-March 2026) used Solana blockchain transactions and Google Calendar events
    as C2 channels.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1071/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.sentinelone.com/labs/glassworm-vscode-worm-2026/
tags:
    - attack.command_and_control
    - attack.t1071
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: network_connection
    product: macos
detection:
    selection:
        Image|contains:
            - 'Code Helper (Plugin)'
            - 'extensionHost'
            - 'code-server'
        DestinationPort:
            - 8080
            - 8443
            - 4444
            - 1337
            - 9999
            - 5555
    condition: selection
falsepositives:
    - VS Code extensions that connect to local dev servers on unusual ports
level: medium
