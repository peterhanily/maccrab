title: Process Scans for Multiple AI/LLM Tool Configurations
id: d1a2b3c4-0322-4000-a000-000000000022
status: experimental
description: >
    Detects a process reading configuration files for multiple AI/LLM tools. The
    CanisterWorm/NX attack (August 2025) was the first supply chain attack to specifically
    scan for installed LLM tools on developer machines, targeting configurations for
    Cursor, Copilot, Cody, Continue, LMStudio, and Ollama to steal API keys and tokens.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://socket.dev/blog/canisterworm-nx-llm-targeting-2025
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.discovery
    - attack.t1083
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/.cursor/'
            - '/github-copilot/'
            - '/.cody/'
            - '/.continue/'
            - '/LM Studio/'
            - '/.ollama/'
            - '/Copilot/'
            - '/.codeium/'
            - '/.tabby/'
    filter_apple:
        SignerType: 'apple'
    filter_ai_tools:
        Image|contains:
            - 'Cursor'
            - 'copilot'
            - 'Cody'
            - 'Continue'
            - 'LM Studio'
            - 'Ollama'
            - 'Code'
    condition: selection and not filter_apple and not filter_ai_tools | count(TargetFilename) by Image > 2
falsepositives:
    - Backup utilities that traverse home directory configuration files
    - Security audit tools that enumerate installed software
level: high
