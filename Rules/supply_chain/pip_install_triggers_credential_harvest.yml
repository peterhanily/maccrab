title: pip or Python Process Accesses Sensitive Credential Store
id: d1a2b3c4-0311-4000-a000-000000000011
status: experimental
description: >
    Detects pip or Python processes accessing sensitive credential stores (SSH keys,
    cloud provider configs, shell history, Kubernetes configs). During legitimate package
    installation, pip has no reason to read these files; access patterns matching this
    rule are characteristic of malicious post-install scripts. The TeamPCP/LiteLLM
    attack (March 2026) used this technique for credential harvesting. Note: the count-
    based condition (≥3 files) cannot be enforced in the flat predicate engine; this
    rule fires on any single-file access by pip/python that passes filters.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
tags:
    - attack.credential_access
    - attack.t1552
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection_process:
        Image|endswith:
            - '/python'
            - '/python3'
            - '/python3.10'
            - '/python3.11'
            - '/python3.12'
            - '/python3.13'
            - '/pip'
            - '/pip3'
    selection_cred_files:
        TargetFilename|contains:
            - '/.ssh/'
            - '/.aws/'
            - '/.config/gcloud/'
            - '/.azure/'
            - '/.kube/'
            - '/.npmrc'
            - '/.gitconfig'
            - '/.docker/config.json'
            - '/.gnupg/'
            - '/.bash_history'
            - '/.zsh_history'
    condition: selection_process and selection_cred_files
falsepositives:
    - Security scanning tools that enumerate credential files
    - Backup utilities running under Python
    - Python scripts legitimately managing their own credentials
level: high
