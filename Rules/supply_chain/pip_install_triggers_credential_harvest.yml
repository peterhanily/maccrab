title: pip Install Process Accesses Multiple Credential Stores
id: d1a2b3c4-0311-4000-a000-000000000011
status: experimental
description: >
    Detects pip or Python processes spawned during package installation that access
    multiple credential stores in rapid succession. The TeamPCP/LiteLLM attack (March
    2026) harvested SSH keys, .env files, AWS/GCP/Azure creds, Kubernetes configs,
    shell history, and crypto wallets during a single pip install operation.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
tags:
    - attack.credential_access
    - attack.t1552
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection_process:
        Image|endswith:
            - '/python'
            - '/python3'
            - '/python3.10'
            - '/python3.11'
            - '/python3.12'
            - '/python3.13'
            - '/pip'
            - '/pip3'
    selection_cred_files:
        TargetFilename|contains:
            - '/.ssh/'
            - '/.aws/'
            - '/.config/gcloud/'
            - '/.azure/'
            - '/.kube/'
            - '/.npmrc'
            - '/.gitconfig'
            - '/.docker/config.json'
            - '/.gnupg/'
            - '/.bash_history'
            - '/.zsh_history'
    condition: selection_process and selection_cred_files | count(TargetFilename) by Image > 3
falsepositives:
    - Security scanning tools that enumerate credential files
    - Backup utilities running under Python
level: critical
