title: Bun Runtime Executes From node_modules (Mini Shai-Hulud Evasion)
id: d1a2b3c4-0302-4000-a000-000000000022
status: experimental
description: >
    Detects the Bun JavaScript runtime executing a script from a
    node_modules tree. The May 2026 Mini Shai-Hulud Wave 4 (TanStack,
    CVE-2026-45321) dropped a Bun runtime and executed bun_environment.js
    / setup_bun.js / router_init.js to evade Node-based introspection.
    Bun is rarely auto-installed by npm/pnpm/yarn, so its presence in a
    package-manager-descended process tree executing files from
    node_modules is high-signal.
author: MacCrab Community
date: 2026/05/13
references:
    - https://www.stepsecurity.io/blog/mini-shai-hulud-is-back-a-self-spreading-supply-chain-attack-hits-the-npm-ecosystem
    - https://www.wiz.io/blog/mini-shai-hulud-strikes-again-tanstack-more-npm-packages-compromised
    - https://attack.mitre.org/techniques/T1195/001/
    - https://attack.mitre.org/techniques/T1027/
tags:
    - attack.execution
    - attack.t1059
    - attack.initial_access
    - attack.t1195.001
    - attack.defense_evasion
    - attack.t1027
logsource:
    category: process_creation
    product: macos
detection:
    selection_bun:
        Image|endswith:
            - '/bun'
    selection_node_modules:
        CommandLine|contains:
            - '/node_modules/'
    selection_package_manager_lineage:
        ParentImage|endswith:
            - '/npm'
            - '/npx'
            - '/pnpm'
            - '/yarn'
            - '/node'
        ParentCommandLine|contains:
            - 'install'
            - 'postinstall'
            - 'preinstall'
            - 'add'
    condition: selection_bun and selection_node_modules and selection_package_manager_lineage
falsepositives:
    - A developer intentionally running Bun against a Node project they own (e.g., `bun run` from an interactive shell — the parent will not be npm/pnpm/yarn)
    - Bun-native build scripts in monorepos that intentionally call into node_modules; pin to the repo via project boundary
level: high
