title: Git Credential Files Accessed by Unexpected Process
id: d1a2b3c4-0320-4000-a000-000000000020
status: experimental
description: >
    Detects Git credential files being accessed by processes other than git or known
    development tools. The Shai-Hulud 2.0 worm (November 2025) and GlassWorm (2026)
    both stole GitHub tokens and Git credentials to propagate and access private repos.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://socket.dev/blog/shai-hulud-npm-worm-2025
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|endswith:
            - '/.git-credentials'
            - '/.gitcredentials'
            - '/.config/gh/hosts.yml'
            - '/.config/git/credentials'
    filter_git:
        Image|endswith:
            - '/git'
            - '/git-credential-osxkeychain'
            - '/git-credential-manager'
            - '/gh'
    filter_editors:
        Image|endswith:
            - '/vim'
            - '/nvim'
            - '/nano'
            - '/code'
            - '/Code Helper'
    filter_shells:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_git and not filter_editors and not filter_shells and not filter_apple
falsepositives:
    - IDE Git plugins that manage credentials independently
    - Third-party Git GUI clients
level: high
