title: Developer Credential Store Access by Suspicious Process
id: d1a2b3c4-0328-4000-a000-000000000028
status: experimental
description: >
    Detects an unexpected process accessing developer credential stores (npm tokens,
    Git credentials, SSH keys, AWS/GCP/Docker configs). This pattern is characteristic
    of supply chain attacks like TeamPCP/LiteLLM, Shai-Hulud 2.0, and CanisterWorm
    which perform credential harvesting as part of their payload. Note: the count-based
    condition (≥3 files) cannot be enforced in the flat predicate engine; this rule
    fires on single-file access by processes that pass all filters.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
    - https://socket.dev/blog/shai-hulud-npm-worm-2025
    - https://socket.dev/blog/canisterworm-nx-llm-targeting-2025
tags:
    - attack.credential_access
    - attack.t1552
    - attack.t1552.001
    - attack.t1552.004
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/.npmrc'
            - '/.ssh/id_'
            - '/.aws/credentials'
            - '/.config/gcloud/'
            - '/.azure/'
            - '/.kube/config'
            - '/.git-credentials'
            - '/.gitcredentials'
            - '/.config/gh/hosts.yml'
            - '/.docker/config.json'
            - '/.gnupg/'
    filter_backup:
        Image|endswith:
            - '/rsync'
            - '/tar'
            - '/cp'
            - '/ditto'
    filter_apple:
        SignerType: 'apple'
    filter_devtools:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/node'
            - '/npm'
            - '/yarn'
            - '/pip'
            - '/pip3'
            - '/git'
            - '/ssh'
            - '/ssh-keygen'
            - '/curl'
            - '/aws'
            - '/gcloud'
    condition: selection and not filter_backup and not filter_apple and not filter_devtools
falsepositives:
    - Dotfile sync tools (chezmoi, yadm, GNU Stow)
    - Security audit or compliance scanning tools
    - Backup software traversing home directories
    - IDE extensions accessing credentials for authentication
level: high
