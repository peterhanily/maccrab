title: Single Process Accesses Multiple Developer Credential Stores
id: d1a2b3c4-0328-4000-a000-000000000028
status: experimental
description: >
    Detects a single process reading three or more different developer credential stores
    (npm tokens, Git credentials, SSH keys, AWS/GCP/Docker configs). This pattern is
    characteristic of supply chain attacks like TeamPCP/LiteLLM, Shai-Hulud 2.0, and
    CanisterWorm which all perform bulk credential harvesting.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
    - https://socket.dev/blog/shai-hulud-npm-worm-2025
    - https://socket.dev/blog/canisterworm-nx-llm-targeting-2025
tags:
    - attack.credential_access
    - attack.t1552
    - attack.t1552.001
    - attack.t1552.004
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/.npmrc'
            - '/.ssh/id_'
            - '/.aws/credentials'
            - '/.config/gcloud/'
            - '/.azure/'
            - '/.kube/config'
            - '/.git-credentials'
            - '/.gitcredentials'
            - '/.config/gh/hosts.yml'
            - '/.docker/config.json'
            - '/.gnupg/'
    filter_backup:
        Image|endswith:
            - '/rsync'
            - '/tar'
            - '/cp'
            - '/ditto'
    filter_apple:
        SignerType: 'apple'
    filter_shells:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
    condition: selection and not filter_backup and not filter_apple and not filter_shells | count(TargetFilename) by Image > 3
falsepositives:
    - Dotfile sync tools (chezmoi, yadm, GNU Stow)
    - Security audit or compliance scanning tools
    - Backup software traversing home directories
level: critical
