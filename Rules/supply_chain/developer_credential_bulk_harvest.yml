title: Developer Credential File Read By Untrusted Process
id: d1a2b3c4-0328-4000-a000-000000000028
status: experimental
description: >
    Detects an unexpected process reading developer credential stores (npm
    tokens, Git credentials, SSH keys, AWS/GCP/Docker configs). The previous
    title claimed "bulk harvest" but Sigma cannot count across events — this
    rule fires on a single-file read by a process that survives the filters.
    Bulk/cadence detection belongs in the sequence engine. Specificity comes
    from the credential-path list plus extended allowlists for dotfile/
    version managers (chezmoi, yadm, GNU Stow, fnm, asdf, nvm, mise, rbenv,
    pyenv, Homebrew), backup tooling, and the standard developer CLIs.
author: MacCrab Community
date: 2026/03/30
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1552/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.reversinglabs.com/blog/teampcp-litellm-supply-chain-attack-2026
    - https://socket.dev/blog/shai-hulud-npm-worm-2025
    - https://socket.dev/blog/canisterworm-nx-llm-targeting-2025
tags:
    - attack.credential_access
    - attack.t1552
    - attack.t1552.001
    - attack.t1552.004
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/.npmrc'
            - '/.ssh/id_'
            - '/.aws/credentials'
            - '/.config/gcloud/'
            - '/.azure/'
            - '/.kube/config'
            - '/.git-credentials'
            - '/.gitcredentials'
            - '/.config/gh/hosts.yml'
            - '/.docker/config.json'
            - '/.gnupg/'
    filter_backup:
        Image|endswith:
            - '/rsync'
            - '/tar'
            - '/cp'
            - '/ditto'
            - '/mv'
    filter_apple:
        SignerType: 'apple'
    filter_devtools:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/node'
            - '/npm'
            - '/pnpm'
            - '/yarn'
            - '/bun'
            - '/deno'
            - '/pip'
            - '/pip3'
            - '/uv'
            - '/poetry'
            - '/git'
            - '/ssh'
            - '/ssh-add'
            - '/ssh-keygen'
            - '/ssh-agent'
            - '/scp'
            - '/sftp'
            - '/curl'
            - '/wget'
            - '/aws'
            - '/gcloud'
            - '/gh'
            - '/glab'
            - '/docker'
            - '/kubectl'
            - '/helm'
            - '/terraform'
            - '/ansible'
            - '/op'
            - '/bw'
            - '/age'
            - '/sops'
    filter_dotfile_managers:
        Image|contains:
            - '/chezmoi'
            - '/yadm'
            - '/stow'
            - '/dotbot'
    filter_version_managers:
        Image|contains:
            - '/fnm'
            - '/asdf'
            - '/nvm'
            - '/mise'
            - '/rbenv'
            - '/pyenv'
            - '/jenv'
            - '/sdkman'
            - '/.volta/'
    filter_package_managers:
        Image|contains:
            - '/Homebrew/'
            - '/homebrew/'
            - '/MacPorts/'
            - '/.cargo/'
            - '/.rustup/'
    filter_editors:
        Image|contains:
            - '/Visual Studio Code'
            - '/Cursor.app'
            - '/Windsurf.app'
            - '/JetBrains'
            - '/Sublime Text'
            - '/Zed.app'
            - '/nvim'
            - '/vim'
            - '/emacs'
    condition: selection and not filter_backup and not filter_apple and not filter_devtools and not filter_dotfile_managers and not filter_version_managers and not filter_package_managers and not filter_editors
falsepositives:
    - Security audit or compliance scanning tools
    - Less common backup software not in filter_backup
    - IDE extensions/CLIs not yet allowlisted
level: high
