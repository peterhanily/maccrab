title: Binary Executed Directly from node_modules Directory
id: d1a2b3c4-0329-4000-a000-000000000029
status: experimental
description: >
    Detects binary execution directly from a node_modules/ directory. While node_modules/.bin/
    contains legitimate package binaries, execution of binaries from deeper within
    node_modules/ package directories (especially non-.bin paths) may indicate a
    compromised npm package deploying and running a malicious payload.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1195/001/
    - https://attack.mitre.org/techniques/T1059/007/
tags:
    - attack.execution
    - attack.t1059.007
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|contains: '/node_modules/'
    filter_bin:
        Image|contains: '/node_modules/.bin/'
    filter_node:
        Image|endswith: '/node'
    filter_known_tools:
        Image|contains:
            - '/node_modules/esbuild/'
            - '/node_modules/@esbuild/'
            - '/node_modules/fsevents/'
            - '/node_modules/sharp/'
            - '/node_modules/sqlite3/'
            - '/node_modules/turbo/'
    condition: selection and not filter_bin and not filter_node and not filter_known_tools
falsepositives:
    - Packages with prebuilt native binaries (esbuild, swc, turbo)
    - Electron-based tools with bundled executables
level: high
