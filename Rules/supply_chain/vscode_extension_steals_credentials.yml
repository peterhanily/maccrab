title: VS Code Process Reads Developer Credential Files
id: d1a2b3c4-0316-4000-a000-000000000016
status: experimental
description: >
    Detects VS Code or its extension host reading npm, Git, or other developer credential
    files. The GlassWorm worm (Jan-March 2026) stole npm tokens, GitHub tokens, Git
    credentials, and crypto wallet extension data via malicious VS Code extensions.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1195/001/
    - https://www.sentinelone.com/labs/glassworm-vscode-worm-2026/
tags:
    - attack.credential_access
    - attack.t1552.001
    - attack.initial_access
    - attack.t1195.001
logsource:
    category: file_event
    product: macos
detection:
    selection_process:
        Image|contains:
            - 'Code Helper (Plugin)'
            - 'extensionHost'
            - 'code-server'
    selection_credential_files:
        TargetFilename|endswith:
            - '/.npmrc'
            - '/.gitcredentials'
            - '/.git-credentials'
            - '/.config/gh/hosts.yml'
            - '/.docker/config.json'
    condition: selection_process and selection_credential_files
falsepositives:
    - VS Code Git extension reading .gitcredentials for authentication
    - GitHub Pull Requests extension accessing GitHub tokens
level: high
