title: Leaked Dotfile / Secret Material Under node_modules After Install
id: d1a2b3c4-0302-4000-a000-000000000035
status: experimental
description: >
    Detects a file with a secret-bearing name being created under
    `node_modules/` or `site-packages/` during a package install
    lineage — for example `.env`, `.npmrc`, `id_rsa*`, `.aws/`,
    `.git/`, `credentials.json`. These should never appear inside
    a published package (npm's default `.npmignore` and PyPI's
    `MANIFEST.in` conventions exclude them) so finding one
    post-install means either: the maintainer accidentally leaked
    a secret via the published tarball, or an attacker is staging
    a planted credential they can later exfiltrate via a separate
    process to bypass live-credential-read detections. Both
    scenarios are alert-worthy.
author: MacCrab Community
date: 2026/05/14
references:
    - https://docs.npmjs.com/cli/v10/configuring-npm/package-json#files
    - https://www.aikido.dev/blog/top-tools-to-detect-malware-in-dependencies
    - https://attack.mitre.org/techniques/T1552/001/
    - https://attack.mitre.org/techniques/T1195/001/
tags:
    - attack.initial_access
    - attack.t1195.001
    - attack.credential_access
    - attack.t1552.001
logsource:
    category: file_event
    product: macos
detection:
    selection_install_dir:
        TargetFilename|contains:
            - '/node_modules/'
            - '/site-packages/'
            - '/dist-packages/'
            - '/vendor/bundle/'
    selection_leaked_name:
        TargetFilename|contains:
            - '/.env'
            - '/.npmrc'
            - '/.pypirc'
            - '/.git/config'
            - '/.git/HEAD'
            - '/.aws/credentials'
            - '/.ssh/id_rsa'
            - '/.ssh/id_ed25519'
            - '/.ssh/identity'
            - '/credentials.json'
            - '/secrets.yaml'
            - '/.netrc'
        FileAction:
            - 'create'
            - 'close'
    selection_lineage:
        ParentImage|endswith:
            - '/npm'
            - '/npx'
            - '/pnpm'
            - '/yarn'
            - '/pip'
            - '/pip3'
            - '/uv'
            - '/poetry'
            - '/python'
            - '/python3'
    condition: selection_install_dir and selection_leaked_name and selection_lineage
falsepositives:
    - Test fixtures that legitimately include placeholder secrets (intentional `.env.example`, dummy `id_rsa` for tests — these typically have `example` / `dummy` / `test` in the name; the rule does not match `.env.example` by design)
    - Plugin frameworks that mirror project structure inside node_modules and may include benign empty `.git` markers — review the package name
level: high
