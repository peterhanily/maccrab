title: SCP Outbound Copy from Sensitive Directories
id: d1a2b3c4-0281-4000-a000-000000000281
status: stable
description: Detects scp copying files from sensitive directories (Documents, Desktop, keychain paths, SSH keys) to a remote destination. This may indicate data exfiltration via secure copy.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1048/002/
tags:
    - attack.exfiltration
    - attack.t1048.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/scp'
    selection_sensitive:
        CommandLine|contains:
            - '/Documents/'
            - '/Desktop/'
            - '/Downloads/'
            - '/.ssh/'
            - '/Keychains/'
            - '/Library/Mail/'
            - '/Library/Messages/'
            - '/Library/Safari/'
    selection_remote:
        CommandLine|contains: ':'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and selection_sensitive and selection_remote and not filter_system
falsepositives:
    - Legitimate file transfers to known servers
    - Backup operations
level: high
