title: File Upload via curl Form or Upload Flag
id: d1a2b3c4-0280-4000-a000-000000000280
status: stable
description: Detects curl invocation with -F (form upload) or --upload-file flags. Adversaries may use curl to exfiltrate files to attacker-controlled servers via HTTP file upload or PUT requests.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1048/002/
tags:
    - attack.exfiltration
    - attack.t1048.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/curl'
    selection_upload:
        CommandLine|contains:
            - ' -F '
            - ' --form '
            - ' --upload-file '
            - ' -T '
            - ' --data-binary @'
    filter_package_managers:
        ParentImage|contains:
            - 'Homebrew'
            - '/brew'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and selection_upload and not filter_package_managers and not filter_system
falsepositives:
    - Legitimate file upload services
    - CI/CD artifact uploads
    - Cloud backup tools
level: medium
