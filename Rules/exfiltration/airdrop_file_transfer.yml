title: AirDrop File Transfer by Non-Standard Process
id: d1a2b3c4-0457-4000-a000-000000000457
status: deprecated
description: >
    DEPRECATED — This rule is non-firing in practice. AirDrop transfers are
    initiated through NSSharingService / SharingUI / sharingd XPC, not via a
    command-line. The keyword `NSSharingService` / `SHKAirDrop` / `AirDrop`
    only appears in CommandLine when a user explicitly invokes a CLI wrapper,
    which is essentially never observed on real macOS endpoints. Coverage for
    AirDrop-based exfiltration is now provided by
    Rules/collection/airdrop_file_staging.yml which inspects the actual
    AirDrop staging directory at the file_event layer and flags
    credential/keystore filenames. This rule is kept as a never-firing stub
    so its ID is preserved in case a future build adds AirDrop XPC telemetry.
author: MacCrab Community
date: 2026/04/09
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1011/001/
    - https://attack.mitre.org/techniques/T1566/001/
tags:
    - attack.exfiltration
    - attack.initial_access
    - attack.t1011.001
logsource:
    category: process_creation
    product: macos
detection:
    # Intentionally unreachable: requires a non-Apple-signed `sharing` CLI
    # binary with an `airdrop` arg, which is not a real shipping pattern.
    selection_cli:
        Image|endswith: '/sharing'
        CommandLine|contains: 'airdrop'
    filter_apple:
        SignerType: 'apple'
    condition: selection_cli and not filter_apple
falsepositives:
    - This rule does not fire on production macOS; see description.
level: informational
