title: Platform Binary Loads Unsigned Code via Tcl/Dylib Injection
id: d1a2b3c4-0340-4000-a000-000000000340
status: experimental
description: >
    Detects Apple platform binaries (tclsh, auval, screen, login, su) loading
    unsigned dynamic libraries. These binaries inherit CS_PLATFORM_BINARY trust,
    allowing loaded code to bypass AMFI code signing enforcement. This technique
    was discovered as a macOS 0-day in April 2026.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1574/006/
tags:
    - attack.privilege_escalation
    - attack.defense_evasion
    - attack.t1574.006
logsource:
    category: process_creation
    product: macos
detection:
    selection_binary:
        Image|endswith:
            - '/tclsh'
            - '/tclsh8.5'
            - '/tclsh8.6'
            - '/auval'
            - '/screen'
    selection_load:
        CommandLine|contains:
            - 'load '
            - 'DYLD_INSERT_LIBRARIES'
            - '.dylib'
            - 'package require'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection_binary and selection_load and not filter_system
falsepositives:
    - Legitimate Tcl extensions loaded from system paths
    - Audio unit validation by Xcode (auval)
level: critical
