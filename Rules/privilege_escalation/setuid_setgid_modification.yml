title: SetUID or SetGID Bit Modified on File
id: d1a2b3c4-0061-4000-a000-000000000061
status: experimental
description: Detects chmod commands setting the setuid or setgid bits, which can enable privilege escalation.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1548/001/
tags:
    - attack.privilege_escalation
    - attack.t1548.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/chmod'
    selection_suid:
        CommandLine|contains:
            - '+s '
            - 'u+s'
            - 'g+s'
            - '4755'
            - '4775'
            - '2755'
            - '6755'
    condition: selection and selection_suid
falsepositives:
    - Legitimate software installation requiring setuid
level: high
