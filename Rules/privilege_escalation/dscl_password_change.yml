title: Password Change via dscl Command
id: d1a2b3c4-0271-4000-a000-000000000271
status: stable
description: Detects use of dscl to change user passwords. Adversaries may use dscl to change passwords of other user accounts for privilege escalation or to maintain access to compromised accounts.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1098/
tags:
    - attack.privilege_escalation
    - attack.persistence
    - attack.t1098
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/dscl'
        CommandLine|contains:
            - 'passwd'
            - '-passwd'
            - 'Password'
            - 'AuthenticationAuthority'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and not filter_system
falsepositives:
    - Legitimate password changes by administrators
    - User password reset workflows
level: high
