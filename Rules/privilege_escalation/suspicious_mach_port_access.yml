title: Suspicious Mach Port Exploitation Primitives in Command Line
id: d1a2b3c4-0408-4000-a000-000000000408
status: experimental
description: Detects processes with command lines referencing Mach port manipulation APIs or exploitation primitives such as mach_port, task_for_pid, thread_create_running, or mach_vm_write. These are core building blocks for macOS kernel and userland exploits that achieve privilege escalation through Mach IPC abuse.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1068/
    - https://googleprojectzero.blogspot.com/
    - https://bazad.github.io/
tags:
    - attack.privilege_escalation
    - attack.t1068
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'mach_port_allocate'
            - 'mach_port_insert_right'
            - 'mach_port_construct'
            - 'thread_create_running'
            - 'mach_vm_write'
            - 'mach_vm_allocate'
            - 'mach_vm_protect'
            - 'mach_vm_remap'
            - 'host_get_special_port'
            - 'task_for_pid'
            - 'IOConnectCallMethod'
            - 'IOServiceOpen'
    filter_xcode:
        ParentImage|contains:
            - '/Xcode'
            - '/DTServiceHub'
    filter_debug:
        Image|endswith:
            - '/lldb'
            - '/debugserver'
        SignerType: 'apple'
    filter_apple_system:
        Image|startswith: '/System/'
        SignerType: 'apple'
    # v1.12.0: CommandLine|contains on Mach API names triggers on
    # text-search tools, pagers, editors, and shells running pipelines
    # that grep for the literal name (same FP class as the other
    # task_for_pid rules). Until ES-event-based detection lands,
    # filter the obvious benign carriers.
    filter_text_tools:
        Image|endswith:
            - '/grep'
            - '/egrep'
            - '/fgrep'
            - '/awk'
            - '/sed'
            - '/head'
            - '/tail'
            - '/cat'
            - '/less'
            - '/more'
            - '/man'
            - '/find'
            - '/xargs'
            - '/cut'
            - '/sort'
            - '/uniq'
            - '/tr'
            - '/wc'
            - '/file'
            - '/strings'
            - '/echo'
            - '/printf'
            - '/jq'
            - '/yq'
            - '/ed'
            - '/vi'
            - '/vim'
            - '/nano'
            - '/emacs'
    filter_shells:
        Image|endswith:
            - '/zsh'
            - '/bash'
            - '/sh'
            - '/dash'
            - '/fish'
            - '/csh'
            - '/tcsh'
    # v1.12.0 RC17: belt-and-suspenders path filter (see
    # task_for_pid_injection.yml for the SignerType-race rationale).
    filter_apple_paths:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/System/'
            - '/usr/libexec/'
    filter_dev_ai_tools:
        Image|contains:
            - '/.local/share/claude/'
            - '/Applications/Cursor.app/'
            - '/Applications/Visual Studio Code.app/'
            - '/Applications/Xcode.app/'
    condition: selection and not filter_xcode and not filter_debug and not filter_apple_system and not filter_text_tools and not filter_shells and not filter_apple_paths and not filter_dev_ai_tools
falsepositives:
    - Developers compiling or testing Mach IPC code
    - Security researchers running proof-of-concept exploits in sandboxed environments
    - Virtualization software that uses Mach APIs for hypervisor access
    - Documentation / source-code grep / man lookups (filtered)
level: high
