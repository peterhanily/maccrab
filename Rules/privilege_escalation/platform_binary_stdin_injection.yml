title: Platform Binary Receives Piped Input from Suspicious Source
id: d1a2b3c4-0341-4000-a000-000000000341
status: experimental
description: >
    Detects platform binaries (tclsh, screen) receiving piped input that may
    contain code loading commands. Attackers pipe "load ./evil.dylib" into tclsh
    to execute unsigned code with platform binary trust, bypassing AMFI.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1059/
tags:
    - attack.execution
    - attack.privilege_escalation
    - attack.t1059
logsource:
    category: process_creation
    product: macos
detection:
    selection_parent_pipe:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
    selection_target:
        Image|endswith:
            - '/tclsh'
            - '/tclsh8.5'
            - '/tclsh8.6'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection_parent_pipe and selection_target and not filter_system and not filter_apple_signed
falsepositives:
    - Legitimate Tcl scripting from development environments
level: high
