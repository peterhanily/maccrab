title: TCC Bypass via Process Injection into Protected App Bundle
id: d1a2b3c4-0410-4000-a000-000000000410
status: experimental
description: Detects a non-Apple-signed process spawning from within a TCC-protected application bundle path. Attackers inject code into TCC-entitled applications (Safari, Terminal, Finder) to inherit their privacy permissions without triggering user consent prompts. This enables access to camera, microphone, screen recording, and full disk access.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1068/
    - https://objective-see.org/blog.html
    - https://www.microsoft.com/en-us/security/blog/2022/07/13/uncovering-a-macos-app-sandbox-escape-vulnerability-a-deep-dive-into-cve-2022-26706/
tags:
    - attack.privilege_escalation
    - attack.defense_evasion
    - attack.t1068
logsource:
    category: process_creation
    product: macos
detection:
    selection_bundle_path:
        ParentImage|contains:
            - '/Applications/Safari.app/'
            - '/Applications/Mail.app/'
            - '/System/Applications/Terminal.app/'
            - '/System/Applications/Utilities/Terminal.app/'
            - '/System/Library/CoreServices/Finder.app/'
            - '/Applications/Microsoft Outlook.app/'
            - '/Applications/Slack.app/'
            - '/Applications/zoom.us.app/'
            - '/Applications/Google Chrome.app/'
    filter_apple_child:
        SignerType: 'apple'
    filter_known_helpers:
        Image|endswith:
            - '/plugin-container'
            - '/NativeMessagingHost'
            - '/crashpad_handler'
            - '/Google Chrome Helper'
            - '/Chromium Helper'
    filter_developer_signed:
        Image|startswith:
            - '/Applications/'
            - '/System/'
        SignerType: 'developer'
    # Auto-updaters routinely spawn from inside their host app's bundle.
    # Chrome → GoogleUpdater, Slack/Discord/VS Code → Sparkle Autoupdate,
    # Edge/Teams → Microsoft AutoUpdate. The update binary lives outside
    # `/Applications/` (commonly `~/Library/Application Support/…` or
    # `~/Library/Caches/…`), so filter_developer_signed doesn't catch
    # them. Match on the image path directly.
    filter_auto_updater_image:
        Image|contains:
            - '/GoogleUpdater/'
            - '/GoogleSoftwareUpdate/'
            - '/Library/Caches/com.google.Keystone/'
            - '/Sparkle.framework/'
            - '.sparkle-project.Sparkle/Installation/'
            - '/Microsoft AutoUpdate.app/'
            - '/softwareupdated'
    filter_auto_updater_endswith:
        Image|endswith:
            - '/GoogleUpdater'
            - '/Autoupdate'
            - '/launcher'
    condition: selection_bundle_path and not filter_apple_child and not filter_known_helpers and not filter_developer_signed and not filter_auto_updater_image and not filter_auto_updater_endswith
falsepositives:
    - Browser extensions spawning native messaging hosts
    - Legitimate application helper processes with valid code signatures
    - Accessibility tools that integrate with application bundles
level: high
