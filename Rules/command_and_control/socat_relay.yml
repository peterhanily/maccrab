title: Socat TCP Relay or Command Execution
id: d1a2b3c4-0242-4000-a000-000000000242
status: stable
description: Detects socat usage with TCP connections or EXEC arguments. Socat is a versatile networking tool that can create bidirectional data streams, commonly abused for relay connections and remote shell access.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1095/
tags:
    - attack.command_and_control
    - attack.execution
    - attack.t1095
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/socat'
    selection_abuse:
        CommandLine|contains:
            - 'TCP:'
            - 'TCP-LISTEN:'
            - 'TCP4:'
            - 'TCP6:'
            - 'EXEC:'
            - 'SYSTEM:'
            - 'PTY'
            - 'OPENSSL:'
    condition: selection and selection_abuse
falsepositives:
    - Legitimate network engineering and debugging
    - Development environments using socat for port forwarding
level: high
