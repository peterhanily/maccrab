title: Netcat Listener Established
id: d1a2b3c4-0241-4000-a000-000000000241
status: stable
description: Detects netcat (nc/ncat) started in listening mode. Adversaries commonly use netcat listeners for reverse shells, file transfers, and backdoor access.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1095/
tags:
    - attack.command_and_control
    - attack.execution
    - attack.t1095
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/nc'
            - '/ncat'
            - '/netcat'
    selection_listen:
        CommandLine|contains:
            - ' -l'
            - ' --listen'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/Code Helper'
    filter_apple_parent:
        ParentSignerType: 'apple'
    condition: selection and selection_listen and not filter_terminal and not filter_apple_parent
falsepositives:
    - Network debugging and troubleshooting
    - Development testing of network services
level: high
