title: Regular C2 Beacon Pattern Detected
id: d1a2b3c4-0366-4000-a000-000000000366
status: experimental
description: >
    Detects processes making regular-interval HTTPS connections to the same
    destination, indicative of C2 beacon behavior. Low variance in connection
    timing is a strong indicator of automated callback malware.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1071/001/
tags:
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: network_connection
    product: macos
detection:
    selection:
        DestinationPort:
            - 443
            - 8443
            - 4443
    filter_browsers:
        Image|endswith:
            - '/Google Chrome'
            - '/Google Chrome Helper'
            - '/Safari'
            - '/firefox'
            - '/Microsoft Edge'
            - '/Arc'
            - '/Brave Browser'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_messaging:
        Image|contains:
            - 'WhatsApp'
            - 'Signal'
            - 'Telegram'
            - 'Slack'
            - 'Discord'
            - 'Messages'
            - 'Microsoft Teams'
            - 'Zoom'
    filter_known_services:
        Image|contains:
            - 'Keybase'
            - 'mDNSResponder'
            - 'maccrabd'
            - 'CrowdStrike'
            - 'SentinelOne'
            - 'Dropbox'
            - 'OneDrive'
            - 'Google Drive'
            - 'GoogleUpdater'
            - 'Google Chrome Helper'
            - 'iCloud'
            - 'Spotlight'
            - 'softwareupdated'
            - 'nsurlsessiond'
            - 'com.apple.'
    filter_dev_tools:
        Image|contains:
            - 'GitHub Desktop'
            - 'git-remote-http'
            - 'git-remote-https'
            - '/git-core/'
            - 'Codex Helper'
            - 'Codex.app'
            - 'ChatGPT Atlas'
            - 'Claude.app'
            - 'Claude Helper'
            - '/.local/share/claude/'
            - 'Cursor Helper'
            - 'Cursor.app'
            - 'Code Helper'
            - 'Visual Studio Code'
            - 'JetBrains'
            - 'IntelliJ'
            - 'GoLand'
            - 'PyCharm'
            - 'Docker Desktop'
            - 'orbstack'
    filter_homebrew_node:
        Image|startswith:
            - '/opt/homebrew/'
            - '/usr/local/Cellar/'
            - '/usr/local/opt/'
            - '/opt/local/'
            - '/Users/'
        Image|endswith:
            - '/node'
            - '/deno'
            - '/bun'
            - '/python'
            - '/python3'
            - '/ruby'
            - '/ollama'
    condition: selection and not filter_browsers and not filter_system and not filter_messaging and not filter_known_services and not filter_dev_tools and not filter_homebrew_node
falsepositives:
    - Legitimate heartbeat/health-check connections
    - Auto-update services
level: medium
