title: Python Socket Server or HTTP Server Creation
id: d1a2b3c4-0245-4000-a000-000000000245
status: experimental
description: Detects Python code creating socket servers or HTTP servers. Adversaries may use Python to quickly stand up command-and-control listeners or data exfiltration endpoints.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1071/001/
tags:
    - attack.command_and_control
    - attack.t1071.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/python'
            - '/python2'
            - '/python3'
    selection_server:
        CommandLine|contains:
            - 'socket.bind'
            - 'BaseHTTPServer'
            - 'HTTPServer'
            - 'SimpleHTTPServer'
            - 'http.server'
            - 'socketserver'
            - 'TCPServer'
            - 'socket.listen'
    condition: selection and selection_server
falsepositives:
    - Local development servers
    - Python-based testing frameworks
level: medium
