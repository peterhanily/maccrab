title: Outbound Connection on Unusual Port from Unsigned Binary
id: d1a2b3c4-0041-4000-a000-000000000041
status: experimental
description: Detects outbound network connections on non-standard ports from unsigned or ad-hoc signed binaries.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1571/
tags:
    - attack.command_and_control
    - attack.t1571
logsource:
    category: network_connection
    product: macos
detection:
    selection:
        DestinationIsPrivate: 'false'
    filter_common_ports:
        DestinationPort:
            - 80
            - 443
            - 22
            - 53
            - 993
            - 587
            - 465
            - 8080
            - 8443
    filter_dev_ports:
        # Common development and service ports
        DestinationPort:
            - 3000
            - 3001
            - 4000
            - 4200
            - 5000
            - 5173
            - 5432
            - 5900
            - 6379
            - 8000
            - 8888
            - 9090
            - 9200
            - 9418
            - 27017
    filter_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    filter_vpn:
        Image|endswith:
            - '/openvpn'
            - '/wireguard-go'
            - '/tailscaled'
    condition: selection and not filter_common_ports and not filter_dev_ports and not filter_signed and not filter_vpn
falsepositives:
    - Development servers on custom ports
    - VPN or P2P applications
    - Database clients (PostgreSQL, MongoDB, Redis)
level: medium
