title: High-Entropy DNS Query (Possible DGA or Tunneling)
id: d1a2b3c4-0052-4000-a000-000000000052
status: experimental
description: >
    Detects DNS queries with high-entropy domain names, indicating DGA
    (domain generation algorithm) malware or DNS tunneling for data
    exfiltration. Normal domains have low entropy; randomly generated
    C2 domains have high entropy.
author: MacCrab Community
date: 2026/04/06
references:
    - https://attack.mitre.org/techniques/T1568/002/
tags:
    - attack.command_and_control
    - attack.t1568.002
logsource:
    category: network_connection
    product: macos
detection:
    selection:
        DestinationPort: 53
    selection_entropy:
        # Match domain queries containing high-entropy segments:
        # 20+ alphanumeric characters without hyphens or dots (random-looking).
        DestinationHostname|re: '[a-z0-9]{20,}\.'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    filter_known_cdn:
        # CDN/cloud services with hash-based subdomains
        DestinationHostname|endswith:
            - '.cloudfront.net'
            - '.akamaized.net'
            - '.fastly.net'
            - '.azureedge.net'
            - '.googleapis.com'
            - '.gstatic.com'
            - '.amazonaws.com'
            - '.1e100.net'
    condition: selection and selection_entropy and not filter_system and not filter_apple_signed and not filter_known_cdn
falsepositives:
    - CDN domains with hash-based subdomains
    - Cloud services using UUID-based hostnames
    - Content-addressable storage systems
level: medium
