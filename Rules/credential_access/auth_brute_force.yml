title: Sudo Stdin Password Or Keychain Unlock By Non-Apple Process
id: d1a2b3c4-0448-4000-a000-000000000448
status: experimental
description: >
    Detects single-event uses of sudo with `-S`/`-A`/`--stdin` (password piped
    in) or `security` invoked against the keychain, by non-Apple-parent
    processes. The original rule was titled "Repeated Authentication Failures"
    but Sigma cannot aggregate across events — a true brute-force / repeated-
    failure detection belongs in the sequence engine (see
    Rules/sequences/). This single-event approximation flags one of the
    primitives an automated attack would use and relies on the rest of the
    detection stack (sequence rules, behavior scoring) for cadence.
    TODO: convert to a sequences/ rule that requires >=N events in a window.
author: MacCrab Community
date: 2026/04/09
modified: 2026/05/14
references:
    - https://attack.mitre.org/techniques/T1110/
    - https://attack.mitre.org/techniques/T1555.001/
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1555.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_sudo:
        Image|endswith: '/sudo'
        CommandLine|contains:
            - ' -S '
            - ' -A '
            - '--stdin'
    selection_security_unlock:
        Image|endswith: '/security'
        CommandLine|contains:
            - 'unlock-keychain'
            - 'authorizationdb'
            - 'find-generic-password'
            - 'find-internet-password'
    filter_apple:
        SignerType: 'apple'
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_password_managers:
        ParentImage|contains:
            - '/1Password'
            - '/Bitwarden'
            - '/Dashlane'
            - '/KeePassXC'
    filter_interactive_terminal:
        # A keychain/sudo call whose FULL lineage includes an interactive
        # terminal emulator / multiplexer is usually a human at a prompt.
        # ABF-1: but do NOT exempt '/sshd' or '/login' — SSH is a primary
        # attacker initial-access vector and interactive/reverse shells inherit
        # an sshd/login ancestor, so exempting them gives post-compromise
        # `sudo -S` / `security unlock-keychain` a free pass. Local GUI Terminal
        # use stays exempt via the Terminal.app ancestor regardless. Also
        # boundary-anchored so '/screen' (tmux/screen) no longer matches
        # 'screensharingd' / 'ScreenFlow'. (?i) = case-insensitive.
        ProcessAncestors|re:
            - '(?i)(^|/|\n)(Terminal|iTerm2|Alacritty|kitty|WarpTerminal|Ghostty|Hyper|tmux|screen|zellij)(\n|$)'
    condition: (selection_sudo or selection_security_unlock) and not filter_apple and not filter_password_managers and not filter_interactive_terminal
falsepositives:
    - Automated deployment scripts that pipe a sudo password
    - Password managers querying the keychain (covered by filter_password_managers)
    - CI/CD harnesses running `security unlock-keychain` before signing
# v1.17.4: demoted medium→low. This is a single-event approximation of
# brute force (see description TODO); the campaign/sequence layer escalates
# genuine cadence. Low keeps it from minting HIGH coordinated_attacks off
# routine keychain reads.
level: low
