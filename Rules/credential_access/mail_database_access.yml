title: Mail.app Database Accessed by Non-Mail Process
id: d1a2b3c4-0234-4000-a000-000000000234
status: experimental
description: Detects access to the Mail.app database by a process other than Mail. Adversaries may access the mail database to steal email content, credentials, and attachments.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1114/001/
tags:
    - attack.credential_access
    - attack.collection
    - attack.t1114.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/Library/Mail/'
            - '/Mail/V'
        TargetFilename|endswith:
            - '.emlx'
            - '.mbox'
            - 'Envelope Index'
            - 'Envelope Index-shm'
            - 'Envelope Index-wal'
    filter_mail:
        Image|contains:
            - 'Mail.app'
            - '/Mail'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_spotlight:
        Image|contains: 'mdworker'
    condition: selection and not filter_mail and not filter_system and not filter_spotlight
falsepositives:
    - Email backup tools
    - Mail migration utilities
level: high
