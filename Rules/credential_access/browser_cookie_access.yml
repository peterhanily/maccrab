title: Browser Cookie Database Accessed by Non-Browser
id: d1a2b3c4-0031-4000-a000-000000000031
status: experimental
description: Detects non-browser processes reading browser cookie or credential databases, indicative of credential theft.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1539/
tags:
    - attack.credential_access
    - attack.t1539
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/Google/Chrome/Default/Cookies'
            - '/Google/Chrome/Default/Login Data'
            - '/Firefox/Profiles/'
            - '/Safari/Cookies/Cookies.binarycookies'
            - '/Microsoft Edge/Default/Cookies'
            - '/Brave-Browser/Default/Cookies'
    filter_browsers:
        Image|contains:
            - 'Google Chrome'
            - 'Firefox'
            - 'Safari'
            - 'Microsoft Edge'
            - 'Brave Browser'
    filter_apple:
        SignerType: 'apple'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    # Cloud sync and backup engines legitimately read browser profile
    # directories. Spotlight indexer also opens these files.
    filter_sync_backup:
        Image|contains:
            - '/Dropbox.app/'
            - '/iCloud Drive/'
            - '/OneDrive.app/'
            - '/Google Drive.app/'
            - '/Backblaze.app/'
            - '/Carbon Copy Cloner.app/'
            - '/SuperDuper!.app/'
            - '/Arq.app/'
            - '/Arq 7.app/'
            - '/backupd'
            - '/backupd-helper'
            - '/Migration Assistant.app/'
            - '/MigrationAssistant'
            - '/mds'
            - '/mdworker_shared'
    condition: selection and not filter_browsers and not filter_apple and not filter_system and not filter_sync_backup
falsepositives:
    - Browser sync utilities
    - Backup software
level: high
