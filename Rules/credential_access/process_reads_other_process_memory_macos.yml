title: Process Acquires Read Access to Another Process's Memory (task_read_for_pid)
id: 4b889f55-5cca-402d-a717-ae257b5d9ef8
status: experimental
description: >
    Detects a process acquiring the task-read port of ANOTHER process — the
    Mach primitive (task_read_for_pid / task_for_pid) that gates every
    cross-process mach_vm_read. This is the macOS analog of reading
    /proc/pid/mem and is how an attacker scrapes a live credential from a
    running process's memory (OIDC token from gh/aws, SSH key from ssh-agent,
    secrets from securityd) AFTER the user authenticated — sidestepping
    read-the-cred-file detection entirely. The Mini Shai-Hulud Wave 4 TanStack
    worm (CVE-2026-45321) used exactly this.

    v1.18: this rule now keys on the real ES NOTIFY_GET_TASK_READ event
    (subject = the acquiring process, target carried as Target* enrichments) —
    not the old weak argv-substring heuristic that flagged any `grep task_for_pid`.
author: MacCrab Team
date: 2026/05/17
modified: 2026/06/04
references:
    - https://snyk.io/blog/tanstack-npm-packages-compromised/
    - https://developer.apple.com/documentation/kernel/1502472-task_for_pid
    - https://attack.mitre.org/techniques/T1003/
    - https://attack.mitre.org/techniques/T1555/
    - https://attack.mitre.org/techniques/T1057/
tags:
    - attack.credential_access
    - attack.t1003
    - attack.t1555
    - attack.discovery
    - attack.t1057
logsource:
    category: process_event
    product: macos
detection:
    selection:
        event.action: 'get_task_read'
    filter_self:
        # A process reading its OWN task is benign (introspection/crash setup).
        TargetIsSelf: 'true'
    filter_same_team:
        # Same-team actor->target = legitimate intra-vendor IPC (an app's helper
        # reading its main process). Stands in for the unimplemented |fieldref.
        SameTeam: 'true'
    filter_apple_signed:
        SignerType: 'apple'
    filter_debuggers:
        Image|endswith:
            - '/lldb'
            - '/lldb-rpc-server'
            - '/lldb-server'
            - '/debugserver'
            - '/DTServiceHub'
            - '/leaks'
            - '/heap'
            - '/sample'
            - '/vmmap'
            - '/footprint'
            - '/spindump'
            - '/ReportCrash'
    filter_dev_ide:
        Image|contains:
            - '/Applications/Xcode.app/'
            - '/Cursor.app/'
            - '/Visual Studio Code.app/'
            - '/Zed.app/'
            - '/JetBrains'
            - '/Instruments.app/'
    filter_edr:
        # Non-Apple security/EDR agents legitimately introspect processes
        # (Developer-ID signed, so they survive the platform-binary emission gate).
        Image|contains:
            - '/falcond'
            - '/falcon-sensor'
            - '/SentinelAgent'
            - '/SentinelOne'
            - '/Microsoft Defender'
            - '/wdav'
    filter_password_managers:
        Image|contains:
            - '/1Password'
            - '/Bitwarden'
            - '/Dashlane'
            - '/KeePassXC'
    condition: selection and not filter_self and not filter_same_team and not filter_apple_signed and not filter_debuggers and not filter_dev_ide and not filter_edr and not filter_password_managers
falsepositives:
    - Third-party debuggers/profilers not in the allowlist (add via maccrabctl suppress)
    - Non-Apple security/EDR agents that legitimately introspect processes
level: medium
