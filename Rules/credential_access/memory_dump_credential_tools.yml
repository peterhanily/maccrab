title: Memory Dump Tool Attached to Credential Process
id: d1a2b3c4-0401-4000-a000-000000000401
status: experimental
description: Detects lldb, gdb, dtrace, or sample attaching to security-related processes such as securityd, loginwindow, or authorizationhost. These tools can dump process memory that contains cached credentials, Kerberos tickets, or keychain unlock tokens.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1003/
    - https://www.welivesecurity.com/2019/10/11/macos-credential-dumping/
tags:
    - attack.credential_access
    - attack.t1003
logsource:
    category: process_creation
    product: macos
detection:
    selection_tool:
        Image|endswith:
            - '/lldb'
            - '/gdb'
            - '/dtrace'
            - '/sample'
    selection_target:
        CommandLine|contains:
            - 'securityd'
            - 'loginwindow'
            - 'authorizationhost'
            - 'opendirectoryd'
            - 'SecurityAgent'
    condition: selection_tool and selection_target
falsepositives:
    - Apple engineers debugging system processes with entitlements
    - Security researchers with SIP disabled on test machines
    - Legitimate crash triage by IT administrators
level: critical
