title: WiFi Password Extraction via security Command
id: d1a2b3c4-0230-4000-a000-000000000230
status: stable
description: Detects use of the security command-line tool to extract WiFi passwords from the keychain using find-generic-password with the AirPort service.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1555/001/
tags:
    - attack.credential_access
    - attack.t1555.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/security'
    selection_keychain:
        CommandLine|contains:
            - 'find-generic-password'
    selection_wifi:
        CommandLine|contains:
            - 'AirPort'
            - 'com.apple.network'
            - '-ga '
            - '-gw '
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and selection_keychain and selection_wifi and not filter_system and not filter_apple_signed
falsepositives:
    - Network administration scripts
    - WiFi management utilities
level: high
