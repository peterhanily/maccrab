title: WiFi Password Extraction via security Command
id: d1a2b3c4-0230-4000-a000-000000000230
status: stable
description: Detects use of the security command-line tool to extract WiFi passwords from the keychain using find-generic-password with the AirPort service.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1555/001/
tags:
    - attack.credential_access
    - attack.t1555.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/security'
    selection_wifi:
        CommandLine|contains:
            - 'find-generic-password'
        CommandLine|contains:
            - 'AirPort'
            - 'com.apple.network'
            - '-ga '
            - '-gw '
    condition: selection and selection_wifi
falsepositives:
    - Network administration scripts
    - WiFi management utilities
level: high
