title: Safari Passwords Database Accessed
id: d1a2b3c4-0117-4000-a000-000000000117
status: stable
description: Detects access to the Safari passwords keychain database by a non-Safari, non-system process. This may indicate credential theft targeting Safari's saved passwords.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1555/003/
tags:
    - attack.credential_access
    - attack.t1555.003
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/Safari/Passwords'
            - '/Safari/LocalItems'
            - '/Safari/Form Values'
            - 'Safari/Databases'
    filter_safari:
        Image|endswith: '/Safari'
    filter_apple:
        SignerType: 'apple'
        Image|startswith:
            - '/System/'
            - '/usr/'
    condition: selection and not filter_safari and not filter_apple
falsepositives:
    - iCloud sync processes accessing Safari data
    - Time Machine backup operations
level: high
