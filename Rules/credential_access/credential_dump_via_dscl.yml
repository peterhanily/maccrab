title: Credential Extraction via dscl Directory Service
id: d1a2b3c4-0404-4000-a000-000000000404
status: experimental
description: Detects use of the dscl (Directory Service command line) utility to read authentication attributes from user accounts. Attackers use dscl to extract AuthenticationAuthority, ShadowHashData, and password policy information that can be used for offline cracking or pass-the-hash attacks.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1003/
    - https://www.cisa.gov/news-events/cybersecurity-advisories
tags:
    - attack.credential_access
    - attack.t1003
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/dscl'
    selection_read:
        CommandLine|contains: '-read'
    selection_cred_fields:
        CommandLine|contains:
            - 'AuthenticationAuthority'
            - 'ShadowHashData'
            - 'HeimdalSRPKey'
            - 'KerberosKeys'
            - 'dsAttrTypeNative:ShadowHashData'
            - 'GeneratedUID'
            - 'Password'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and selection_read and selection_cred_fields and not filter_system and not filter_apple_signed
falsepositives:
    - System administrators auditing user account attributes
    - Directory service troubleshooting by IT staff
    - Account migration scripts reading authentication data
level: high
