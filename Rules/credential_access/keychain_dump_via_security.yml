title: Keychain Dump via security CLI
id: d1a2b3c4-0030-4000-a000-000000000030
status: stable
description: Detects use of the macOS security command-line tool to dump or export keychain items.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1555/001/
tags:
    - attack.credential_access
    - attack.t1555.001
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/security'
    selection_dump:
        CommandLine|contains:
            - 'dump-keychain'
            - 'find-generic-password'
            - 'find-internet-password'
            - 'export -t'
            - 'find-certificate'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and selection_dump and not filter_system and not filter_apple_signed
falsepositives:
    - Legitimate keychain management scripts
    - Backup tools accessing keychain
level: high
