title: Password Manager Database File Accessed
id: d1a2b3c4-0232-4000-a000-000000000232
status: experimental
description: Detects access to password manager database files (1Password, Bitwarden, KeePass) by processes other than the password manager itself. Adversaries may target these databases for credential theft.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1555/005/
tags:
    - attack.credential_access
    - attack.t1555.005
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains:
            - '/1Password/'
            - '/com.agilebits.onepassword/'
            - '/Bitwarden/'
            - '.kdbx'
            - '.kdb'
            - '.1pif'
            - '.opvault'
    condition: selection
falsepositives:
    - Password manager apps themselves (1Password, Bitwarden, KeePass, KeePassXC)
    - System processes under /System/ or /usr/libexec/
    - Backup utilities accessing password databases
    - Cloud sync agents
level: critical
