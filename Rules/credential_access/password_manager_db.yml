title: Password Manager Database File Accessed
id: d1a2b3c4-0232-4000-a000-000000000232
status: experimental
description: Detects access to password manager database files (1Password, Bitwarden, KeePass) by processes other than the password manager itself. Adversaries may target these databases for credential theft.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1555/005/
tags:
    - attack.credential_access
    - attack.t1555.005
logsource:
    category: file_event
    product: macos
detection:
    selection_1password:
        TargetFilename|contains:
            - '/1Password/'
            - '/com.agilebits.onepassword/'
        TargetFilename|endswith:
            - '.sqlite'
            - '.1pif'
            - '.opvault'
    selection_bitwarden:
        TargetFilename|contains: '/Bitwarden/'
        TargetFilename|endswith:
            - '.sqlite'
            - '.json'
            - '.db'
    selection_keepass:
        TargetFilename|endswith:
            - '.kdbx'
            - '.kdb'
    filter_password_managers:
        Image|contains:
            - '1Password'
            - 'Bitwarden'
            - 'KeePass'
            - 'KeePassXC'
    filter_system:
        Image|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: (selection_1password or selection_bitwarden or selection_keepass) and not filter_password_managers and not filter_system
falsepositives:
    - Backup utilities accessing password databases
    - Cloud sync agents
level: critical
