title: securityd Process Memory Access via Mach APIs
id: d1a2b3c4-0405-4000-a000-000000000405
status: experimental
description: Detects processes referencing task_for_pid or mach_vm_read in conjunction with securityd, which indicates an attempt to read the security daemon's process memory. The securityd process holds decrypted keychain items and session keys in memory, making it a high-value target for credential extraction.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1003/
    - https://github.com/juuso/keychaindump
tags:
    - attack.credential_access
    - attack.t1003
logsource:
    category: process_creation
    product: macos
detection:
    selection_mach_api:
        CommandLine|contains:
            - 'task_for_pid'
            - 'mach_vm_read'
            - 'vm_read'
            - 'keychaindump'
            - 'chainbreaker'
    selection_securityd_target:
        CommandLine|contains:
            - 'securityd'
            - 'secd'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    # v1.12.0 RC17: belt-and-suspenders path filter — SignerType
    # enrichment can be nil for the first event of a binary after
    # daemon start (cache miss), so filter_apple_signed misses /bin/ls
    # / /bin/chmod etc. on the install-window event burst.
    filter_apple_paths:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/System/'
            - '/usr/libexec/'
    filter_dev_ai_tools:
        Image|contains:
            - '/.local/share/claude/'
            - '/Applications/Cursor.app/'
            - '/Applications/Visual Studio Code.app/'
            - '/Applications/Xcode.app/'
    condition: selection_mach_api and selection_securityd_target and not filter_system and not filter_apple_signed and not filter_apple_paths and not filter_dev_ai_tools
falsepositives:
    - Security research tools used in controlled testing environments
    - Apple diagnostic utilities with proper entitlements
    - Documentation / source-code grep / ls in compiled_rules dir (filtered)
level: high