title: AWS Credential Files Accessed by Unusual Process
id: d1a2b3c4-0116-4000-a000-000000000116
status: experimental
description: Detects access to AWS credential and configuration files by processes other than known AWS tools. These files often contain IAM access keys and session tokens that grant access to cloud infrastructure.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1552/001/
tags:
    - attack.credential_access
    - attack.t1552.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|endswith:
            - '/.aws/credentials'
            - '/.aws/config'
    filter_aws_tools:
        Image|endswith:
            - '/aws'
            - '/aws_completer'
            - '/terraform'
            - '/session-manager-plugin'
    filter_editors:
        Image|endswith:
            - '/vim'
            - '/nvim'
            - '/nano'
            - '/code'
            - '/Code Helper'
    filter_shells:
        Image|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
    filter_signed_dev:
        Image|contains:
            - '/IntelliJ'
            - '/PyCharm'
            - '/GoLand'
            - '/WebStorm'
    condition: selection and not filter_aws_tools and not filter_editors and not filter_shells and not filter_signed_dev
falsepositives:
    - Cloud management GUIs reading AWS credentials
    - Custom scripts or SDKs accessing AWS configuration
level: medium
