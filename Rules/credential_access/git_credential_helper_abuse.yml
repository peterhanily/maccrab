title: Git Credential Helper Invoked by Non-Git Process
id: d1a2b3c4-0362-4000-a000-000000000362
status: experimental
description: Detects non-git processes invoking git credential helpers to extract stored credentials.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1555/
tags:
    - attack.credential_access
    - attack.t1555
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'git credential'
            - 'git-credential-osxkeychain'
            - 'git-credential-store'
    filter_git:
        Image|endswith:
            - '/git'
            - '/git-credential-osxkeychain'
            - '/git-credential-manager'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and not filter_git and not filter_system and not filter_apple_signed
falsepositives:
    - IDE git integrations
    - CI/CD credential managers
level: critical
