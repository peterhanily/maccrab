title: Git Credential Helper Invoked by Non-Git Process
id: d1a2b3c4-0362-4000-a000-000000000362
status: experimental
description: Detects non-git processes invoking git credential helpers to extract stored credentials.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1555/
tags:
    - attack.credential_access
    - attack.t1555
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains:
            - 'git credential'
            - 'git-credential-osxkeychain'
            - 'git-credential-store'
    filter_git:
        Image|endswith:
            - '/git'
            - '/git-credential-osxkeychain'
            - '/git-credential-manager'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    filter_apple_signed:
        SignerType: 'apple'
    condition: selection and not filter_git and not filter_system and not filter_apple_signed
falsepositives:
    - IDE git integrations (VS Code / Cursor / IntelliJ / Xcode / Sublime Merge / GitKraken / Fork)
    - CI/CD runners invoking git on macOS (GitHub Actions `actions/checkout`, GitLab runner, Buildkite, CircleCI, Bitrise, Jenkins agent)
    - GitHub CLI (`gh auth login`, `gh repo clone`) and Git LFS helpers shelling out to git-credential
    - SourceTree / GitHub Desktop / Tower writing to or reading from osxkeychain credential helper
    - Code review tools (Reviewable, Phabricator arc, Gerrit) refreshing tokens via the helper
level: medium
