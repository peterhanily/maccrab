title: SSH Agent Socket Accessed by Suspicious Process
id: d1a2b3c4-0363-4000-a000-000000000363
status: experimental
description: Detects processes like curl, python, node accessing the SSH agent socket, potentially hijacking SSH credentials for lateral movement.
author: MacCrab Community
date: 2026/04/05
references:
    - https://attack.mitre.org/techniques/T1563/001/
tags:
    - attack.lateral_movement
    - attack.credential_access
    - attack.t1563.001
logsource:
    category: file_event
    product: macos
detection:
    selection:
        TargetFilename|contains: 'SSH_AUTH_SOCK'
    selection_process:
        Image|endswith:
            - '/curl'
            - '/wget'
            - '/python'
            - '/python3'
            - '/node'
            - '/nc'
            - '/ncat'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    # v1.4.5: exclude ancestry paths where an interactive shell ran
    # the command (dev using paramiko, ansible, fabric, pip-install-
    # from-git, npm-install-from-git, etc). Attackers don't chain
    # SSH-agent hijack through Terminal + zsh; they do it from a
    # dropped binary or a script running under launchd.
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
    condition: (selection or selection_process) and not filter_system and not filter_terminal
falsepositives:
    - SSH-based deployment scripts
    - Git over SSH operations
    - Interactive `ssh`, `git`, `ansible`, paramiko, etc. from a terminal session
level: high
