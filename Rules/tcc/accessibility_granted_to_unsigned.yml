title: Accessibility Permission Granted to Unsigned Application
id: d1a2b3c4-0081-4000-a000-000000000081
status: stable
description: Detects when Accessibility TCC permission is granted to an unsigned application. Accessibility access enables keylogging and UI control.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1056/001/
tags:
    - attack.credential_access
    - attack.t1056.001
logsource:
    category: tcc_event
    product: macos
detection:
    selection:
        TCCService: 'kTCCServiceAccessibility'
        TCCAllowed: 'true'
    selection_unsigned:
        SignerType:
            - 'unsigned'
            - 'adHoc'
    condition: selection and selection_unsigned
falsepositives:
    - Legitimate assistive technology applications
level: medium