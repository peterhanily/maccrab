title: Screen Recording Permission Granted
id: d1a2b3c4-0082-4000-a000-000000000082
status: experimental
description: Detects when Screen Recording permission is granted to a non-Apple application. Screen recording is commonly requested by spyware.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1113/
tags:
    - attack.collection
    - attack.t1113
logsource:
    category: tcc_event
    product: macos
detection:
    selection:
        TCCService: 'kTCCServiceScreenCapture'
        TCCAllowed: 'true'
    filter_apple:
        SignerType: 'apple'
    condition: selection and not filter_apple
falsepositives:
    - Legitimate screen sharing and recording applications
    - Video conferencing tools
level: medium
