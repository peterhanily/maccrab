title: Local Group Enumeration via dscl or dseditgroup
id: d1a2b3c4-0250-4000-a000-000000000250
status: experimental
description: Detects use of dscl or dseditgroup to enumerate local groups and group memberships. Adversaries may enumerate groups to identify privileged accounts and potential escalation paths.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1069/001/
tags:
    - attack.discovery
    - attack.t1069.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_dscl:
        Image|endswith: '/dscl'
        CommandLine|contains:
            - 'list /Groups'
            - 'read /Groups'
            - '-list /Local/Default/Groups'
            - 'GroupMembership'
            - 'GroupMembers'
    selection_dseditgroup:
        Image|endswith: '/dseditgroup'
        CommandLine|contains:
            - '-o read'
            - '-o checkmember'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: (selection_dscl or selection_dseditgroup) and not filter_system
falsepositives:
    - System administration scripts
    - Directory service management tools
level: medium
