title: Wi-Fi Network Scanning via airport Utility
id: d1a2b3c4-0121-4000-a000-000000000121
status: experimental
description: Detects use of the macOS airport command-line utility to scan for nearby Wi-Fi networks. This can be used for wireless reconnaissance to identify nearby networks, access points, and potential targets.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1016/
tags:
    - attack.discovery
    - attack.t1016
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/airport'
        # 'sniff' is the high-signal token (raw 802.11 capture); '-s' and
        # '--scan' are daily IT/admin work. Keep the broad set but require
        # ancestry to be non-interactive (see filters below).
        CommandLine|contains:
            - '-s'
            - '--scan'
            - 'scan'
            - '-I'
            - '--getinfo'
            - 'sniff'
    filter_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    filter_platform:
        PlatformBinary: 'true'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    # airport ships at /usr/libexec/airport (symlinked) and /System/Library/
    # PrivateFrameworks/Apple80211.framework/Versions/Current/Resources/airport.
    filter_system_path:
        Image|startswith:
            - '/usr/libexec/'
            - '/usr/sbin/'
            - '/usr/bin/'
            - '/System/'
    # `airport -s` is daily IT troubleshooting. Filter interactive shell,
    # editor, CI, and dotfile-manager ancestry so the rule only fires on
    # unusual lineage (e.g. a dropped /tmp binary spawning airport).
    filter_dev_tools:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
            - '/python'
            - '/python3'
            - '/runner'
            - '/buildkite-agent'
            - '/circleci'
            - '/Runner.Listener'
    condition: selection and not filter_signed and not filter_platform and not filter_system and not filter_system_path and not filter_dev_tools
falsepositives:
    - Network administrators troubleshooting Wi-Fi connectivity (filtered via
      shell ancestry)
    - Wi-Fi diagnostics scripts (Apple-signed / platform binary)
level: low
# v1.11.2: separated parent-startswith from SignerType filter (previously
# AND-combined as one selection so neither half worked alone), added platform-
# binary / system-path / dev-tool ancestry filters. airport -s is daily IT
# work so the rule must require unusual lineage.
