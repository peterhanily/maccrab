title: MDM Enrollment Status Check via profiles
id: d1a2b3c4-0255-4000-a000-000000000255
status: experimental
description: Detects use of the profiles command to check MDM enrollment status. Adversaries may enumerate MDM enrollment to determine if the host is managed and what security controls are in place before attempting evasion.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1082/
tags:
    - attack.discovery
    - attack.t1082
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/profiles'
        CommandLine|contains:
            - 'status'
            - 'list'
            - 'show'
            - '-P'
            - '-C'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_mdm:
        ParentImage|contains:
            - 'mdmclient'
            - 'jamf'
            - 'Mosyle'
            - 'Kandji'
    # Auto-update frameworks legitimately check MDM-enrollment state so
    # they can defer to enterprise-managed update policies. Google's
    # Updater is the canonical one; Sparkle, Chrome's SparkleUpdate,
    # Brave/Edge/Arc updaters, and Mozilla's updater all share the
    # pattern. Filter on ParentImage (immediate parent) plus a
    # wide path-contains so the whole updater process tree is
    # excluded.
    filter_auto_updater_parent:
        ParentImage|contains:
            - 'GoogleUpdater'
            - 'GoogleSoftwareUpdate'
            - 'Sparkle'
            - 'Autoupdate'
            - 'updater'
            - 'Updater'
            - 'softwareupdate'
            - 'Brave Browser Helper'
            - 'Microsoft AutoUpdate'
            - 'Mozilla Maintenance Service'
    filter_auto_updater_ancestry:
        ParentImage|contains:
            - '/Library/Google/GoogleSoftwareUpdate/'
            - '/Application Support/Google/GoogleUpdater/'
            - '/Library/Caches/com.google.Keystone/'
            - '/Library/Caches/'
            - '/Sparkle.framework/'
            - '/Sparkle-'
    filter_auto_updater_launcher:
        # GoogleUpdater's subprocess chain is `launcher -> GoogleUpdater
        # -> launcher -> ... -> profiles`; the immediate parent is often
        # named `launcher`. Exact-name match keeps this scoped.
        ParentImage|endswith:
            - '/launcher'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
    filter_apple_parent:
        ParentSignerType: 'apple'
    condition: selection and not filter_system and not filter_mdm and not filter_auto_updater_parent and not filter_auto_updater_ancestry and not filter_auto_updater_launcher and not filter_terminal and not filter_apple_parent
falsepositives:
    - IT administrators checking enrollment status
    - Compliance verification scripts
level: medium
