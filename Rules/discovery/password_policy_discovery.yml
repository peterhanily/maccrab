title: Password Policy Discovery
id: d1c2e3f4-8001-4000-d000-000000008001
status: experimental
description: |
  Detects attempts to enumerate the local password policy using pwpolicy,
  security authorizationdb, or dscl. Adversaries gather password complexity
  and lockout policy to craft targeted brute-force or password-spray attacks,
  or to assess feasibility of credential theft techniques.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1201/
tags:
    - attack.discovery
    - attack.t1201
logsource:
    category: process_creation
    product: macos
detection:
    selection_pwpolicy:
        Image|endswith: '/pwpolicy'
        CommandLine|contains:
            - '-getaccountpolicies'
            - '-getglobalpolicy'
            - 'getpolicy'
    selection_security:
        Image|endswith: '/security'
        CommandLine|contains:
            - 'authorizationdb read'
    selection_dscl_policy:
        Image|endswith: '/dscl'
        # Anchor on policy-specific tokens. Bare 'passwd' matched too broadly
        # (e.g. anyone reading /etc/passwd via dscl), so we require either the
        # policy attribute or a -read of /Users/*/Password*.
        CommandLine|contains:
            - 'PasswordPolicyOptions'
            - 'AuthenticationAuthority'
            - 'accountPolicyData'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    filter_platform:
        PlatformBinary: 'true'
    # Backstop: pwpolicy/security/dscl all ship under /usr/bin/ or /usr/sbin/.
    filter_system_path:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/System/'
    # Filter daily IT/admin/dev usage so the rule fires on suspicious lineage.
    filter_dev_tools:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
            - '/python'
            - '/python3'
            - '/runner'
            - '/buildkite-agent'
            - '/circleci'
            - '/Runner.Listener'
    filter_mdm_parent:
        # Jamf / Kandji / Mosyle / Hexnode agents legitimately query policy
        ParentImage|contains:
            - '/Jamf/'
            - '/jamf'
            - '/Kandji/'
            - '/kandji'
            - '/Mosyle'
            - '/Hexnode'
            - '/ManagedClient'
    condition: (selection_pwpolicy or selection_security or selection_dscl_policy) and not filter_apple and not filter_platform and not filter_system_path and not filter_dev_tools and not filter_mdm_parent
falsepositives:
    - IT administrators auditing password policy (filter_dev_tools / shell)
    - MDM compliance checking tools (filter_mdm_parent)
    - Security auditing software (devId signer)
level: low
# v1.11.2: tightened selection_dscl_policy to drop bare 'passwd' (matched
# /etc/passwd reads), added platform-binary / system-path / dev-tool / MDM
# parent filters. Niche command but still noisy on dev/IT machines.
