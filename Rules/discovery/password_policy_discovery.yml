title: Password Policy Discovery
id: d1c2e3f4-8001-4000-d000-000000008001
status: experimental
description: |
  Detects attempts to enumerate the local password policy using pwpolicy,
  security authorizationdb, or dscl. Adversaries gather password complexity
  and lockout policy to craft targeted brute-force or password-spray attacks,
  or to assess feasibility of credential theft techniques.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1201/
tags:
    - attack.discovery
    - attack.t1201
logsource:
    category: process_creation
    product: macos
detection:
    selection_pwpolicy:
        Image|endswith: '/pwpolicy'
        CommandLine|contains:
            - '-getaccountpolicies'
            - '-getglobalpolicy'
            - 'getpolicy'
    selection_security:
        Image|endswith: '/security'
        CommandLine|contains:
            - 'authorizationdb read'
    selection_dscl_policy:
        Image|endswith: '/dscl'
        CommandLine|contains:
            - 'passwd'
            - 'PasswordPolicyOptions'
    filter_apple:
        SignerType:
            - 'apple'
    condition: (selection_pwpolicy or selection_security or selection_dscl_policy) and not filter_apple
falsepositives:
    - IT administrators auditing password policy
    - MDM compliance checking tools
    - Security auditing software
level: low
