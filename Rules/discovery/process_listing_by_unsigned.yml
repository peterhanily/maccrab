title: Process Listing by Unsigned Process
id: d1a2b3c4-0123-4000-a000-000000000123
status: experimental
description: Detects process listing tools (ps, top) being executed by an unsigned or ad-hoc signed process. Malware often enumerates running processes to identify security tools, sandbox environments, or target processes.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/techniques/T1057/
tags:
    - attack.discovery
    - attack.t1057
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/ps'
            - '/top'
    selection_signer:
        SignerType:
            - 'unsigned'
            - 'adHoc'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
    filter_platform:
        PlatformBinary: 'true'
    filter_homebrew:
        Image|startswith:
            - '/opt/homebrew/'
            - '/usr/local/Cellar/'
            - '/usr/local/opt/'
    filter_apple_parent:
        ParentSignerType: 'apple'
    # Backstop: platform-binary path prefix. /bin/ps, /usr/bin/top are
    # always Apple-signed in practice, but field data shows PlatformBinary
    # and SignerType enrichment is not always populated on every event
    # (notably when ES events arrive before code-sig enrichment settles).
    # A hard path match on the binary location ensures we never flag a
    # shipped system binary as "unsigned".
    filter_system_path:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/System/'
    condition: selection and selection_signer and not filter_terminal and not filter_platform and not filter_homebrew and not filter_apple_parent and not filter_system_path
falsepositives:
    - Unsigned developer tools or scripts that check process status
    - Custom monitoring agents
level: low
# v1.4: lowered from medium. Unsigned `ps`/`top` is most commonly Homebrew-
# linked development tools. Kill-chain rules upgrade severity when warranted.
