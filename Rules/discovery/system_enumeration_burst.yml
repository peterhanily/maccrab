title: Rapid System Information Enumeration
id: d1a2b3c4-0050-4000-a000-000000000050
status: experimental
description: Detects execution of multiple system discovery commands, commonly seen in post-exploitation reconnaissance.
author: MacCrab Community
date: 2026/03/31
references:
    - https://attack.mitre.org/tactics/TA0007/
tags:
    - attack.discovery
    - attack.t1082
    - attack.t1033
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith:
            - '/whoami'
            - '/id'
            - '/uname'
            - '/sw_vers'
            - '/system_profiler'
            - '/ifconfig'
            - '/networksetup'
            - '/scutil'
            - '/dscl'
            - '/sysctl'
            - '/launchctl'
    filter_apple:
        SignerType: 'apple'
        ParentImage|startswith: '/System/'
    filter_platform:
        PlatformBinary: 'true'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
    filter_apple_child:
        SignerType: 'apple'
    # Backstop: every binary in the selection list ships under /usr/bin/
    # or /usr/sbin/. Anchor on install location to guarantee we don't
    # flag them even if PlatformBinary / SignerType enrichment is
    # unavailable on a given event.
    filter_system_path:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/System/'
    condition: selection and not filter_apple and not filter_platform and not filter_terminal and not filter_apple_child and not filter_system_path
falsepositives:
    - System administration scripts
    - Monitoring tools
    - Homebrew installation
level: low
