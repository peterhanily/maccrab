title: Defaults Read on Security-Sensitive Domains
id: d1a2b3c4-0253-4000-a000-000000000253
status: experimental
description: Detects use of the defaults command to read security-sensitive preference domains. Adversaries may query system defaults to enumerate security configurations, installed software, and system state.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1082/
tags:
    - attack.discovery
    - attack.t1082
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/defaults'
        CommandLine|contains: 'read'
    selection_sensitive:
        CommandLine|contains:
            - 'com.apple.screensaver'
            - 'com.apple.loginwindow'
            - 'com.apple.security'
            - 'com.apple.Safari'
            - 'com.apple.LaunchServices'
            - 'com.apple.dock'
            - 'com.apple.finder'
            - 'com.apple.SoftwareUpdate'
            - 'GlobalPreferences'
            - 'com.apple.Terminal'
            - '/Library/Preferences/com.apple'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    filter_platform:
        PlatformBinary: 'true'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
    filter_apple_parent:
        ParentSignerType: 'apple'
    condition: selection and selection_sensitive and not filter_system and not filter_apple_signed and not filter_platform and not filter_terminal and not filter_apple_parent
falsepositives:
    - System administration and configuration scripts
    - Preference management tools
level: low
