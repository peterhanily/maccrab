title: Defaults Read on Security-Sensitive Domains
id: d1a2b3c4-0253-4000-a000-000000000253
status: experimental
description: Detects use of the defaults command to read security-sensitive preference domains. Adversaries may query system defaults to enumerate security configurations, installed software, and system state.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1082/
tags:
    - attack.discovery
    - attack.t1082
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/defaults'
        CommandLine|contains: 'read'
    selection_sensitive:
        # v1.11.2: removed broad consumer domains that every preference utility
        # reads daily: com.apple.dock, com.apple.finder, com.apple.Safari,
        # com.apple.LaunchServices, GlobalPreferences, com.apple.Terminal.
        # Kept high-signal domains relevant to security posture / lock state:
        # screensaver/loginwindow (auto-lock policy), security (Gatekeeper /
        # XProtect), SoftwareUpdate (patch enumeration), TimeMachine (backup
        # destinations for exfil), MCX (managed prefs / MDM).
        CommandLine|contains:
            - 'com.apple.screensaver'
            - 'com.apple.loginwindow'
            - 'com.apple.security'
            - 'com.apple.SoftwareUpdate'
            - 'com.apple.TimeMachine'
            - 'com.apple.MCX'
            - 'com.apple.commerce'
            - 'com.apple.crashreporter'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
            - '/usr/sbin/'
    filter_apple_signed:
        SignerType: 'apple'
    filter_platform:
        PlatformBinary: 'true'
    filter_terminal:
        ParentImage|endswith:
            - '/bash'
            - '/zsh'
            - '/sh'
            - '/fish'
            - '/dash'
            - '/Terminal'
            - '/iTerm2'
            - '/Alacritty'
            - '/kitty'
            - '/WarpTerminal'
            - '/tmux'
            - '/screen'
            - '/Cursor'
            - '/Code'
            - '/node'
            - '/ruby'
            - '/python'
            - '/python3'
            - '/brew'
            - '/npm'
            - '/yarn'
            - '/pnpm'
            - '/pip'
            - '/pip3'
            - '/runner'
            - '/buildkite-agent'
            - '/circleci'
            - '/Runner.Listener'
            - '/chezmoi'
            - '/stow'
            - '/yadm'
    filter_apple_parent:
        ParentSignerType: 'apple'
    # Backstop: Apple ships /usr/bin/defaults as a platform binary.
    # PlatformBinary / SignerType enrichment is not always populated
    # on every event, so anchor on the binary's install location as a
    # hard guarantee.
    filter_system_path:
        Image|startswith:
            - '/bin/'
            - '/sbin/'
            - '/usr/bin/'
            - '/usr/sbin/'
            - '/usr/libexec/'
            - '/System/'
    condition: selection and selection_sensitive and not filter_system and not filter_apple_signed and not filter_platform and not filter_terminal and not filter_apple_parent and not filter_system_path
falsepositives:
    - System administration and configuration scripts
    - Preference management tools
level: low
