title: Defaults Read on Security-Sensitive Domains
id: d1a2b3c4-0253-4000-a000-000000000253
status: experimental
description: Detects use of the defaults command to read security-sensitive preference domains. Adversaries may query system defaults to enumerate security configurations, installed software, and system state.
author: MacCrab Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1082/
tags:
    - attack.discovery
    - attack.t1082
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/defaults'
        CommandLine|contains: 'read'
    selection_sensitive:
        CommandLine|contains:
            - 'com.apple.screensaver'
            - 'com.apple.loginwindow'
            - 'com.apple.security'
            - 'com.apple.Safari'
            - 'com.apple.LaunchServices'
            - 'com.apple.dock'
            - 'com.apple.finder'
            - 'com.apple.SoftwareUpdate'
            - 'GlobalPreferences'
            - 'com.apple.Terminal'
            - '/Library/Preferences/com.apple'
    filter_system:
        ParentImage|startswith:
            - '/System/'
            - '/usr/libexec/'
    condition: selection and selection_sensitive and not filter_system
falsepositives:
    - System administration and configuration scripts
    - Preference management tools
level: low
