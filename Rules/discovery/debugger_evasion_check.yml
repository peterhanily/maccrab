title: Debugger or Analysis Environment Detection Attempt
id: d1c2e3f4-8004-4000-d000-000000008004
status: experimental
description: |
  Detects processes using sysctl to query kernel state commonly used for
  sandbox/debugger detection: kern.proc.pid (ptrace flag check), hw.model
  (VM detection), kern.boottime (uptime check for sandbox detection).
  Malware uses these checks to detect analysis environments and avoid
  executing its payload when being investigated.
author: MacCrab Community
date: 2026/04/08
references:
    - https://attack.mitre.org/techniques/T1622/
    - https://attack.mitre.org/techniques/T1497/
tags:
    - attack.defense_evasion
    - attack.t1622
    - attack.t1497
logsource:
    category: process_creation
    product: macos
detection:
    # Narrow sysctl branch: only the highly anti-debug-specific OIDs.
    # kern.boottime alone is queried by many uptime / monitoring tools
    # (top, htop, glances, system-profiler) and is too broad to fire on
    # its own — keep it in the rule but require pairing with a stronger
    # OID via the AND of selection_sysctl_anchor and selection_sysctl_oid
    # (any one of which is enough now that the OID list is anti-debug
    # focused).
    selection_sysctl_debug:
        Image|endswith: '/sysctl'
        CommandLine|contains:
            - 'kern.proc.pid'
            - 'sysctl.proc_translated'
            - 'security.mac.sandbox'
            - 'kern.proc.p_flag'
            - 'P_TRACED'
    # Ptrace is the canonical macOS anti-debug primitive
    # (ptrace(PT_DENY_ATTACH, …)). Direct invocation from the CLI is
    # vanishingly rare outside of evasion attempts.
    selection_ptrace:
        Image|endswith: '/ptrace'
    filter_apple:
        SignerType:
            - 'apple'
            - 'appStore'
    filter_dev_tools:
        Image|startswith:
            - '/Applications/Xcode'
            - '/Library/Developer/'
            - '/Applications/Instruments.app/'
        ParentImage|startswith:
            - '/Applications/Xcode'
            - '/Library/Developer/'
            - '/Applications/Instruments.app/'
    condition: (selection_sysctl_debug or selection_ptrace) and not filter_apple and not filter_dev_tools
falsepositives:
    - Legitimate debugging tools and profilers
    - Security research and reversing tools
    - Crash reporting agents checking process state
level: low
# v1.4: lowered from medium. ptrace checks are common in legitimate debuggers
# and crash-handling runtimes; escalate on corroborating exfil/persistence.
