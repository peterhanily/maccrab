title: Network Connection Enumeration via lsof by Unsigned Process
id: d1a2b3c4-0252-4000-a000-000000000252
status: experimental
description: Detects lsof usage with network-related flags by unsigned processes. Adversaries may use lsof to enumerate active network connections, open ports, and listening services for reconnaissance.
author: HawkEye Community
date: 2026/03/30
references:
    - https://attack.mitre.org/techniques/T1049/
tags:
    - attack.discovery
    - attack.t1049
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        Image|endswith: '/lsof'
        CommandLine|contains:
            - '-i'
            - '-iTCP'
            - '-iUDP'
            - '-i :'
            - '+c 0'
            - '-nP'
    filter_signed:
        SignerType:
            - 'apple'
            - 'appStore'
            - 'devId'
    condition: selection and not filter_signed
falsepositives:
    - Monitoring and troubleshooting scripts
    - Network management utilities
level: medium
